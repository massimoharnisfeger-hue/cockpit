.v8-badge-item.unlocked .badge-name{color:var(--cyan);}
/* right panel */
.v8-rp-section{padding:14px 16px;border-bottom:1px solid var(--b);}
.v8-rp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g1);margin-bottom:8px;}
/* animations */
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.v8-anim{animation:slideIn .3s ease both;}
.v8-anim-1{animation:slideIn .3s .05s ease both;}
.v8-anim-2{animation:slideIn .3s .10s ease both;}
.v8-anim-3{animation:slideIn .3s .15s ease both;}
.v8-anim-4{animation:slideIn .3s .20s ease both;}
/* niveau XP card */
.v8-xp-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#06090D;flex-shrink:0;}
/* 3-column grid */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
/* nav menu items */
.v8-nav-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;cursor:pointer;transition:background .15s;}
.v8-nav-item:hover{background:var(--bg3);}
.v8-nav-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
/* kanban */
.v8-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;overflow-x:auto;}
@media(max-width:900px){.v8-kanban{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.v8-kanban{grid-template-columns:1fr;}}
.v8-kcol{background:rgba(12,17,24,0.8);border:1px solid var(--b);border-radius:14px;padding:12px;min-height:200px;}
.v8-kcol-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.v8-ktask{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;user-select:none;}
.v8-ktask:hover{border-color:var(--cyan);}
.v8-task-input-row{display:flex;gap:8px;margin-bottom:16px;}
.v8-task-input-row input{flex:1;background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--w);font-size:13px;}
.v8-task-input-row input:focus{outline:none;border-color:var(--cyan);}
.v8-kcol.drag-over{border-color:var(--cyan);background:rgba(0,212,255,.05);}

/* ── HOME V2 ─────────────────────────────────────────────────────────── */
.hqbar{display:flex;gap:6px;margin-bottom:12px;align-items:stretch;}
.hqbar-input{flex:1;background:var(--bg1);border:1.5px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--w);font-size:13px;transition:border-color .15s;}
.hqbar-input:focus{border-color:var(--cyan);outline:none;}
.hqbtn{background:var(--bg1);border:1.5px solid var(--b);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:17px;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.hqbtn:hover{border-color:var(--cyan);background:rgba(0,212,255,.08);}
.hqbtn-add{background:var(--cyan);color:#000;border-color:var(--cyan);font-size:20px;font-weight:800;padding:8px 14px;}
.hqbtn-add:hover{background:#00bde8;}
.hqbtn-focus-on{border-color:var(--amber)!important;background:rgba(255,184,0,.12)!important;}
.hab-view-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px;}
.hab-view-tab{flex:1;text-align:center;padding:4px 6px;border-radius:5px;font-size:11px;font-weight:600;color:var(--g1);cursor:pointer;border:none;background:none;transition:all .15s;}
.hab-view-tab.active{background:rgba(0,212,255,.12);color:var(--cyan);}
.hwg{width:100%;border-collapse:separate;border-spacing:2px 4px;}
.hwg th{font-size:9px;color:var(--g1);font-weight:700;text-align:center;padding-bottom:6px;letter-spacing:.04em;}
.hwg th.hwg-nh{text-align:left;}
.hwg td{text-align:center;padding:1px 2px;}
.hwg td.hwg-nc{text-align:left;padding-right:6px;}
.hwg-hname{font-size:11px;color:var(--w);font-weight:500;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.hwg-dot{width:24px;height:24px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;border:1.5px solid transparent;transition:transform .1s,background .12s;}
.hwg-dot:hover{transform:scale(1.15);}
.hwg-dot.hd-done{background:rgba(0,212,255,.2);border-color:rgba(0,212,255,.5);color:var(--cyan);}
.hwg-dot.hd-miss{background:rgba(255,58,92,.08);border-color:rgba(255,58,92,.2);color:rgba(255,58,92,.5);}
.hwg-dot.hd-empty{background:var(--bg2);border-color:var(--b);}
.hwg-dot.hd-today{box-shadow:0 0 0 2px var(--cyan);}
.hwg-pct{font-size:10px;font-family:var(--font-mono);font-weight:700;padding-left:4px;}
.hmc-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.hmc-dow-l{font-size:9px;color:var(--g1);text-align:center;font-weight:700;text-transform:uppercase;}
.hmc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.hmc-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:transform .1s;min-width:0;}
.hmc-day:hover{transform:scale(1.1);}
.hmc-today{box-shadow:0 0 0 2px var(--cyan)!important;}
.hmc-legend{display:flex;gap:10px;margin-top:8px;justify-content:center;font-size:10px;color:var(--g1);}
.home-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.home-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--g1);transition:all .12s;white-space:nowrap;}
.home-pill:hover{border-color:var(--g1);}
.hp-active{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.3);}
.hp-urgent.hp-active{background:rgba(255,58,92,.1);color:var(--red);border-color:rgba(255,58,92,.3);}
.hp-haute.hp-active{background:rgba(255,184,0,.1);color:var(--amber);border-color:rgba(255,184,0,.3);}
.hp-moyenne.hp-active{background:rgba(168,85,247,.1);color:var(--purp);border-color:rgba(168,85,247,.3);}
.home-sort-row{display:flex;gap:5px;margin-bottom:8px;align-items:center;}
.hsort{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--b);background:none;color:var(--g1);transition:all .12s;}
.hsort.hsort-a{color:var(--cyan);border-color:rgba(0,212,255,.3);}
.v8-tv2{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(30,45,61,.5);}
.v8-tv2:last-of-type{border-bottom:none;}
.tsb{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--b2);margin-top:2px;}
.tsb-todo{border-color:var(--g2);}
.tsb-doing{border-color:var(--amber);background:rgba(255,184,0,.15);color:var(--amber);}
.tsb-done{border-color:var(--green);background:var(--green);color:#000;}
.tsb-blocked{border-color:var(--red);background:rgba(255,58,92,.15);color:var(--red);}
.tv2-body{flex:1;min-width:0;}
.tv2-title{font-size:13px;color:var(--w);line-height:1.35;word-break:break-word;}
.tv2-title.tv2-done{text-decoration:line-through;color:var(--g1);}
.tv2-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.tv2-meta span{font-size:10px;color:var(--g1);}
.tv2-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.sdelta{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.sd-up{color:var(--green);background:rgba(0,229,160,.12);}
.sd-dn{color:var(--red);background:rgba(255,58,92,.12);}
.sd-eq{color:var(--g1);background:var(--bg2);}
.hms-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.hms-cell{background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 8px;text-align:center;}
.hms-val{font-family:var(--font-mono);font-size:18px;font-weight:700;}
.hms-lbl{font-size:9px;color:var(--g1);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.home-fin-widget{background:var(--bg1);border:1px solid var(--b);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
.home-fin-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(30,45,61,.5);font-size:12px;}
.home-fin-row:last-of-type{border-bottom:none;}
.home-fin-desc{color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.home-fin-amt{font-family:var(--font-mono);font-weight:700;flex-shrink:0;margin-left:8px;}
.home-sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.home-sec-hdr .v8-sec{margin:0;}

/* ── TACHES V3 ─────────────────────────────────────────────────── */
.tv3-tabs{display:flex;gap:2px;background:var(--bg1);border-radius:10px;padding:3px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tv3-tab{flex:0 0 auto;text-align:center;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;color:var(--g1);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;}
.tv3-tab.active{background:rgba(0,212,255,.15);color:var(--cyan);}
.tv3-tab .tv3-badge-cnt{display:inline-block;background:var(--red);color:#fff;border-radius:8px;font-size:9px;padding:0 5px;margin-left:3px;font-weight:800;vertical-align:middle;}
.tv3-task{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg1);border:1px solid var(--b);border-radius:10px;margin-bottom:6px;transition:border-color .15s;position:relative;}
.tv3-task:hover{border-color:rgba(0,212,255,.3);}
.tv3-task.tv3-sel{border-color:var(--cyan);background:rgba(0,212,255,.04);}
.tv3-task.tv3-overdue{border-left:3px solid var(--red);}
.tv3-task.tv3-done-task{opacity:.55;}
.tv3-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--g1);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;margin-top:1px;}
.tv3-check.doing{border-color:var(--amber);background:rgba(255,184,0,.15);color:var(--amber);}
.tv3-check.done{border-color:var(--green);background:var(--green);color:#000;}
.tv3-check.blocked{border-color:var(--red);background:rgba(255,58,92,.15);color:var(--red);}
.tv3-check.inbox{border-color:var(--purp);border-style:dashed;}
.tv3-body{flex:1;min-width:0;}
.tv3-title{font-size:13px;color:var(--w);font-weight:500;line-height:1.35;}
.tv3-title.done{text-decoration:line-through;color:var(--g1);}
.tv3-meta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.tv3-pri{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;}
.tv3-pri.urgente{background:rgba(255,58,92,.15);color:var(--red);}
.tv3-pri.haute{background:rgba(255,184,0,.15);color:var(--amber);}
.tv3-pri.moyenne{background:rgba(168,85,247,.12);color:var(--purp);}
.tv3-pri.basse{background:var(--b);color:var(--g1);}
.tv3-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(0,212,255,.08);color:var(--cyan);border:1px solid rgba(0,212,255,.2);}
.tv3-date{font-size:10px;color:var(--g1);}
.tv3-date.overdue{color:var(--red);font-weight:700;}
.tv3-date.today{color:var(--cyan);font-weight:700;}
.tv3-date.soon{color:var(--amber);}
.tv3-recurring-badge{font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2);}
.tv3-dep-badge{font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(255,58,92,.1);color:var(--red);border:1px solid rgba(255,58,92,.2);}
.tv3-prog{height:3px;background:var(--b);border-radius:2px;margin-top:6px;}
.tv3-prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s;}
.tv3-dur{font-size:10px;color:var(--g1);}
.tv3-actions{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.tv3-btn{font-size:10px;padding:3px 7px;border-radius:6px;border:1px solid var(--b);background:none;cursor:pointer;color:var(--g1);transition:all .12s;white-space:nowrap;}
.tv3-btn-done{border-color:rgba(0,229,160,.3);color:var(--green);}
.tv3-btn-done:hover{background:rgba(0,229,160,.12);}
.tv3-btn-snz{border-color:rgba(255,184,0,.25);color:var(--amber);}
.tv3-btn-pomo{border-color:rgba(255,58,92,.3);color:var(--red);}
.tv3-pomo-bar{display:flex;align-items:center;gap:10px;background:rgba(255,58,92,.08);border:1px solid rgba(255,58,92,.3);border-radius:10px;padding:9px 12px;margin-bottom:10px;}
.tv3-pomo-time{font-family:var(--font-mono);font-size:22px;font-weight:800;color:var(--red);min-width:52px;}
.tv3-pomo-label{flex:1;font-size:12px;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tv3-pomo-ctrl{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,58,92,.3);background:none;color:var(--red);cursor:pointer;font-size:11px;font-weight:700;}
.tv3-filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tv3-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:16px;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--g1);transition:all .12s;white-space:nowrap;}
.tv3-pill.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.3);}
.tv3-pill.urgente.on{background:rgba(255,58,92,.1);color:var(--red);border-color:rgba(255,58,92,.3);}
.tv3-pill.haute.on{background:rgba(255,184,0,.1);color:var(--amber);border-color:rgba(255,184,0,.3);}
.tv3-search{width:100%;background:var(--bg1);border:1.5px solid var(--b);border-radius:10px;padding:8px 12px;color:var(--w);font-size:13px;margin-bottom:8px;box-sizing:border-box;transition:border-color .15s;}
.tv3-search:focus{border-color:var(--cyan);outline:none;}
.tv3-sort-row{display:flex;gap:4px;margin-bottom:10px;align-items:center;}
.tv3-sort-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--b);background:none;color:var(--g1);cursor:pointer;}
.tv3-sort-btn.on{color:var(--cyan);border-color:rgba(0,212,255,.3);}
.tv3-week-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;-webkit-overflow-scrolling:touch;}
.tv3-week-col{flex:0 0 110px;background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:8px 6px;}
.tv3-week-col.today{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.03);}
.tv3-wday{font-size:9px;font-weight:700;color:var(--g1);text-transform:uppercase;letter-spacing:.06em;}
.tv3-wdate{font-size:18px;font-weight:800;color:var(--w);margin:2px 0 6px;}
.tv3-witem{font-size:10px;color:var(--w);padding:3px 5px;background:var(--bg);border-radius:5px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border-left:2px solid var(--b);}
.tv3-witem.urgente{border-left-color:var(--red);}
.tv3-witem.haute{border-left-color:var(--amber);}
.tv3-witem.moyenne{border-left-color:var(--purp);}
.tv3-bulk-bar{display:flex;align-items:center;gap:8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:8px 12px;margin-bottom:8px;}
.tv3-bulk-lbl{flex:1;font-size:12px;color:var(--cyan);}
.tv3-bulk-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--b);background:none;color:var(--w);cursor:pointer;}
.tv3-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.tv3-stat-card{background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:12px;text-align:center;}
.tv3-stat-val{font-family:var(--font-mono);font-size:24px;font-weight:800;}
.tv3-stat-lbl{font-size:9px;color:var(--g1);text-transform:uppercase;margin-top:3px;letter-spacing:.05em;}
.tv3-goal-row{background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:12px;margin-bottom:8px;}
.tv3-goal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tv3-goal-title{font-size:13px;font-weight:700;color:var(--w);}
.tv3-goal-pct{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--cyan);}
.tv3-goal-bar{height:5px;background:var(--b);border-radius:3px;}
.tv3-goal-fill{height:100%;border-radius:3px;background:var(--cyan);transition:width .4s;}
.tv3-inbox-card{background:var(--bg1);border:1px dashed rgba(255,184,0,.35);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.tv3-inbox-text{flex:1;font-size:13px;color:var(--w);}
.tv3-recap-card{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:12px;padding:14px;margin-bottom:14px;}
.tv3-snooze-wrap{position:relative;display:inline-block;}
.tv3-snooze-menu{position:absolute;right:0;top:100%;margin-top:4px;background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:4px;z-index:200;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.tv3-snooze-opt{display:block;width:100%;text-align:left;padding:7px 12px;font-size:12px;color:var(--w);background:none;border:none;cursor:pointer;border-radius:5px;}
.tv3-snooze-opt:hover{background:var(--b);}
.tv3-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tv3-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g1);}
.tv3-empty{text-align:center;padding:24px 0;color:var(--g1);font-size:13px;}
.tv3-voice-btn{background:var(--bg1);border:1.5px solid var(--b);border-radius:10px;padding:8px 11px;cursor:pointer;font-size:17px;flex-shrink:0;transition:all .15s;}
.tv3-voice-btn.listening{border-color:var(--red);background:rgba(255,58,92,.12);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,58,92,.4)}50%{box-shadow:0 0 0 6px rgba(255,58,92,0)}}
.tv3-template-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg1);border:1px solid var(--b);border-radius:8px;margin-bottom:5px;}
.tv3-import-area{width:100%;height:80px;background:var(--bg1);border:1.5px solid var(--b);border-radius:10px;padding:10px 12px;color:var(--w);font-size:12px;resize:none;box-sizing:border-box;margin-bottom:6px;}
.tv3-import-area:focus{border-color:var(--cyan);outline:none;}

/* ── PRODUCT V3 ─────────────────────────────────────────────────── */

/* Sidebar hidden on mobile */
@media(max-width:900px){#sidebar{display:none!important;}}
@media(min-width:901px){#sidebar{display:flex!important;}}

/* Page transition */
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:pageIn .18s cubic-bezier(.22,1,.36,1);}

/* Bnav with FAB center */
.bn-fab-wrap{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:2px;flex:0 0 64px;}
.bn-fab{width:52px;height:52px;background:var(--cyan);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,212,255,.45);transform:translateY(-10px);transition:transform .15s,box-shadow .15s;}
.bn-fab:active{transform:translateY(-8px) scale(.95);box-shadow:0 2px 10px rgba(0,212,255,.3);}
.bn-fab svg{color:#000;}
.bn-fab-lbl{font-size:9px;font-weight:700;color:var(--cyan);letter-spacing:.03em;margin-top:2px;transform:translateY(-4px);}

/* Morning brief overlay */
.v3-overlay{position:fixed;inset:0;background:rgba(6,9,13,.92);z-index:900;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .25s ease-out;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.v3-sheet{width:100%;max-width:500px;background:var(--bg1);border-radius:20px 20px 0 0;padding:28px 20px 40px;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.v3-sheet-title{font-size:22px;font-weight:800;color:var(--w);margin-bottom:4px;}
.v3-sheet-sub{font-size:14px;color:var(--g1);margin-bottom:20px;}
.v3-intent-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--b);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.v3-intent-row.picked{border-color:var(--cyan);background:rgba(0,212,255,.06);}
.v3-intent-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--g1);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s;}
.v3-intent-check.picked{background:var(--cyan);border-color:var(--cyan);color:#000;}
.v3-intent-text{flex:1;font-size:13px;color:var(--w);}
.v3-intent-pri{font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;}
.v3-hab-grid{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px;}
.v3-hab-chip{padding:6px 12px;border-radius:20px;font-size:13px;border:1.5px solid var(--b);background:transparent;cursor:pointer;transition:all .15s;color:var(--w);}
.v3-hab-chip.picked{background:rgba(0,229,160,.12);border-color:var(--green);color:var(--green);}
.v3-brief-insight{background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:18px;line-height:1.5;}
.v3-cta-btn{width:100%;padding:14px;background:var(--cyan);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.02em;}

/* Insight card */
.v3-insight{background:var(--bg1);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--w);line-height:1.5;}
.v3-insight .v3-i-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--amber);margin-bottom:3px;}

/* Quick capture */
.v3-capture-overlay{position:fixed;inset:0;background:rgba(6,9,13,.8);z-index:800;display:flex;align-items:flex-end;justify-content:center;}
.v3-capture-sheet{width:100%;max-width:500px;background:var(--bg1);border-radius:20px 20px 0 0;padding:20px 20px 32px;animation:sheetUp .25s cubic-bezier(.22,1,.36,1);}
.v3-capture-input{width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:14px 16px;color:var(--w);font-size:15px;margin-bottom:10px;box-sizing:border-box;transition:border-color .15s;}
.v3-capture-input:focus{border-color:var(--cyan);outline:none;}
.v3-capture-hint{font-size:12px;color:var(--g1);margin-bottom:12px;min-height:18px;}
.v3-capture-row{display:flex;gap:8px;}
.v3-capture-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.v3-capture-add{background:var(--cyan);color:#000;}
.v3-capture-cancel{background:var(--b);color:var(--w);}
.v3-capture-type{display:flex;gap:6px;margin-bottom:12px;}
.v3-type-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--b);background:none;color:var(--g1);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.v3-type-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08);}

/* Undo toast */
.v3-undo{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:700;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideUp .2s ease-out;white-space:nowrap;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.v3-undo-msg{font-size:13px;color:var(--w);}
.v3-undo-btn{font-size:12px;font-weight:700;color:var(--cyan);background:none;border:none;cursor:pointer;padding:0;}

/* Evening recap */
.v3-evening-sheet{background:var(--bg1);border-radius:20px 20px 0 0;padding:24px 20px 40px;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);}
.v3-recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0;}
.v3-recap-cell{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:12px;text-align:center;}
.v3-recap-val{font-family:var(--font-mono);font-size:22px;font-weight:800;}
.v3-recap-lbl{font-size:10px;color:var(--g1);text-transform:uppercase;margin-top:2px;letter-spacing:.05em;}

/* Swipe task */
.tv3-task{overflow:hidden;position:relative;}
.tv3-swipe-bg{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;padding:0 16px;pointer-events:none;opacity:0;transition:opacity .1s;}
.tv3-swipe-bg.right{background:rgba(0,229,160,.2);justify-content:flex-start;color:var(--green);}
.tv3-swipe-bg.left{background:rgba(255,184,0,.15);justify-content:flex-end;color:var(--amber);}
.tv3-task-inner{transition:transform .1s;will-change:transform;}
/* v3-fab-bnav-injected */
.v8-ktask{user-select:none;}
/* ── TACHES V4 ─────────────────────────────────────────────────────────── */
.tv4-page{padding:12px 14px 80px;}
.tv4-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.tv4-title{font-size:18px;font-weight:800;color:var(--w);}
.tv4-subtitle{font-size:11px;color:var(--g1);margin-bottom:14px;}
.tv4-header-btns{display:flex;gap:6px;}
.tv4-icon-btn{background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:6px 9px;color:var(--g1);cursor:pointer;font-size:13px;line-height:1;}
.tv4-zone-now{background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(0,212,255,.02));border:1px solid rgba(0,212,255,.2);border-radius:14px;padding:12px;margin-bottom:10px;}
.tv4-zone-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tv4-zone-label{font-size:9px;font-weight:800;letter-spacing:.1em;}
.tv4-zone-count{font-size:9px;color:var(--g1);}
.tv4-task-row{display:flex;align-items:center;gap:10px;background:var(--bg1);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;position:relative;overflow:hidden;transition:opacity .15s;}
.tv4-task-row.urgent{background:rgba(255,58,92,.08);border:1px solid rgba(255,58,92,.25);}
.tv4-task-row.doing{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);}
.tv4-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--g1);flex-shrink:0;}
.tv4-check.urgent{border-color:var(--red);}
.tv4-check.doing{border-color:var(--cyan);}
.tv4-task-body{flex:1;min-width:0;}
.tv4-task-text{font-size:13px;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tv4-task-meta{font-size:10px;color:var(--g1);margin-top:2px;}
.tv4-task-meta.urgent{color:var(--red);}
.tv4-task-arrow{font-size:14px;color:var(--g1);}
.tv4-sep{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--g1);margin:8px 0 5px;text-transform:uppercase;}
.tv4-sep.urgent{color:var(--red);}
.tv4-empty{font-size:12px;color:var(--g1);text-align:center;padding:10px 0;font-style:italic;}
.tv4-swipe-right{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,229,160,.15);display:flex;align-items:center;padding-left:14px;font-size:11px;font-weight:700;color:var(--green);opacity:0;pointer-events:none;}
.tv4-swipe-left{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,184,0,.15);display:flex;align-items:center;justify-content:flex-end;padding-right:14px;font-size:11px;font-weight:700;color:var(--amber);opacity:0;pointer-events:none;}
.tv4-zone-week{background:var(--bg1);border:1px solid var(--b);border-radius:14px;padding:12px;margin-bottom:10px;}
.tv4-week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.tv4-day-cell{text-align:center;cursor:pointer;}
.tv4-day-letter{font-size:8px;color:var(--g1);margin-bottom:2px;}
.tv4-day-num{font-size:10px;color:var(--g1);background:var(--bg);border-radius:6px;padding:4px 2px;position:relative;transition:all .15s;}
.tv4-day-num.today{background:var(--cyan);color:#000;font-weight:800;}
.tv4-day-num.selected{background:rgba(0,212,255,.2);border:1px solid rgba(0,212,255,.4);color:var(--w);}
.tv4-day-num.has-urgent::after{content:'';width:4px;height:4px;background:var(--red);border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%);}
.tv4-day-num.has-tasks::after{content:'';width:4px;height:4px;background:var(--green);border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%);}
.tv4-week-tasks{margin-top:2px;}
.tv4-week-task{background:var(--bg);border-radius:8px;padding:7px 10px;margin-bottom:4px;font-size:11px;color:var(--w);display:flex;align-items:center;gap:8px;cursor:pointer;}
.tv4-week-task.urgent{border-left:2px solid var(--red);}
.tv4-week-day-lbl{font-size:9px;color:var(--g1);margin-bottom:5px;font-weight:700;letter-spacing:.06em;}
.tv4-week-add{font-size:11px;color:var(--g1);text-align:center;padding:6px;border:1px dashed var(--b);border-radius:8px;cursor:pointer;margin-top:4px;}
.tv4-see-all{font-size:10px;color:var(--cyan);font-weight:700;cursor:pointer;}
.tv4-zone-plan{background:var(--bg1);border:1px dashed var(--b);border-radius:14px;padding:12px;}
.tv4-plan-links{font-size:10px;color:var(--g1);cursor:pointer;}
.tv4-mini-month{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px;}
.tv4-mini-day{text-align:center;font-size:8px;padding:2px;border-radius:3px;color:var(--g1);cursor:pointer;}
.tv4-mini-day.today{background:var(--cyan);color:#000;font-weight:800;}
.tv4-mini-day.has-urgent{color:var(--red);background:rgba(255,58,92,.1);}
.tv4-mini-day.has-tasks{color:var(--w);background:rgba(0,229,160,.08);}
.tv4-mini-day.other-month{opacity:.25;}
.tv4-planner{position:fixed;inset:0;background:var(--bg);z-index:800;display:flex;flex-direction:column;animation:pageIn .2s cubic-bezier(.22,1,.36,1);}
.tv4-planner-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;}
.tv4-planner-title{font-size:17px;font-weight:800;color:var(--w);}
.tv4-planner-close{font-size:12px;font-weight:700;color:var(--cyan);cursor:pointer;padding:6px 10px;}
.tv4-planner-tabs{display:flex;gap:3px;background:var(--bg1);border-radius:10px;padding:3px;margin:0 14px 14px;}
.tv4-planner-tab{flex:1;text-align:center;padding:7px;font-size:11px;color:var(--g1);border-radius:7px;cursor:pointer;font-weight:600;transition:all .15s;}
.tv4-planner-tab.active{background:var(--bg);color:var(--w);font-weight:700;}
.tv4-planner-body{flex:1;overflow-y:auto;padding:0 14px 80px;}
.tv4-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tv4-cal-month{font-size:14px;font-weight:800;color:var(--w);}
.tv4-cal-arrow{background:var(--bg1);border:1px solid var(--b);border-radius:6px;padding:4px 9px;color:var(--g1);cursor:pointer;font-size:12px;}
.tv4-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.tv4-cal-hdr{text-align:center;font-size:9px;color:var(--g1);font-weight:700;padding:2px;}
.tv4-cal-cell{text-align:center;padding:5px 2px;border-radius:6px;font-size:11px;color:var(--g1);cursor:pointer;position:relative;transition:background .1s;}
.tv4-cal-cell.today{background:var(--cyan);color:#000;font-weight:800;}
.tv4-cal-cell.selected{background:rgba(0,212,255,.2);border:1px solid rgba(0,212,255,.4);color:var(--w);}
.tv4-cal-cell.has-urgent::after{content:'';width:4px;height:4px;background:var(--red);border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%);}
.tv4-cal-cell.has-tasks::after{content:'';width:4px;height:4px;background:var(--green);border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%);}
.tv4-cal-cell.other-month{opacity:.3;}
.tv4-cal-tasks{margin-bottom:14px;}
.tv4-cal-day-hdr{font-size:10px;font-weight:700;color:var(--g1);letter-spacing:.07em;margin-bottom:6px;text-transform:uppercase;}
.tv4-cal-task{background:var(--bg1);border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:12px;color:var(--w);cursor:pointer;}
.tv4-cal-task.urgent{border-left:2px solid var(--red);}
.tv4-cal-add{font-size:11px;color:var(--g1);text-align:center;padding:7px;border:1px dashed var(--b);border-radius:8px;cursor:pointer;margin-bottom:14px;}
.tv4-week-plan{overflow-x:auto;}
.tv4-week-plan-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:420px;}
.tv4-week-plan-col{background:var(--bg1);border-radius:10px;padding:8px;}
.tv4-week-plan-col.today{border:1px solid rgba(0,212,255,.3);}
.tv4-week-plan-col-hdr{text-align:center;margin-bottom:6px;}
.tv4-week-plan-day{font-size:9px;color:var(--g1);}
.tv4-week-plan-num{font-size:13px;font-weight:800;color:var(--w);}
.tv4-week-plan-col.today .tv4-week-plan-num{color:var(--cyan);}
.tv4-week-plan-task{background:var(--bg);border-radius:6px;padding:5px 6px;margin-bottom:3px;font-size:10px;color:var(--w);cursor:pointer;}
.tv4-week-plan-task.urgent{border-left:2px solid var(--red);}
.tv4-week-plan-add{font-size:10px;color:var(--g1);text-align:center;padding:5px;border:1px dashed var(--b);border-radius:6px;cursor:pointer;margin-top:4px;}
.tv4-search-overlay{position:fixed;top:0;left:0;right:0;background:var(--bg);z-index:700;padding:14px;border-bottom:1px solid var(--b);animation:pageIn .15s ease;}
.tv4-search-input{width:100%;background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--w);outline:none;box-sizing:border-box;}
.tv4-search-results{margin-top:12px;max-height:60vh;overflow-y:auto;}

`;

const styleEl=document.createElement('style');
styleEl.id='v8-styles';
styleEl.textContent=v8css;
document.head.appendChild(styleEl);

// ── DOM shell — bottom sheet (reuse existing FAB/modal/overlay) ───────────────
document.body.insertAdjacentHTML('beforeend',`
<div id="v8-sheet-bg" onclick="closeQuickSheet()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400"></div>
<div id="v8-sheet" style="position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-radius:20px 20px 0 0;padding:20px;z-index:500;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto">
  <div style="width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px"></div>
  <div id="v8-sheet-content"></div>
</div>
`);

// Redirect FAB to open quick sheet
const _origFab=document.getElementById('fab');
if(_origFab){_origFab.onclick=function(){openQuickSheet();};_origFab.title='Ajouter';}

// ── Bank balance ──────────────────────────────────────────────────────────────
window.getBankBalance=function(){return S.config.bankBalance||0;};
window.setBankBalance=function(v){S.config.bankBalance=parseFloat(v)||0;save();};
window.promptBalance=function(){
  const bal=getBankBalance();
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">💳 Solde bancaire</div>
    <div class="form-group">
      <label>Solde actuel (€)</label>
      <input id="v8-bal-input" type="number" placeholder="0.00" step="0.01" value="${bal||''}" style="font-size:24px;text-align:center;font-family:var(--font-mono)"/>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="confirmBalance()">Enregistrer</button>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('v8-bal-input');if(el){el.focus();el.select();}},100);
};
window.confirmBalance=function(){
  const v=document.getElementById('v8-bal-input').value;
  setBankBalance(v);closeModal();render();toast('Solde mis à jour ✓');
};

// ── Quick-add sheet ────────────────────────────────────────────────────────────
window.openQuickSheet=function(type){
  const bg=document.getElementById('v8-sheet-bg');
  const sheet=document.getElementById('v8-sheet');
  const content=document.getElementById('v8-sheet-content');
  if(!type){
    content.innerHTML=`
      <div class="sheet-option" onclick="openQuickSheet('habit')">
        <div class="sheet-opt-icon" style="background:rgba(0,229,160,.15);font-size:22px">✅</div>
        <div><div class="sheet-opt-title">Valider une habitude</div><div class="sheet-opt-sub">Check-in rapide</div></div>
      </div>
      <div class="sheet-option" onclick="openQuickSheet('depense')">
        <div class="sheet-opt-icon" style="background:rgba(255,58,92,.15);font-size:22px">💸</div>
        <div><div class="sheet-opt-title">Ajouter une dépense</div><div class="sheet-opt-sub">Saisie rapide</div></div>
      </div>
      <div class="sheet-option" onclick="openQuickSheet('tache')">
        <div class="sheet-opt-icon" style="background:rgba(168,85,247,.15);font-size:22px">📝</div>
        <div><div class="sheet-opt-title">Créer une tâche</div><div class="sheet-opt-sub">Ajouter à la to-do</div></div>
      </div>`;
  } else if(type==='habit'){
    closeQuickSheet();openRattrapage();return;
  } else if(type==='depense'){
    const cats=(S.config.categories||[{name:'Alimentation',emoji:'🍔'},{name:'Transport',emoji:'🚗'},{name:'Loisirs',emoji:'🎮'},{name:'Santé',emoji:'💊'},{name:'Autre',emoji:'📦'}]);
    const opts=cats.map(c=>`<option value="${c.name}">${c.emoji} ${c.name}</option>`).join('');
    content.innerHTML=`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:14px;color:var(--w)">💸 Dépense rapide</h3>
      <div class="v8-sheet-form">
        <input id="qs-amount" type="number" placeholder="Montant (€)" step="0.01" min="0"/>
        <select id="qs-cat">${opts}</select>
        <input id="qs-label" type="text" placeholder="Description (optionnel)"/>
        <button onclick="confirmQuickDepense()">Ajouter</button>
      </div>`;
  } else if(type==='tache'){
    content.innerHTML=`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:14px;color:var(--w)">📝 Nouvelle tâche</h3>
      <div class="v8-sheet-form">
        <input id="qs-task" type="text" placeholder="Que fais-tu ?"/>
        <button onclick="confirmQuickTask()">Créer</button>
      </div>`;
    setTimeout(()=>{const el=document.getElementById('qs-task');if(el)el.focus();},200);
  }
  bg.style.display='block';sheet.style.transform='translateY(0)';
};
window.closeQuickSheet=function(){
  const bg=document.getElementById('v8-sheet-bg');
  const sheet=document.getElementById('v8-sheet');
  if(bg)bg.style.display='none';
  if(sheet)sheet.style.transform='translateY(100%)';
};
window.confirmQuickDepense=function(){
  const amt=parseFloat(document.getElementById('qs-amount')?.value||0);
  const cat=document.getElementById('qs-cat')?.value||'Autre';
  const lbl=(document.getElementById('qs-label')?.value||cat).trim();
  if(!amt||amt<=0){toast('Montant invalide');return;}
  if(!S.finance)S.finance=[];
  S.finance.push({id:'t'+Date.now(),date:iso(),desc:lbl,cat,amt:-amt,type:'Dépense',tags:[],pending:false,note:''});
  save();closeQuickSheet();render();toast('Dépense ajoutée ✓');
};
window.confirmQuickTask=function(){
  const txt=document.getElementById('qs-task')?.value?.trim();
  if(!txt){toast('Texte vide');return;}
  const t=parseTaskInput(txt);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();closeQuickSheet();render();toast('Tâche créée ✓','var(--green)');
};

// ── Rattrapage / check-in modal ────────────────────────────────────────────────
window.openRattrapage=function(dateStr){
  const d=dateStr||iso();
  const day=S.habits[d]||{};
  const habs=H();
  let rows=habs.map(h=>{
    const done=!!day[h.id];
    return `<div class="habit-row">
      <div class="habit-toggle${done?' on':''}" onclick="toggleHabitRattrap('${d}','${h.id}',this)"></div>
      <span style="font-size:18px">${h.emoji||'📌'}</span>
      <span style="font-size:14px;color:var(--w);flex:1">${h.label||''}</span>
    </div>`;
  }).join('');
  if(!rows)rows='<p style="color:var(--g1);text-align:center;padding:16px">Aucune habitude — va dans Config</p>';
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✅ Check-in ${d===iso()?'Aujourd\'hui':d}</div>
    <div id="rattrap-list">${rows}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="saveCheckinRattrap('${d}')">Enregistrer</button>`;
  document.getElementById('overlay').classList.add('open');
};
window.toggleHabitRattrap=function(d,hid,el){
  if(!S.habits[d])S.habits[d]={};
  const cur=S.habits[d][hid];
  S.habits[d][hid]=cur?false:true;
  save();el.classList.toggle('on',!!S.habits[d][hid]);
};
window.saveCheckinRattrap=function(d){
  save();closeModal();render();toast('Check-in sauvegardé ✓');
};

// ── toggleHabitHome & toggleTaskV8 ────────────────────────────────────────────
window.checkAllHabits=function(){
  const d=iso();
  if(!S.habits[d])S.habits[d]={};
  H().forEach(h=>{if(!S.habits[d][h.id]){S.habits[d][h.id]=true;addXP(5,'habit check-all');}});
  save();render();toast('Toutes les habitudes cochées ✓','var(--green)');
};
window.toggleHabitHome=function(d,hid,el){
  if(!S.habits[d])S.habits[d]={};
  const cur=S.habits[d][hid];
  S.habits[d][hid]=cur?false:true;
  save();
  el.classList.toggle('done',!!S.habits[d][hid]);
  addXP(S.habits[d][hid]?5:-2,'habit toggle');
};
window.toggleTaskV8=function(id){
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  t.status=t.status==='done'?'todo':'done';
  if(t.status==='done'){t.completedAt=iso();addXP(t.xpReward||10,'tâche ✓');}
  save();render();
};
window.addTaskFromInput=function(){
  const inp=document.getElementById('v8-task-input');
  if(!inp||!inp.value.trim())return;
  const t=parseTaskInput(inp.value);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();inp.value='';render();toast('Tâche ajoutée ✓','var(--green)');
};

// ── Home V2 interactions ──────────────────────────────────────────────────────
window.setHomeHabView=function(v){window._homeHabView=v;render();};
window.setHomeTaskPri=function(p){window._homeTaskPri=p;render();};
window.setHomeTaskCat=function(c){window._homeTaskCat=c;render();};
window.setHomeTaskSort=function(s){window._homeTaskSort=s;render();};
window.toggleHomeFocus=function(){window._homeFocus=!window._homeFocus;render();};
window.cycleTaskStatus=function(id){
  var t=(S.tasks||[]).find(function(x){return x.id===id;});
  if(!t)return;
  var cyc={todo:'doing',doing:'done',done:'todo',blocked:'todo'};
  t.status=cyc[t.status]||'todo';
  if(t.status==='done'){t.completedAt=iso();addXP(t.xpReward||10,'tache done');}
  save();render();
};
window.toggleHabitWeekDay=function(dd,hid){
  if(!S.habits[dd])S.habits[dd]={};
  S.habits[dd][hid]=!S.habits[dd][hid];
  save();render();
};

// ── renderHomeV8 ──────────────────────────────────────────────────────────────
window.renderHomeV8=function(){
  // ── State
  var habView=window._homeHabView||'jour';
  var taskPri=window._homeTaskPri||'all';
  var taskCat=window._homeTaskCat||'all';
  var taskSort=window._homeTaskSort||'priority';
  var focusMode=!!window._homeFocus;

  // ── Core data
  var d=iso();
  var day=S.habits[d]||{};
  var habs=H();
  var mx=Math.max(habs.length,1);
  var rawScore=scoreDay(day);
  var score=Math.round(rawScore/mx*100);
  var habsDoneCount=habs.filter(function(h){return !!day[h.id];}).length;
  var streak=currentStreak();
  var bal=getBankBalance();
  var xp=S.config.xp||0;
  var lvl=getLevelInfo(xp);

  // ── Yesterday delta
  var yd=new Date();yd.setDate(yd.getDate()-1);
  var ydKey=yd.toISOString().slice(0,10);
  var scoreY=Math.round(scoreDay(S.habits[ydKey]||{})/mx*100);
  var delta=score-scoreY;
  var deltaHtml='<span class="sdelta '+(delta>0?'sd-up':delta<0?'sd-dn':'sd-eq')+'">'+(delta>0?'\u2191+'+delta:delta<0?'\u2193'+delta:'\u2192')+' vs hier</span>';

  // ── Context
  var hour=new Date().getHours();
  var greeting=hour<12?'Bonjour':hour<18?'Bon apr\u00E8s-midi':'Bonsoir';
  var name=(S.config.profile&&S.config.profile.name)?', '+S.config.profile.name:'';
  var perfEmoji=score>=80?'\uD83D\uDD25':score>=50?'\uD83D\uDC4A':'\uD83D\uDCAA';
  var isMorning=hour<14;
  var isEvening=hour>=19;
  var timeLabel=isMorning?'\uD83C\uDF05 Matin':isEvening?'\uD83C\uDF19 Soir':'\u2600\uFE0F Journ\u00E9e';
  var scoreColor=score>=80?'var(--green)':score>=50?'var(--amber)':'var(--red)';

  // ── Near record
  var bestStreakV=Math.max(S.config.bestStreak||0,streak);
  if(bestStreakV>=(S.config.bestStreak||0)){S.config.bestStreak=bestStreakV;}
  var nearRecord=streak>0&&bestStreakV>5&&streak>=bestStreakV-3&&streak<bestStreakV;

  // ── Week data
  var days7=[];
  for(var i=6;i>=0;i--){var dd=new Date();dd.setDate(dd.getDate()-i);days7.push(dd.toISOString().slice(0,10));}
  var dayNames7=['D','L','M','M','J','V','S'];
  var weekScores=days7.map(function(dd){return Math.round(scoreDay(S.habits[dd]||{})/mx*100);});
  var weekLabels=days7.map(function(dd){return dayNames7[new Date(dd+'T12:00:00').getDay()];});

  // ── Month stats
  var mk=mKey();
  var monthDayKeys=Object.keys(S.habits).filter(function(k){return k.startsWith(mk)&&k<=d;});
  var monthAvg=monthDayKeys.length?Math.round(monthDayKeys.reduce(function(s,dd){return s+Math.round(scoreDay(S.habits[dd]||{})/mx*100);},0)/monthDayKeys.length):0;
  var monthPerfect=monthDayKeys.filter(function(dd){return scoreDay(S.habits[dd]||{})>=mx;}).length;

  // ── Tasks
  var allTasks=(S.tasks||[]).filter(function(t){return t.status!=='done';});
  var totalPending=allTasks.length;
  if(focusMode)allTasks=allTasks.filter(function(t){return t.priority==='urgente';});
  if(taskPri!=='all')allTasks=allTasks.filter(function(t){return t.priority===taskPri;});
  if(taskCat!=='all')allTasks=allTasks.filter(function(t){return t.category===taskCat;});
  allTasks.sort(function(a,b){
    if(taskSort==='date'){if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);}
    if(taskSort==='alpha')return(a.text||'').localeCompare(b.text||'');
    var pri={urgente:0,haute:1,moyenne:2,basse:3};return(pri[a.priority]||2)-(pri[b.priority]||2);
  });
  var tasksShow=allTasks.slice(0,focusMode?20:8);
  var urgentTasks=(S.tasks||[]).filter(function(t){return t.priority==='urgente'&&t.status!=='done';});
  var habitsTodo=habs.length-habsDoneCount;

  // ── Finance snapshot
  var todayExpenses=(S.finance||[]).filter(function(t){return t.date===d&&t.amt<0;}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
  var monthExpenses=(S.finance||[]).filter(function(t){return t.date&&t.date.startsWith(mKey())&&t.amt<0;}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
  var recentTx=(S.finance||[]).slice(-3).reverse();

  // ── SCORE RING
  var scoreRing='<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:14px;gap:6px">'
    +'<div style="position:relative;width:120px;height:120px;cursor:pointer" onclick="openRattrapage()">'
    +'<div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient('+scoreColor+' '+score+'%,var(--b) '+score+'%);display:flex;align-items:center;justify-content:center">'
    +'<div style="width:90px;height:90px;border-radius:50%;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">'
    +'<div style="font-family:var(--font-mono);font-size:26px;font-weight:800;color:'+scoreColor+'">'+score+'<span style="font-size:13px">%</span></div>'
    +'<div style="font-size:10px;color:var(--g1)">Aujourd\'hui</div>'
    +(habs.length>0?'<div style="font-size:9px;color:'+(habsDoneCount===habs.length?'var(--green)':'var(--g1)')+'">'+habsDoneCount+'/'+habs.length+' hab.</div>':'')
    +'</div></div></div>'
    +deltaHtml+'</div>';

  // ── STAT CARDS
  var balDisplay=bal<=0?'\u2014':bal<100?bal.toFixed(2)+'\u20AC':bal<10000?Math.round(bal)+'\u20AC':(bal/1000).toFixed(1)+'k\u20AC';
  var nearRecordBanner=nearRecord?'<div style="background:rgba(255,184,0,.12);border:1px solid var(--amber);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--amber)">\uD83C\uDFC6 Plus que '+(bestStreakV-streak)+' jour'+(bestStreakV-streak>1?'s':'')+' pour battre ton record de '+bestStreakV+' jours !</div>':'';

  var statCards='<div class="grid3" style="gap:8px;margin-bottom:12px">'
    +'<div class="v8-stat-card v8-anim"><div class="v8-stat-val" style="color:var(--amber)">'+streak+'<span style="font-size:13px">\uD83D\uDD25</span></div><div class="v8-stat-lbl">Streak</div></div>'
    +'<div class="v8-stat-card v8-anim-1" onclick="promptBalance()" style="cursor:pointer"><div class="v8-stat-val" style="color:'+(bal>0?'var(--cyan)':'var(--g1)')+';font-size:'+(bal>0&&bal>=1000?'18px':'22px')+'">'+balDisplay+'</div><div class="v8-stat-lbl">Solde \uD83D\uDCB3</div></div>'
    +'<div class="v8-stat-card v8-anim-2"><div class="v8-stat-val v8-gradient-text" style="font-size:17px">'+lvl.name+'</div><div class="v8-stat-lbl">Niv. '+lvl.lvl+'</div></div>'
    +'</div>';

  var monthStrip='<div class="hms-strip">'
    +'<div class="hms-cell v8-anim-1"><div class="hms-val" style="color:'+(monthAvg>=70?'var(--green)':monthAvg>=40?'var(--amber)':'var(--red)')+'">'+monthAvg+'%</div><div class="hms-lbl">Moy. du mois</div></div>'
    +'<div class="hms-cell v8-anim-2"><div class="hms-val" style="color:var(--green)">'+monthPerfect+'</div><div class="hms-lbl">Jours parfaits</div></div>'
    +'<div class="hms-cell v8-anim-3"><div class="hms-val" style="color:var(--cyan)">'+totalPending+'</div><div class="hms-lbl">T\u00E2ches actives</div></div>'
    +'</div>';

  // ── HABIT VIEWS
  // Jour
  var habCardsJour=habs.length?habs.map(function(h){
    var done=!!(day[h.id]);
    return '<div class="v8-hab-card'+(done?' done':'')+'" onclick="toggleHabitHome(\''+d+'\',\''+h.id+'\',this)"><span class="hc-icon">'+(h.emoji||'\uD83D\uDCCC')+'</span><div class="hc-name">'+(h.label||'')+'</div></div>';
  }).join(''):'<p style="color:var(--g1);font-size:13px;grid-column:1/-1">Aucune habitude \u2014 <a onclick="nav(\'config\')" style="color:var(--cyan);cursor:pointer">Configurer</a></p>';
  var jourView='<div class="v8-hab-grid v8-anim">'+habCardsJour+'</div>';

  // Semaine
  var semaineHdr='<th class="hwg-nh">Habitude</th>'
    +days7.map(function(dd){return '<th style="'+(dd===d?'color:var(--cyan)':'')+'">'+new Date(dd+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short'}).charAt(0).toUpperCase()+'</th>';}).join('')
    +'<th>Mois</th>';
  var semaineRows=habs.length?habs.map(function(h){
    var habMonthDone=monthDayKeys.filter(function(dd){return S.habits[dd]&&S.habits[dd][h.id]===true;}).length;
    var habPct=monthDayKeys.length?Math.round(habMonthDone/monthDayKeys.length*100):0;
    var pctC=habPct>=80?'var(--green)':habPct>=50?'var(--amber)':'var(--red)';
    var dots=days7.map(function(dd){
      var done=S.habits[dd]&&S.habits[dd][h.id]===true;
      var noData=!S.habits[dd];
      var isFuture=dd>d;
      var isToday=dd===d;
      var cls='hwg-dot '+(done?'hd-done':(isFuture||noData)?'hd-empty':'hd-miss')+(isToday?' hd-today':'');
      var inner=done?'\u2713':((!isFuture&&!noData)?'\u00D7':'');
      return '<td><div class="'+cls+'" onclick="toggleHabitWeekDay(\''+dd+'\',\''+h.id+'\')">'+inner+'</div></td>';
    }).join('');
    return '<tr><td class="hwg-nc"><span class="hwg-hname">'+(h.emoji||'\uD83D\uDCCC')+' '+(h.label||'')+'</span></td>'+dots+'<td class="hwg-pct" style="color:'+pctC+'">'+habPct+'%</td></tr>';
  }).join(''):'<tr><td colspan="9" style="color:var(--g1);font-size:12px;padding:8px">Aucune habitude</td></tr>';
  var semaineView='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="hwg"><thead><tr>'+semaineHdr+'</tr></thead><tbody>'+semaineRows+'</tbody></table></div>';

  // Mois
  var nowD=new Date();
  var mStart=new Date(nowD.getFullYear(),nowD.getMonth(),1);
  var mEnd=new Date(nowD.getFullYear(),nowD.getMonth()+1,0);
  var firstDow=(mStart.getDay()+6)%7;
  var numDays=mEnd.getDate();
  var calCells='';
  for(var ci=0;ci<firstDow;ci++)calCells+='<div class="hmc-day" style="background:transparent;pointer-events:none"></div>';
  for(var n=1;n<=numDays;n++){
    var cdd=nowD.getFullYear()+'-'+String(nowD.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(2,'0');
    var cFuture=cdd>d;
    var cToday=cdd===d;
    var cScore=S.habits[cdd]?Math.round(scoreDay(S.habits[cdd])/mx*100):null;
    var bg,col;
    if(cFuture||cScore===null){bg='var(--bg2)';col='var(--g2)';}
    else if(cScore>=80){bg='rgba(0,229,160,.25)';col='var(--green)';}
    else if(cScore>=50){bg='rgba(255,184,0,.2)';col='var(--amber)';}
    else if(cScore>0){bg='rgba(255,58,92,.15)';col='var(--red)';}
    else{bg='var(--bg3)';col='var(--g2)';}
    calCells+='<div class="hmc-day'+(cToday?' hmc-today':'')+'" style="background:'+bg+';color:'+col+';'+(cFuture?'opacity:.3':'')+'" onclick="openRattrapage(\''+cdd+'\')">'+n+'</div>';
  }
  var moisView='<div>'
    +'<div class="hmc-dow">'+['L','M','M','J','V','S','D'].map(function(l){return '<div class="hmc-dow-l">'+l+'</div>';}).join('')+'</div>'
    +'<div class="hmc-grid">'+calCells+'</div>'
    +'<div class="hmc-legend"><span style="color:var(--green)">\u25A0 \u226580%</span> <span style="color:var(--amber)">\u25A0 \u226550%</span> <span style="color:var(--red)">\u25A0 >0%</span> <span>\u25A0 Vide</span></div>'
    +'</div>';

  var habViewHtml=habView==='semaine'?semaineView:habView==='mois'?moisView:jourView;

  // ── TASK ITEMS
  var priLabels={urgente:'URGENT',haute:'HAUTE',moyenne:'MOYEN',basse:'BAS'};
  var priCls={urgente:'v8-priority-urgent',haute:'v8-priority-moyen',moyenne:'v8-priority-bas',basse:'v8-priority-bas'};
  var stCls={todo:'tsb-todo',doing:'tsb-doing',done:'tsb-done',blocked:'tsb-blocked'};
  var stInner={todo:'',doing:'\u25B6',done:'\u2713',blocked:'!'};

  var taskRowsHtml=tasksShow.length?tasksShow.map(function(t){
    var cat=TASK_CATEGORIES.find(function(c){return c.id===t.category;})||{emoji:'\uD83D\uDCCC',label:'Perso'};
    var pri=t.priority||'moyenne';
    var st=t.status||'todo';
    var dueLbl='';
    if(t.dueDate){
      if(t.dueDate===d)dueLbl='<span style="color:var(--cyan)">\uD83D\uDCC5 Auj.</span>';
      else if(t.dueDate<d)dueLbl='<span style="color:var(--red)">\u26A0 '+fmtDate(t.dueDate)+'</span>';
      else dueLbl='<span>\uD83D\uDCC5 '+fmtDate(t.dueDate)+'</span>';
    }
    var subs=(t.subtasks||[]).length?'<span>\uD83D\uDCCE '+(t.subtasks||[]).filter(function(s){return s.done;}).length+'/'+(t.subtasks||[]).length+'</span>':'';
    return '<div class="v8-tv2">'
      +'<div class="tsb '+(stCls[st]||'tsb-todo')+'" onclick="event.stopPropagation();cycleTaskStatus(\''+t.id+'\')">'+( stInner[st]||'')+'</div>'
      +'<div class="tv2-body">'
      +'<div class="tv2-title'+(st==='done'?' tv2-done':'')+'">'+cat.emoji+' '+(t.text||'')+'</div>'
      +(dueLbl||subs?'<div class="tv2-meta">'+dueLbl+subs+'</div>':'')
      +'</div>'
      +'<div class="tv2-right"><span class="v8-priority-badge '+(priCls[pri]||'v8-priority-bas')+'">'+(priLabels[pri]||'BAS')+'</span><span class="v8-xp-badge">+'+(t.xpReward||10)+'XP</span></div>'
      +'</div>';
  }).join(''):'<div style="color:var(--g1);font-size:13px;padding:12px 0;text-align:center">'+(focusMode?'\uD83C\uDFAF Aucune t\u00E2che urgente !':'Aucune t\u00E2che \u2014 ajoute-en une ci-dessous')+'</div>';

  var activeCats=[...new Set((S.tasks||[]).filter(function(t){return t.status!=='done';}).map(function(t){return t.category;}))].filter(Boolean);
  var catPillsHtml=activeCats.length>1?'<div class="home-pills">'
    +'<button class="home-pill'+(taskCat==='all'?' hp-active':'')+'" onclick="setHomeTaskCat(\'all\')">Tout</button>'
    +activeCats.map(function(cid){var c=TASK_CATEGORIES.find(function(x){return x.id===cid;})||{emoji:'\uD83D\uDCCC',label:cid};return '<button class="home-pill'+(taskCat===cid?' hp-active':'')+'" onclick="setHomeTaskCat(\''+cid+'\')">'+c.emoji+' '+c.label+'</button>';}).join('')
    +'</div>':'';

  // ── MORNING / EVENING
  var morningPriorities='';
  if(isMorning){
    var top=(S.tasks||[]).filter(function(t){return t.status!=='done'&&(t.priority==='urgente'||t.priority==='haute');}).sort(function(a,b){var p={urgente:0,haute:1};return(p[a.priority]||1)-(p[b.priority]||1);}).slice(0,3);
    if(top.length)morningPriorities='<div class="v8-card v8-anim-3" style="padding:12px 16px;margin-bottom:16px;border-color:rgba(255,184,0,.3)"><div class="v8-sec" style="margin:0 0 8px;color:var(--amber)">\uD83C\uDF05 Priorit\u00E9s du matin</div>'+top.map(function(t){return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--w)"><span style="color:'+(t.priority==='urgente'?'var(--red)':'var(--amber)')+'">\u25CF</span><span>'+t.text+'</span></div>';}).join('')+'</div>';
  }
  var eveningBilan='';
  if(isEvening){
    var tdoneToday=(S.tasks||[]).filter(function(t){return t.status==='done'&&t.completedAt===d;}).length;
    var daySpend=(S.finance||[]).filter(function(t){return t.date===d&&t.amt<0;}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
    eveningBilan='<div class="v8-card v8-anim-3" style="padding:12px 16px;margin-bottom:16px;border-color:rgba(168,85,247,.3)"><div class="v8-sec" style="margin:0 0 8px;color:var(--purp)">\uD83C\uDF19 Bilan du soir</div><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px"><span>Habitudes: <strong style="color:var(--cyan)">'+habsDoneCount+'/'+habs.length+'</strong></span><span>T\u00E2ches: <strong style="color:var(--green)">'+tdoneToday+'</strong></span><span>D\u00E9penses: <strong style="color:var(--red)">'+daySpend.toFixed(0)+'\u20AC</strong></span></div></div>';
  }

  // ── CHART (jour only)
  var fallbackBars=weekScores.map(function(s,i){
    var ht=Math.max(4,Math.round(s*1.1));
    var bg=s>=80?'var(--green)':s>=50?'var(--amber)':s>0?'rgba(255,58,92,.7)':'rgba(30,45,61,.8)';

// ── waitForChart helper ────────────────────────────────────────────────────────
function waitForChart(fn, attempt) {
  if (typeof Chart !== 'undefined') { fn(); return; }
  if ((attempt||0) > 20) return; // give up after 2s
  setTimeout(function(){ waitForChart(fn, (attempt||0)+1); }, 100);
}

// ── initChartsHome ────────────────────────────────────────────────────────────
window.initChartsHome=function(){
  waitForChart(function(){
    const canvas=document.getElementById('chart-home-week');
    if(!canvas)return;
    if(canvas._chart){canvas._chart.destroy();}
    // Compute week data directly (reliable vs. global vars)
    const habs=H();
    const mx=Math.max(habs.length,1);
    const days7=[];
    for(let i=6;i>=0;i--){const dd=new Date();dd.setDate(dd.getDate()-i);days7.push(dd.toISOString().slice(0,10));}
    const dayNames=['D','L','M','M','J','V','S'];
    const scores=days7.map(dd=>Math.round(scoreDay(S.habits[dd]||{})/mx*100));
    const labels=days7.map(dd=>dayNames[new Date(dd+'T12:00:00').getDay()]);
    const barColors=scores.map(s=>s>=80?'rgba(0,229,160,.8)':s>=50?'rgba(255,184,0,.8)':s>0?'rgba(255,58,92,.7)':'rgba(30,45,61,.8)');
    // Show canvas, hide CSS fallback — wait for reflow first
    canvas.style.display='block';
    const fallback=document.getElementById('chart-home-fallback');
    requestAnimationFrame(function(){
      if(fallback)fallback.style.display='none';
      try {
        canvas._chart=new Chart(canvas,{
          type:'bar',
          data:{labels,datasets:[{data:scores,backgroundColor:barColors,borderRadius:6,borderSkipped:false}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+'%'}}},scales:{x:{grid:{display:false},ticks:{color:'#8B9BAD',font:{size:11}}},y:{display:false,max:110}},animation:{duration:600}}
        });
      } catch(e) {
        if(fallback)fallback.style.display='flex';
        canvas.style.display='none';
      }
    });
  });
};

// ── Deduplication ─────────────────────────────────────────────────────────────
window.findDuplicates=function(){
  const txMap={};
  const dups=[];
  (S.finance||[]).forEach(t=>{
    const key=`${t.date}|${t.amt}|${(t.desc||'').slice(0,20)}`;
    if(txMap[key]) dups.push(t.id);
    else txMap[key]=t.id;
  });
  return dups;
};
window.deduplicateTransactions=function(){
  const dups=findDuplicates();
  if(!dups.length){toast('Aucun doublon détecté ✓','var(--green)');return;}
  const msg=`${dups.length} doublon(s) détecté(s). Supprimer ?`;
  if(confirm(msg)){
    S.finance=S.finance.filter(t=>!dups.includes(t.id));
    save();render();toast(`${dups.length} doublon(s) supprimé(s) ✓`,'var(--green)');
  }
};

window.renderStatsV8=function(){
  const tab=window._statsTab;

    <button class="v8-tab${tab==='analytics'?' active':''}" onclick="window._statsTab='analytics';render()">Statistiques</button>

  </div>`;
  let body='';
  const mx30=Math.max(H().length,1);
  if(tab==='analytics'){
    const scores30=[];const labels30=[];
    for(let i=29;i>=0;i--){const dd=new Date();dd.setDate(dd.getDate()-i);const k=dd.toISOString().slice(0,10);scores30.push(Math.round(scoreDay(S.habits[k]||{})/mx30*100));labels30.push(k.slice(5));}
    const avg30=Math.round(scores30.reduce((a,b)=>a+b,0)/scores30.length);
    const weekDays=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const weekAvgs=weekDays.map((_,i)=>{
      const sc=[];for(let w=0;w<4;w++){const dd=new Date();const diff=((dd.getDay()-1-i+7)%7)+w*7;dd.setDate(dd.getDate()-diff);const k=dd.toISOString().slice(0,10);sc.push(Math.round(scoreDay(S.habits[k]||{})/mx30*100));}
      return Math.round(sc.reduce((a,b)=>a+b,0)/sc.length);
    });
    // C2 — Week comparison
    const thisWeekStart=new Date();thisWeekStart.setDate(thisWeekStart.getDate()-7);
    const prevWeekStart=new Date();prevWeekStart.setDate(prevWeekStart.getDate()-14);
    const weekScoreAvg=(start,days)=>{let s=0;for(let i=0;i<days;i++){const d=new Date(start);d.setDate(d.getDate()+i);const k=d.toISOString().slice(0,10);s+=Math.round(scoreDay(S.habits[k]||{})/mx30*100);}return Math.round(s/days);};
    const thisWeekAvg=weekScoreAvg(thisWeekStart,7);
    const prevWeekAvg=weekScoreAvg(prevWeekStart,7);
    const weekDelta=thisWeekAvg-prevWeekAvg;
    body=`
      <div class="grid2" style="gap:8px;margin-bottom:12px">
        <div class="v8-stat-card" style="padding:10px">
          <div style="font-size:10px;color:var(--g1);margin-bottom:4px">Cette semaine</div>
          <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--cyan)">${thisWeekAvg}%</div>
        </div>
        <div class="v8-stat-card" style="padding:10px">
          <div style="font-size:10px;color:var(--g1);margin-bottom:4px">Semaine précédente</div>
          <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--g1)">${prevWeekAvg}%</div>
          <div style="font-size:11px;color:${weekDelta>=0?'var(--green)':'var(--red)'};margin-top:2px">${weekDelta>=0?'↑':'↓'} ${Math.abs(weekDelta)}%</div>
        </div>
      </div>
      <div class="v8-card v8-anim" style="padding:14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span class="v8-sec" style="margin:0">Score 30 jours</span>
          <span style="font-size:13px;color:${avg30>=70?'var(--green)':avg30>=40?'var(--amber)':'var(--red)'};font-weight:700;font-family:var(--font-mono)">Moy: ${avg30}%</span>
        </div>
        <div style="position:relative;height:140px"><canvas id="chart-stats-line" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas></div>
      </div>
      <div class="grid2" style="gap:8px">
        ${weekDays.map((dn,i)=>{const col=weekAvgs[i]>=70?'var(--green)':weekAvgs[i]>=40?'var(--amber)':'var(--red)';return `<div class="v8-stat-card" style="padding:10px"><div style="font-size:12px;color:var(--g1);margin-bottom:4px">${dn}</div><div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:${col}">${weekAvgs[i]}%</div></div>`;}).join('')}
      </div>
      <div class="v8-sec" style="margin-top:16px">Année en pixels</div>
      <div class="v8-card v8-anim" style="padding:12px;overflow-x:auto">
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          ${(()=>{const heatDays=[];const heatStart=new Date();heatStart.setFullYear(heatStart.getFullYear()-1);heatStart.setDate(heatStart.getDate()+1);for(let i=0;i<365;i++){const d=new Date(heatStart);d.setDate(heatStart.getDate()+i);const k=d.toISOString().slice(0,10);const sc=Math.round(scoreDay(S.habits[k]||{})/mx30*100);heatDays.push({k,sc});}return heatDays.map(({k,sc})=>{const col=sc>=80?'#00E5A0':sc>=50?'#FFB800':sc>=20?'#FF8C42':'var(--bg3)';return `<div title="${k}: ${sc}%" style="width:10px;height:10px;border-radius:2px;background:${col};flex-shrink:0"></div>`;}).join('');})()}
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;font-size:10px;color:var(--g1);align-items:center">
          <span>Moins</span>
          <div style="width:10px;height:10px;border-radius:2px;background:var(--bg3)"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#FF8C42"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#FFB800"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#00E5A0"></div>
          <span>Plus</span>
        </div>
      </div>
    <script>window._statsScores30=${JSON.stringify(scores30)};window._statsLabels30=${JSON.stringify(labels30)};<\/script>`;
  } else if(tab==='goals'){
    const goals=S.config.goals||[];
    if(goals.length){
      body=goals.map(g=>{
        const val=parseFloat(g.current||0),target=parseFloat(g.target||1);
        const p=Math.min(100,Math.round(val/target*100));
        const col=p>=80?'var(--green)':p>=50?'var(--cyan)':'var(--amber)';
        return `<div class="v8-goal-row v8-card v8-anim" style="margin-bottom:10px">
          <div class="v8-goal-header"><span class="v8-goal-name">${g.emoji||'🎯'} ${g.name||'Objectif'}</span><span class="v8-goal-val">${val}/${target}</span></div>

          <div style="font-size:11px;color:var(--g1);margin-top:4px">${p}% atteint</div>
        </div>`;
      }).join('');
    } else {
      body=renderGoals();
    }
  } else {
    const earned=new Set(S.config.badges||[]);
    const badges=typeof BADGES_DEF!=='undefined'?BADGES_DEF:[];
    body=`<div class="v8-badge-grid">
      ${badges.map(b=>{const u=earned.has(b.id);return `<div class="v8-badge-item${u?' unlocked':''}" style="opacity:${u?1:.35}" title="${b.desc||b.label||''}">

      </div>`;}).join('')}
    </div>`;
    if(!badges.length)body='<p style="color:var(--g1);text-align:center;padding:20px">Aucun badge défini</p>';
  }
  return `<div class="page"><div class="page-title" style="margin-bottom:16px">📊 Stats</div>${tabs}${body}</div>`;
};

// ── Feature 7: Tâches récurrentes — auto-regen ────────────────────────────────
window.checkRecurringTasks = function(){
  var today = iso();
  (S.tasks||[]).filter(function(t){return t.recurring && t.status==='done' && t.completedAt === today;}).forEach(function(t){
    var next = null;
    if(t.recurring==='daily') next = isoPlus(today,1);
    else if(t.recurring==='weekly') next = isoPlus(today,7);
    else if(t.recurring==='monthly'){ var d=new Date(today+'T12:00:00'); d.setMonth(d.getMonth()+1); next=d.toISOString().slice(0,10);}
    else if(t.recurring==='weekdays'){ var n=1; var base=new Date(today+'T12:00:00'); while(true){base.setDate(base.getDate()+1);var dw=base.getDay();if(dw!==0&&dw!==6){next=base.toISOString().slice(0,10);break;}} }
    if(next){
      var already=(S.tasks||[]).some(function(x){return x.text===t.text&&x.dueDate===next&&x.status!=='done';});
      if(!already){
        var copy={id:'t'+Date.now()+Math.random().toString(36).slice(2,5),text:t.text,status:'todo',priority:t.priority,category:t.category,dueDate:next,recurring:t.recurring,xpReward:t.xpReward||10,order:Date.now(),createdAt:today,tags:t.tags||[],duration:t.duration||null,projectId:t.projectId||null,goalId:t.goalId||null,note:'',subtasks:[],progress:0};
        S.tasks.push(copy);
        save();
      }
    }
  });
};

// ── Feature 20: Escalade de priorité auto ─────────────────────────────────────
window.autoEscalatePriority = function(){
  var today = iso();
  var changed = false;
  (S.tasks||[]).filter(function(t){return t.status!=='done'&&t.dueDate&&t.dueDate<today;}).forEach(function(t){
    if(t.priority==='basse'){t.priority='moyenne';changed=true;}
    else if(t.priority==='moyenne'){t.priority='haute';changed=true;}
  });
  if(changed) save();
};

// ── Feature 19: Rappels & notifications ───────────────────────────────────────
window.requestNotifPerm = function(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
};
window.scheduleAllReminders = function(){
  if(!('Notification' in window)) return;
  var now = new Date();
  (S.tasks||[]).filter(function(t){return t.reminder && t.status!=='done';}).forEach(function(t){
    if(!t.dueDate) return;
    var parts = t.reminder.split(':');
    if(parts.length<2) return;
    var fireAt = new Date(t.dueDate+'T'+t.reminder+':00');
    var diff = fireAt - now;
    if(diff>0 && diff<86400000){
      setTimeout(function(){
        if(Notification.permission==='granted'){
          new Notification('Rappel: '+t.text,{body:'Tâche due aujourd\'hui à '+t.reminder,icon:'/favicon.ico'});
        }
      },diff);
    }
  });
};

// ── Feature 24: Streak de complétion ─────────────────────────────────────────
window.getTaskStreak = function(){
  var streak = 0;
  var d = new Date();
  while(true){
    var key = d.toISOString().slice(0,10);
    var hasDone = (S.tasks||[]).some(function(t){return t.completedAt===key;});
    if(!hasDone) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
};

// ── Feature 22: Récapitulatif journalier ─────────────────────────────────────
window.getDailyRecap = function(){
  var today = iso();
  var done = (S.tasks||[]).filter(function(t){return t.completedAt===today;});
  var pending = (S.tasks||[]).filter(function(t){return t.status!=='done';});
  var xpEarned = done.reduce(function(s,t){return s+(t.xpReward||10);},0);
  return {done:done.length, pending:pending.length, xpEarned:xpEarned};
};

// ── Feature 16: Pomodoro ──────────────────────────────────────────────────────
window.startPomodoro = function(taskId){
  if(window._pomo.iv) clearInterval(window._pomo.iv);
  var t = (S.tasks||[]).find(function(x){return x.id===taskId;});
  window._pomo = {taskId:taskId,secs:1500,max:1500,iv:null,paused:false,label:t?t.text:''};
  window._pomo.iv = setInterval(function(){
    if(window._pomo.paused) return;
    window._pomo.secs--;
    if(window._pomo.secs<=0){
      clearInterval(window._pomo.iv);
      window._pomo.taskId=null;
      addXP(5,'pomodoro');
      if(Notification.permission==='granted') new Notification('🍅 Pomodoro terminé!',{body:'25 minutes de focus — +5 XP'});
      toast('🍅 Pomodoro terminé! +5 XP','var(--green)');
    }
    var bar = document.getElementById('tv3-pomo-time');
    if(bar){ var m=Math.floor(window._pomo.secs/60),s=window._pomo.secs%60; bar.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
  },1000);
  render();
  toast('🍅 Pomodoro démarré — 25 min','var(--red)');
};
window.pausePomodoro = function(){
  window._pomo.paused = !window._pomo.paused;
  var btn = document.getElementById('tv3-pomo-pause');
  if(btn) btn.textContent = window._pomo.paused?'▶':'⏸';
};
window.stopPomodoro = function(){
  if(window._pomo.iv) clearInterval(window._pomo.iv);

  render();
};
