window.renderArgentV8=function(){
  const bal=getBankBalance();
  const goal=parseFloat(S.config.savingsGoal||4000);
  const pct=goal>0?Math.min(100,Math.round(bal/goal*100)):0;
  const mk=mKey();
  // expenses from S.finance (negative amounts = dépenses)
  const expenses=[...S.finance].filter(t=>t.type==='Dépense'||t.amt<0).sort((a,b)=>b.date.localeCompare(a.date));
  const expRows=expenses.slice(0,20).map(e=>{
    const cats={Alimentation:'🍔',Transport:'🚗',Loisirs:'🎮',Santé:'💊',Logement:'🏠',Vêtements:'👕',Épargne:'💰',Revenu:'💵'};
    const ico=cats[e.cat]||'📦';
    return `<div class="tx-row" style="padding:10px 16px">
      <div class="tx-icon" style="background:var(--bg3)">${ico}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc||e.cat}</div>
        <div style="font-size:12px;color:var(--g1)">${e.date}</div>
      </div>
      <div class="tx-amt" style="color:${e.amt<0?'var(--red)':'var(--green)'}">${e.amt<0?'–':'+'}${Math.abs(e.amt).toFixed(2)}€</div>
    </div>`;
  }).join('');

  const totalMonth=(()=>{let t=0;expenses.filter(e=>e.date.startsWith(mk)).forEach(e=>t+=Math.abs(e.amt));return t.toFixed(2);})();

  return `<div class="page">
    <div class="page-title">💰 Finances</div>
    <div class="v8-balance-hero card" onclick="promptBalance()" style="cursor:pointer;text-align:center;padding:20px;margin-bottom:12px">
      <div style="font-size:12px;color:var(--g1);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Solde bancaire · tap pour modifier</div>
      <div style="font-family:var(--font-mono);font-size:36px;font-weight:700;color:${bal>0?'var(--cyan)':'var(--g1)'}">${bal>0?bal.toFixed(2)+'€':'—'}</div>
      <div style="font-size:12px;color:var(--g1);margin-top:6px">${pct}% de l'objectif ${goal>0?goal+'€':''}</div>
      <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="card" style="text-align:center">
        <div class="stat-num" style="color:var(--red);font-size:22px">${totalMonth}€</div>
        <div class="stat-label">Dépenses ce mois</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="stat-num" style="color:var(--cyan);font-size:22px">${bal>0?(bal-parseFloat(totalMonth)).toFixed(0)+'€':'—'}</div>
        <div class="stat-label">Net estimé</div>
      </div>
    </div>
    <div class="section-label">Transactions récentes</div>
    <div class="card" style="padding:0;overflow:hidden">
      ${expRows||'<p style="padding:16px;text-align:center;color:var(--g1)">Aucune dépense — tap + pour ajouter</p>'}
    </div>
  </div>`;
};

// ── renderStatsV8 ─────────────────────────────────────────────────────────────
window._statsTab=window._statsTab||'analytics';
window.renderStatsV8=function(){
  const tab=window._statsTab;
  const tabs=`<div class="tabs">
    <button class="tab${tab==='analytics'?' active':''}" onclick="window._statsTab='analytics';render()">Statistiques</button>
    <button class="tab${tab==='goals'?' active':''}" onclick="window._statsTab='goals';render()">Objectifs</button>
    <button class="tab${tab==='badges'?' active':''}" onclick="window._statsTab='badges';render()">Badges</button>
  </div>`;
  let body='';
  if(tab==='analytics'){
    // last 30 days score chart
    const mx30=Math.max(H().length,1);
    const scores=[];const labels=[];
    for(let i=29;i>=0;i--){const dd=new Date();dd.setDate(dd.getDate()-i);const k=dd.toISOString().slice(0,10);const sc=Math.round(scoreDay(S.habits[k]||{})/mx30*100);scores.push(sc);labels.push(k.slice(5));}
    const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    const maxS=Math.max(...scores)||1;
    const bars=scores.map((s,i)=>{const h=Math.max(2,Math.round(s/maxS*60));const bg=s>=80?'#00b894':s>=50?'#fdcb6e':s>0?'#e17055':'var(--border)';return `<div style="width:${100/30}%;height:${h}px;background:${bg};border-radius:2px 2px 0 0" title="${labels[i]}: ${s}%"></div>`;}).join('');
    body=`
      <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span class="section-label" style="margin:0">Score 30 jours</span>
          <span style="font-size:13px;color:var(--cyan);font-weight:700">Moy: ${avg}%</span>
        </div>
        <div style="display:flex;align-items:flex-end;height:60px;gap:1px">${bars}</div>
      </div>
      <div class="grid2">
        ${['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map((dayName,i)=>{
          const sc30=[];for(let w=0;w<4;w++){const dd=new Date();const diff=((dd.getDay()-1-i+7)%7)+w*7;dd.setDate(dd.getDate()-diff);const k=dd.toISOString().slice(0,10);sc30.push(Math.round(scoreDay(S.habits[k]||{})/mx30*100));}
          const avg2=Math.round(sc30.reduce((a,b)=>a+b,0)/sc30.length);
          const col=avg2>=70?'var(--green)':avg2>=40?'var(--amber)':'var(--red)';
          return `<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--g1)">${dayName}</span><span style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:${col}">${avg2}%</span></div>`;
        }).join('')}
      </div>`;
  } else if(tab==='goals'){
    body=renderGoals();
  } else {
    const earned=new Set(S.config.badges||[]);
    body=`<div class="badge-grid">${BADGES_DEF.map(b=>{const u=earned.has(b.id);return `<div class="badge-item${u?' unlocked':''}" title="${b.desc||b.label}" style="opacity:${u?1:.35}"><div style="font-size:28px">${b.emoji}</div><div class="badge-label">${b.label}</div></div>`;}).join('')}</div>`;
  }
  return `<div class="page"><div class="page-title">📊 Stats</div>${tabs}${body}</div>`;
};
