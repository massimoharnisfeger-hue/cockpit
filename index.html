<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06090D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cockpit — Massimo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090D;--bg1:#0C1118;--bg2:#111820;--bg3:#18222E;
  --b:#1E2D3D;--b2:#253545;
  --cyan:#00D4FF;--green:#00E5A0;--red:#FF3A5C;--amber:#FFB800;--purp:#A855F7;
  --w:#F0F4F8;--g1:#8B9BAD;--g2:#4A5A6A;
  --mono:'JetBrains Mono',monospace;--disp:'Syne',sans-serif;--body:'Inter',sans-serif;
  --safe:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{font-family:var(--body);color:var(--w);background:var(--bg);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;padding-bottom:calc(72px + var(--safe))}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--w);background:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
select option{background:var(--bg2)}
textarea{resize:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* ── LAYOUT MOBILE ── */
#app{display:block}
#sidebar{display:none}
#right-panel{display:none}
.inner{padding:16px;display:flex;flex-direction:column;gap:12px}

/* ── BOTTOM NAV ── */
#bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,9,13,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--b);display:flex;padding-bottom:var(--safe);z-index:100}
.nb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--g2);transition:color .2s;position:relative;font-size:0}
.nb.on{color:var(--cyan)}
.nb.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--cyan);border-radius:1px;box-shadow:0 0 8px var(--cyan)}
.ni{font-size:20px;line-height:1}
.nl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}

/* ── PAGE HEADER ── */
.ph{padding:48px 20px 18px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-bottom:1px solid var(--b)}

/* ── COMPONENTS ── */
.card{background:var(--bg1);border:1px solid var(--b);border-radius:16px;padding:18px 20px}
.cc{border-color:#00D4FF28;box-shadow:0 0 24px #00D4FF0D}
.ca{border-color:#FFB80028;box-shadow:0 0 24px #FFB8000D}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--g2);margin-bottom:4px}
.mono{font-family:var(--mono)}
.disp{font-family:var(--disp)}
.track{background:var(--bg3);border-radius:99px;overflow:hidden}
.fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:6px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--cyan)}
.btn-p{width:100%;border-radius:14px;padding:15px;font-family:var(--disp);font-size:15px;font-weight:800;letter-spacing:.4px;transition:opacity .15s,transform .1s;cursor:pointer;border:none}
.btn-p:active{opacity:.8;transform:scale(.98)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.hbtn{width:46px;height:46px;border-radius:12px;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:all .12s;cursor:pointer;border:2px solid transparent}
.hbtn:active{transform:scale(.88)}
.tab-btn{border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap;cursor:pointer;border:1px solid var(--b)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.row{display:flex;gap:8px}
.row12{display:flex;gap:12px}
.col{display:flex;flex-direction:column;gap:10px}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:var(--disp);font-size:13px;font-weight:800;padding:10px 22px;border-radius:99px;z-index:999;pointer-events:none;transition:opacity .3s,top .3s;opacity:0;white-space:nowrap}
#toast.show{opacity:1;top:28px}

/* ── MODAL ── */
#overlay{position:fixed;inset:0;background:rgba(6,9,13,.88);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.open{opacity:1;pointer-events:all}
#modal{background:var(--bg1);border:1px solid var(--b2);border-radius:20px;padding:24px;width:min(420px,92vw);max-height:82vh;overflow-y:auto}

/* ── ANIMATIONS ── */
.page{animation:fu .22s cubic-bezier(.2,.8,.2,1) both}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TX ROW ── */
.tx{background:var(--bg1);border:1px solid var(--b);border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}

/* ── DESKTOP LAYOUT ── */
@media(min-width:768px){
  body{max-width:none;margin:0;padding-bottom:0;display:flex;height:100vh;overflow:hidden}
  #app{display:flex;flex:1;overflow:hidden}
  #sidebar{display:flex;flex-direction:column;align-items:center;width:68px;min-width:68px;background:var(--bg1);border-right:1px solid var(--b);padding:14px 0;gap:2px;overflow:hidden}
  #root{flex:1;overflow-y:auto;min-width:0}
  #right-panel{display:flex;flex-direction:column;gap:10px;width:230px;min-width:230px;background:var(--bg1);border-left:1px solid var(--b);padding:14px 12px;overflow-y:auto}
  #bnav{display:none}
  .ph{padding:20px 20px 16px;position:sticky;top:0;z-index:10}
}
</style>
</head>

  for(let i=0;i<366;i++){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const day=h[k];if(!day||sc(day)===0)break;n++;d.setDate(d.getDate()-1);}

}
function fin(txs,pfx){
  const f=txs.filter(t=>t.date.startsWith(pfx));
  const rev=f.filter(t=>t.type==='Revenu').reduce((a,t)=>a+t.amt,0);
  const dep=f.filter(t=>t.type==='Dépense').reduce((a,t)=>a+Math.abs(t.amt),0);
  const sav=f.filter(t=>t.type==='Épargne').reduce((a,t)=>a+Math.abs(t.amt),0);
  return{rev,dep,sav,solde:rev-dep,savRate:rev>0?sav/rev:0,count:f.length};
}
function eur(v,d=0){return Math.abs(v).toFixed(d).replace('.',',')+'\u00a0€';}
function pct(v){return Math.round(v*100)+'%';}

function trend(cur,prev){if(!prev||prev===0)return'';const d=cur-prev;const p=Math.round(Math.abs(d/prev)*100);const up=d>=0;return`<span style="font-size:10px;color:${up?'#00E5A0':'#FF3A5C'};margin-left:4px">${up?'↑':'↓'}${p}%</span>`;}

/* ═══════════════════════════════════════════════════════
   SVG CHARTS
═══════════════════════════════════════════════════════ */
function svgBars(vals,colors,w,h){
  const max=Math.max(...vals,1);const n=vals.length;const gap=3;const bw=Math.max(2,(w-gap*(n-1))/n);
  const id=++_gid;
  return`<svg width="${w}" height="${h}" style="display:block;overflow:visible">
    ${vals.map((v,i)=>{
      const bh=v>0?Math.max(2,(v/max)*(h-2)):2;
      const x=(bw+gap)*i;const y=h-bh;
      const c=Array.isArray(colors)?(colors[i]||colors[0]):colors;
      return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${c}" opacity="${v===0?0.12:0.88}"/>`;
    }).join('')}
  </svg>`;
}
function svgLine(vals,color,w,h){
  if(!vals||vals.length<2)return`<svg width="${w}" height="${h}"></svg>`;
  const max=Math.max(...vals);const min=Math.min(0,...vals);const range=(max-min)||1;const pad=4;
  const pts=vals.map((v,i)=>[(i/(vals.length-1)*w).toFixed(1),(pad+(1-(v-min)/range)*(h-pad*2)).toFixed(1)]);
  const d='M '+pts.map(p=>p.join(',')).join(' L ');
  const id='lg'+color.replace(/[^a-z0-9]/gi,'')+(++_gid);
  return`<svg width="${w}" height="${h}" style="display:block">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${d} L${w},${h} L0,${h} Z" fill="url(#${id})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function svgRing(score,total,c,size=64){
  const r=size/2-5;const circ=2*Math.PI*r;const da=(score/total)*circ;
  return`<div style="position:relative;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1E2D3D" stroke-width="4.5"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="4.5" stroke-dasharray="${da.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" style="transition:stroke-dasharray .6s"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <span class="mono" style="font-size:${size<50?11:14}px;font-weight:700;color:${c}">${score}/${total}</span>
    </div>
  </div>`;
}

function rAna(){

function rHAna(){
  const h=S.habits;const HABITS=H();
  // Heatmap
  const yearStart=new Date(CY,0,1);const isLeap=(CY%4===0&&CY%100!==0)||(CY%400===0);const totalDays=365+(isLeap?1:0);
  const cells=[];
  for(let i=0;i<totalDays;i++){const d=new Date(CY,0,1+i);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const day=h[k];const s=day&&HABITS.some(hb=>hb.id in day)?sc(day):-1;cells.push({k,s,dow:d.getDay(),month:d.getMonth(),date:d.getDate()});}
  const firstDow=cells[0].dow;const pad=firstDow===0?6:firstDow-1;
  const all=[...Array(pad).fill(null),...cells];
  const weeks=[];for(let i=0;i<all.length;i+=7)weeks.push(all.slice(i,i+7));
  const cs=11,gap=2,step=cs+gap;
  const monthPos={};all.forEach((c,i)=>{if(c&&c.date===1&&!(c.month in monthPos))monthPos[c.month]=Math.floor(i/7);});
  const HC=s=>{if(s<0)return'#0C1118';if(s===0)return'#1A2535';return['#1A2535','#0A3355','#0055AA','#007ACC','#00A8E8','#00D4FF'][Math.min(s,5)];};
  const totalW=weeks.length*step;const totalH=7*step+16;
  const monthSVG=Object.entries(monthPos).map(([m,wi])=>`<text x="${wi*step}" y="10" fill="#4A5A6A" font-size="8" font-family="JetBrains Mono,monospace">${MN[m]}</text>`).join('');
  const cellsSVG=weeks.map((wk,wi)=>wk.map((c,di)=>{if(!c)return'';const x=wi*step;const y=di*step+14;const col=HC(c.s);const glow=c.s===5?` style="filter:drop-shadow(0 0 2px #00D4FF88)"`:' ';return`<rect${glow}x="${x}" y="${y}" width="${cs}" height="${cs}" rx="3" fill="${col}" class="hmc" onclick="showDay('${c.k}')" title="${c.k}${c.s>=0?' — '+c.s+'/'+HABITS.length:''}"/>`;}).join('')).join('');
  const lgd=[0,1,2,3,4,5].map((s,i)=>`<rect x="${i*(cs+2)}" y="0" width="${cs}" height="${cs}" rx="3" fill="${HC(s)}"/>`).join('');
  // Per-habit stats
  const hStats=HABITS.map(hb=>{const enc=Object.values(h).filter(d=>d&&hb.id in d).length;const done=Object.values(h).filter(d=>d&&d[hb.id]===true).length;return{...hb,enc,done,rate:enc>0?done/enc:0};}).sort((a,b)=>b.rate-a.rate);
  const hRows=hStats.map((hb,i)=>{const c=rch(hb.rate);return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="row12" style="align-items:center"><span class="mono" style="font-size:10px;color:var(--g2);width:16px">#${i+1}</span><span style="font-size:18px">${hb.emoji}</span><span class="disp" style="font-size:14px;font-weight:700">${hb.label}</span></div><div class="row12" style="align-items:center"><span style="font-size:11px;color:var(--g2)">${hb.done}/${hb.enc}</span><span class="mono" style="font-size:18px;font-weight:700;color:${c}">${pct(hb.rate)}</span></div></div>${bar(hb.rate,c,5)}</div>`;}).join('');
  // Monthly evolution
  const mR=Array.from({length:12},(_,i)=>{const mk=`${CY}-${String(i+1).padStart(2,'0')}`;const days=cells.filter(c=>c.k.startsWith(mk)&&c.s>=0);const r=days.length>0?days.reduce((a,c)=>a+c.s,0)/(days.length*HABITS.length):0;return{name:MN[i],r,n:days.length};});
  const mBars=mR.map(m=>`<div style="display:flex;align-items:center;gap:10px"><div class="mono" style="width:28px;font-size:11px;font-weight:700;color:var(--g2)">${m.name}</div><div style="flex:1">${bar(m.r,m.n===0?'var(--bg3)':rch(m.r),6)}</div><div class="mono" style="width:38px;font-size:13px;font-weight:700;text-align:right;color:${m.n>0?'var(--w)':'var(--g2)'}">${m.n>0?pct(m.r):'—'}</div></div>`).join('');
  return`<div class="card"><div class="eyebrow" style="margin-bottom:12px">Heatmap ${CY}</div><div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><svg width="${totalW}" height="${totalH}">${monthSVG}${cellsSVG}</svg><div style="display:flex;align-items:center;gap:6px;margin-top:8px"><span style="font-size:9px;color:var(--g2)">Moins</span><svg width="${6*(cs+2)}" height="${cs}">${lgd}</svg><span style="font-size:9px;color:var(--g2)">Plus</span></div></div></div>
  <div class="card"><div class="eyebrow" style="margin-bottom:14px">Par habitude</div>${hRows}</div>
  <div class="card"><div class="eyebrow" style="margin-bottom:14px">Évolution mensuelle</div><div style="display:flex;flex-direction:column;gap:10px">${mBars}</div></div>`;
}
function rFAna(){
  const f=S.finance;const aF=fin(f,''+CY);
  const aKpi=[['Revenus',aF.rev,'var(--green)','+'],['Dépenses',aF.dep,'var(--red)','−'],['Solde',aF.solde,aF.solde>=0?'var(--cyan)':'var(--red)',aF.solde>=0?'+':'−'],['Épargne',aF.sav,'var(--purp)','+']].map(([l,v,c,p])=>`<div><div class="eyebrow" style="margin-bottom:6px">${l}</div><div class="mono" style="font-size:22px;font-weight:700;color:${c};letter-spacing:-1px">${p}${eur(v)}</div></div>`).join('');
  // Expenses by category
  const dCat={};f.filter(t=>t.type==='Dépense').forEach(t=>{dCat[t.cat]=(dCat[t.cat]||0)+Math.abs(t.amt);});const dTot=Object.values(dCat).reduce((a,v)=>a+v,0)||1;
  const cRows=Object.entries(dCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:600;color:var(--g1)">${c}</span><div class="row12"><span class="mono" style="font-size:12px;font-weight:700">${eur(v)}</span><span class="mono" style="font-size:11px;color:var(--g2)">${Math.round(v/dTot*100)}%</span></div></div>${bar(v/dTot,'var(--amber)',4)}</div>`).join('');
  // Monthly table
  const mF=Array.from({length:12},(_,i)=>({name:MN[i],...fin(f,`${CY}-${String(i+1).padStart(2,'0')}`)})).filter(m=>m.count>0);
  const mRows=mF.map(m=>`<div style="display:grid;grid-template-columns:36px 1fr 1fr 64px 38px;gap:6px;padding:8px 0;border-top:1px solid var(--b)"><div class="mono" style="font-size:11px;font-weight:700;color:var(--amber)">${m.name}</div><div class="mono" style="font-size:11px;font-weight:700;color:var(--green)">${m.rev.toFixed(0)}€</div><div class="mono" style="font-size:11px;font-weight:700;color:var(--red)">${m.dep.toFixed(0)}€</div><div class="mono" style="font-size:11px;font-weight:700;color:${m.solde>=0?'var(--cyan)':'var(--red)'}">${m.solde>=0?'+':''}${m.solde.toFixed(0)}€</div><div class="mono" style="font-size:11px;font-weight:700;color:${m.savRate>=.2?'var(--green)':'var(--amber)'}">${pct(m.savRate)}</div></div>`).join('');
  // Monthly comparison chart (revenus vs dépenses)
  const revVals=mF.map(m=>m.rev);const depVals=mF.map(m=>m.dep);const maxV=Math.max(...revVals,...depVals,1);const cW=Math.min(28,(200/Math.max(mF.length,1))-4);
  const barsChart=mF.map((m,i)=>{const x=i*(cW*2+6+4);const rh=Math.max(2,(m.rev/maxV)*60);const dh=Math.max(2,(m.dep/maxV)*60);return`<g><rect x="${x}" y="${64-rh}" width="${cW}" height="${rh}" rx="2" fill="#00E5A044"/><rect x="${x+cW+2}" y="${64-dh}" width="${cW}" height="${dh}" rx="2" fill="#FF3A5C77"/><text x="${x+cW}" y="76" fill="#4A5A6A" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">${m.name}</text></g>`;}).join('');
  const chartW=mF.length*(cW*2+10);
  return`<div class="card"><div class="eyebrow" style="margin-bottom:14px">Bilan ${CY}</div><div class="g2">${aKpi}</div></div>
  <div class="card"><div class="eyebrow" style="margin-bottom:8px">Revenus vs Dépenses</div><div style="overflow-x:auto"><svg width="${chartW}" height="82">${barsChart}</svg></div><div style="display:flex;gap:12px;margin-top:6px"><div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#00E5A044;border:1px solid #00E5A0"></div><span style="font-size:10px;color:var(--g1)">Revenus</span></div><div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#FF3A5C77;border:1px solid #FF3A5C"></div><span style="font-size:10px;color:var(--g1)">Dépenses</span></div></div></div>
  <div class="card"><div class="eyebrow" style="margin-bottom:14px">Dépenses par catégorie</div>${cRows}</div>
  <div class="card"><div style="display:grid;grid-template-columns:36px 1fr 1fr 64px 38px;gap:6px;margin-bottom:6px">${['Mois','Rev.','Dép.','Solde','Ép.'].map(h=>`<div class="eyebrow">${h}</div>`).join('')}</div>${mRows}</div>`;
}

/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
let _ct='habits';
function rConf(){
  const tabs=[['habits','✅ Habitudes'],['data','💾 Données']].map(([v,l])=>`<button class="tab-btn" onclick="_ct='${v}';render()" style="background:${_ct===v?'#A855F71A':'var(--bg2)'};border-color:${_ct===v?'#A855F755':'var(--b)'};color:${_ct===v?'var(--purp)':'var(--g1)'}">${l}</button>`).join('');
  let body='';
  if(_ct==='habits'){
    const HABITS=H();
    const hList=HABITS.map((hb,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg1);border:1px solid var(--b);border-radius:12px;margin-bottom:8px"><span style="font-size:24px">${hb.emoji}</span><div style="flex:1"><div class="disp" style="font-size:14px;font-weight:700">${hb.label}</div></div><button onclick="delHabit('${hb.id}')" style="width:32px;height:32px;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;color:var(--red);font-size:14px;cursor:pointer;font-weight:700">×</button></div>`).join('');
    body=`<div class="card"><div class="eyebrow" style="margin-bottom:12px">Mes habitudes (${HABITS.length})</div>${hList}</div>
    <div class="card"><div class="eyebrow" style="margin-bottom:14px">Ajouter une habitude</div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><input type="text" class="inp" id="h-emoji" placeholder="🎯" style="width:64px;text-align:center;font-size:20px"><input type="text" class="inp" id="h-label" placeholder="Nom de l'habitude…"></div>
    <button class="btn-p" style="background:var(--purp);color:#fff" onclick="addHabit()">AJOUTER +</button></div>`;
  } else {
    const sz=new Blob([JSON.stringify(S,null,2)]).size;const kbStr=(sz/1024).toFixed(1)+' Ko';
    const txCount=S.finance.length;const hDays=Object.keys(S.habits).length;
    body=`<div class="card"><div class="eyebrow" style="margin-bottom:14px">Statistiques</div><div style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:space-between"><span style="color:var(--g1);font-size:13px">Jours d'habitudes</span><span class="mono" style="font-size:13px;font-weight:700;color:var(--cyan)">${hDays}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--g1);font-size:13px">Transactions</span><span class="mono" style="font-size:13px;font-weight:700;color:var(--amber)">${txCount}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--g1);font-size:13px">Taille des données</span><span class="mono" style="font-size:13px;font-weight:700;color:var(--green)">${kbStr}</span></div></div></div>
    <button class="btn-p" style="background:var(--green);color:var(--bg)" onclick="exportData()">📥 EXPORTER LES DONNÉES (JSON)</button>
    <div class="card" style="border-color:#FF3A5C28"><div class="eyebrow" style="color:var(--red);margin-bottom:8px">⚠️ Zone dangereuse</div><p style="font-size:12px;color:var(--g1);margin-bottom:14px">Réinitialise toutes les données (habitudes + finances) avec les données de démo. Cette action est irréversible.</p><button class="btn-p" style="background:var(--bg3);border:1px solid var(--red);color:var(--red)" onclick="confirmReset()">Réinitialiser les données</button></div>`;
  }
  return`<div class="ph"><div class="eyebrow">Configuration</div><div class="row" style="margin-top:8px;gap:8px">${tabs}</div></div><div class="inner">${body}</div>`;
}
function setupConf(){}
function addHabit(){
  const emoji=(document.getElementById('h-emoji')?.value||'').trim()||'⭐';
  const label=(document.getElementById('h-label')?.value||'').trim();
  if(!label){toast('Saisis un nom','#FF3A5C');return;}
  const id='h'+Date.now();S.hcfg.push({id,label,emoji});persist(S);_ci._d=null;toast('✅ Habitude ajoutée','#00E5A0');render();
}
function delHabit(id){
  if(S.hcfg.length<=1){toast('Garde au moins 1 habitude','#FF3A5C');return;}
  S.hcfg=S.hcfg.filter(h=>h.id!==id);persist(S);_ci._d=null;toast('Habitude supprimée','#FFB800');render();
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`cockpit-export-${iso()}.json`;a.click();URL.revokeObjectURL(a.href);toast('📥 Export téléchargé','#00E5A0');
}
function confirmReset(){
  openModal(`<div class="disp" style="font-size:18px;font-weight:800;margin-bottom:8px;color:var(--red)">⚠️ Réinitialiser ?</div><p style="color:var(--g1);font-size:13px;margin-bottom:20px">Toutes tes données seront remplacées par les données de démo. Cette action est irréversible.</p><div style="display:flex;gap:10px"><button class="btn-p" style="background:var(--red);color:#fff;flex:1" onclick="resetData()">Réinitialiser</button><button class="btn-p" style="background:var(--bg2);color:var(--g1);flex:1" onclick="closeModal()">Annuler</button></div>`);
}
function resetData(){localStorage.removeItem(SK);S=load();closeModal();toast('Données réinitialisées','#FFB800');render();}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
render();
</script>
