.v8-badge-item.unlocked .badge-name{color:var(--cyan);}
/* right panel */
.v8-rp-section{padding:14px 16px;border-bottom:1px solid var(--b);}
.v8-rp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g1);margin-bottom:8px;}
/* animations */
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.v8-anim{animation:slideIn .3s ease both;}
.v8-anim-1{animation:slideIn .3s .05s ease both;}
.v8-anim-2{animation:slideIn .3s .10s ease both;}
.v8-anim-3{animation:slideIn .3s .15s ease both;}
.v8-anim-4{animation:slideIn .3s .20s ease both;}
/* niveau XP card */
.v8-xp-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#06090D;flex-shrink:0;}
/* 3-column grid */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
/* nav menu items */
.v8-nav-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;cursor:pointer;transition:background .15s;}
.v8-nav-item:hover{background:var(--bg3);}
.v8-nav-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
/* kanban */
.v8-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;overflow-x:auto;}
@media(max-width:900px){.v8-kanban{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.v8-kanban{grid-template-columns:1fr;}}
.v8-kcol{background:rgba(12,17,24,0.8);border:1px solid var(--b);border-radius:14px;padding:12px;min-height:200px;}
.v8-kcol-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.v8-ktask{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;user-select:none;}
.v8-ktask:hover{border-color:var(--cyan);}
.v8-task-input-row{display:flex;gap:8px;margin-bottom:16px;}
.v8-task-input-row input{flex:1;background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--w);font-size:13px;}
.v8-task-input-row input:focus{outline:none;border-color:var(--cyan);}
.v8-kcol.drag-over{border-color:var(--cyan);background:rgba(0,212,255,.05);}
.v8-ktask{user-select:none;}
`;
const styleEl=document.createElement('style');
styleEl.id='v8-styles';
styleEl.textContent=v8css;
document.head.appendChild(styleEl);

// ── DOM shell — bottom sheet (reuse existing FAB/modal/overlay) ───────────────
document.body.insertAdjacentHTML('beforeend',`
<div id="v8-sheet-bg" onclick="closeQuickSheet()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400"></div>
<div id="v8-sheet" style="position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-radius:20px 20px 0 0;padding:20px;z-index:500;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto">
  <div style="width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px"></div>
  <div id="v8-sheet-content"></div>
</div>
`);

// Redirect FAB to open quick sheet
const _origFab=document.getElementById('fab');
if(_origFab){_origFab.onclick=function(){openQuickSheet();};_origFab.title='Ajouter';}

// ── Bank balance ──────────────────────────────────────────────────────────────
window.getBankBalance=function(){return S.config.bankBalance||0;};
window.setBankBalance=function(v){S.config.bankBalance=parseFloat(v)||0;save();};
window.promptBalance=function(){
  const bal=getBankBalance();
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">💳 Solde bancaire</div>
    <div class="form-group">
      <label>Solde actuel (€)</label>
      <input id="v8-bal-input" type="number" placeholder="0.00" step="0.01" value="${bal||''}" style="font-size:24px;text-align:center;font-family:var(--font-mono)"/>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="confirmBalance()">Enregistrer</button>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('v8-bal-input');if(el){el.focus();el.select();}},100);
};
window.confirmBalance=function(){
  const v=document.getElementById('v8-bal-input').value;
  setBankBalance(v);closeModal();render();toast('Solde mis à jour ✓');
};

// ── Quick-add sheet ────────────────────────────────────────────────────────────
window.openQuickSheet=function(type){
  const bg=document.getElementById('v8-sheet-bg');
  const sheet=document.getElementById('v8-sheet');
  const content=document.getElementById('v8-sheet-content');
  if(!type){
    content.innerHTML=`
      <div class="sheet-option" onclick="openQuickSheet('habit')">
        <div class="sheet-opt-icon" style="background:rgba(0,229,160,.15);font-size:22px">✅</div>
        <div><div class="sheet-opt-title">Valider une habitude</div><div class="sheet-opt-sub">Check-in rapide</div></div>
      </div>
      <div class="sheet-option" onclick="openQuickSheet('depense')">
        <div class="sheet-opt-icon" style="background:rgba(255,58,92,.15);font-size:22px">💸</div>
        <div><div class="sheet-opt-title">Ajouter une dépense</div><div class="sheet-opt-sub">Saisie rapide</div></div>
      </div>
      <div class="sheet-option" onclick="openQuickSheet('tache')">
        <div class="sheet-opt-icon" style="background:rgba(168,85,247,.15);font-size:22px">📝</div>
        <div><div class="sheet-opt-title">Créer une tâche</div><div class="sheet-opt-sub">Ajouter à la to-do</div></div>
      </div>`;
  } else if(type==='habit'){
    closeQuickSheet();openRattrapage();return;
  } else if(type==='depense'){
    const cats=(S.config.categories||[{name:'Alimentation',emoji:'🍔'},{name:'Transport',emoji:'🚗'},{name:'Loisirs',emoji:'🎮'},{name:'Santé',emoji:'💊'},{name:'Autre',emoji:'📦'}]);
    const opts=cats.map(c=>`<option value="${c.name}">${c.emoji} ${c.name}</option>`).join('');
    content.innerHTML=`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:14px;color:var(--w)">💸 Dépense rapide</h3>
      <div class="v8-sheet-form">
        <input id="qs-amount" type="number" placeholder="Montant (€)" step="0.01" min="0"/>
        <select id="qs-cat">${opts}</select>
        <input id="qs-label" type="text" placeholder="Description (optionnel)"/>
        <button onclick="confirmQuickDepense()">Ajouter</button>
      </div>`;
  } else if(type==='tache'){
    content.innerHTML=`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:14px;color:var(--w)">📝 Nouvelle tâche</h3>
      <div class="v8-sheet-form">
        <input id="qs-task" type="text" placeholder="Que fais-tu ?"/>
        <button onclick="confirmQuickTask()">Créer</button>
      </div>`;
    setTimeout(()=>{const el=document.getElementById('qs-task');if(el)el.focus();},200);
  }
  bg.style.display='block';sheet.style.transform='translateY(0)';
};
window.closeQuickSheet=function(){
  const bg=document.getElementById('v8-sheet-bg');
  const sheet=document.getElementById('v8-sheet');
  if(bg)bg.style.display='none';
  if(sheet)sheet.style.transform='translateY(100%)';
};
window.confirmQuickDepense=function(){
  const amt=parseFloat(document.getElementById('qs-amount')?.value||0);
  const cat=document.getElementById('qs-cat')?.value||'Autre';
  const lbl=(document.getElementById('qs-label')?.value||cat).trim();
  if(!amt||amt<=0){toast('Montant invalide');return;}
  if(!S.finance)S.finance=[];
  S.finance.push({id:'t'+Date.now(),date:iso(),desc:lbl,cat,amt:-amt,type:'Dépense',tags:[],pending:false,note:''});
  save();closeQuickSheet();render();toast('Dépense ajoutée ✓');
};
window.confirmQuickTask=function(){
  const txt=document.getElementById('qs-task')?.value?.trim();
  if(!txt){toast('Texte vide');return;}
  const t=parseTaskInput(txt);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();closeQuickSheet();render();toast('Tâche créée ✓','var(--green)');
};

// ── Rattrapage / check-in modal ────────────────────────────────────────────────
window.openRattrapage=function(dateStr){
  const d=dateStr||iso();
  const day=S.habits[d]||{};
  const habs=H();
  let rows=habs.map(h=>{
    const done=!!day[h.id];
    return `<div class="habit-row">
      <div class="habit-toggle${done?' on':''}" onclick="toggleHabitRattrap('${d}','${h.id}',this)"></div>
      <span style="font-size:18px">${h.emoji||'📌'}</span>
      <span style="font-size:14px;color:var(--w);flex:1">${h.label||''}</span>
    </div>`;
  }).join('');
  if(!rows)rows='<p style="color:var(--g1);text-align:center;padding:16px">Aucune habitude — va dans Config</p>';
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✅ Check-in ${d===iso()?'Aujourd\'hui':d}</div>
    <div id="rattrap-list">${rows}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="saveCheckinRattrap('${d}')">Enregistrer</button>`;
  document.getElementById('overlay').classList.add('open');
};
window.toggleHabitRattrap=function(d,hid,el){
  if(!S.habits[d])S.habits[d]={};
  const cur=S.habits[d][hid];
  S.habits[d][hid]=cur?false:true;
  save();el.classList.toggle('on',!!S.habits[d][hid]);
};
window.saveCheckinRattrap=function(d){
  save();closeModal();render();toast('Check-in sauvegardé ✓');
};

// ── toggleHabitHome & toggleTaskV8 ────────────────────────────────────────────
window.checkAllHabits=function(){
  const d=iso();
  if(!S.habits[d])S.habits[d]={};
  H().forEach(h=>{if(!S.habits[d][h.id]){S.habits[d][h.id]=true;addXP(5,'habit check-all');}});
  save();render();toast('Toutes les habitudes cochées ✓','var(--green)');
};
window.toggleHabitHome=function(d,hid,el){
  if(!S.habits[d])S.habits[d]={};
  const cur=S.habits[d][hid];
  S.habits[d][hid]=cur?false:true;
  save();
  el.classList.toggle('done',!!S.habits[d][hid]);
  addXP(S.habits[d][hid]?5:-2,'habit toggle');
};
window.toggleTaskV8=function(id){
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  t.status=t.status==='done'?'todo':'done';
  if(t.status==='done'){t.completedAt=iso();addXP(t.xpReward||10,'tâche ✓');}
  save();render();
};
window.addTaskFromInput=function(){
  const inp=document.getElementById('v8-task-input');
  if(!inp||!inp.value.trim())return;
  const t=parseTaskInput(inp.value);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();inp.value='';render();toast('Tâche ajoutée ✓','var(--green)');
};

// ── renderHomeV8 ──────────────────────────────────────────────────────────────
window.renderHomeV8=function(){
  const d=iso();
  const day=S.habits[d]||{};
  const habs=H();
  const mx=Math.max(habs.length,1);
  const rawScore=scoreDay(day);
  const score=Math.round(rawScore/mx*100);
  const habsDoneCount=habs.filter(h=>!!day[h.id]).length;
  const streak=currentStreak();
  const bal=getBankBalance();
  const xp=S.config.xp||0;
  const lvl=getLevelInfo(xp);

  // M8 — Contextual greeting
  const hour=new Date().getHours();
  const greeting=hour<12?'Bonjour':hour<18?'Bon après-midi':'Bonsoir';
  const name=(S.config.profile&&S.config.profile.name)?`, ${S.config.profile.name}`:'';
  const perfEmoji=score>=80?'🔥':score>=50?'👊':'💪';

  // A2 — Mode matin/soir automatique
  const isMorning=hour<14;
  const isEvening=hour>=19;
  const timeLabel=isMorning?'🌅 Matin':isEvening?'🌙 Soir':'☀️ Journée';

  // A1 — Score ring + 3 stat cards
  const scoreColor=score>=80?'var(--green)':score>=50?'var(--amber)':'var(--red)';
  const scoreRing=`<div style="display:flex;justify-content:center;margin-bottom:16px">
    <div style="position:relative;width:120px;height:120px;cursor:pointer" onclick="openRattrapage()">
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(${scoreColor} ${score}%,var(--b) ${score}%);display:flex;align-items:center;justify-content:center">
        <div style="width:90px;height:90px;border-radius:50%;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-family:var(--font-mono);font-size:28px;font-weight:800;color:${scoreColor}">${score}<span style="font-size:14px">%</span></div>
          <div style="font-size:10px;color:var(--g1)">Aujourd'hui</div>
          ${habs.length>0?`<div style="font-size:9px;color:var(--g1);margin-top:2px">${habsDoneCount}/${habs.length} hab.</div>`:''}
        </div>
      </div>
    </div>
  </div>`;

  // A5 — Near-record banner
  const bestStreak=Math.max(S.config.bestStreak||0,streak);
  if(bestStreak>=(S.config.bestStreak||0)){S.config.bestStreak=bestStreak;}
  const nearRecord=streak>0&&bestStreak>5&&streak>=bestStreak-3&&streak<bestStreak;
  const nearRecordBanner=nearRecord?`<div style="background:rgba(255,184,0,.12);border:1px solid var(--amber);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--amber)">🏆 Plus que ${bestStreak-streak} jour${bestStreak-streak>1?'s':''} pour battre ton record de ${bestStreak} jours !</div>`:'';

  const statCards=`${nearRecordBanner}<div class="grid3" style="gap:10px;margin-bottom:16px">
    <div class="v8-stat-card v8-anim">
      <div class="v8-stat-val" style="color:var(--amber)">${streak}<span style="font-size:14px">🔥</span></div>
      <div class="v8-stat-lbl">Streak</div>
    </div>
    <div class="v8-stat-card v8-anim-1" onclick="promptBalance()" style="cursor:pointer">
      <div class="v8-stat-val" style="color:${bal>0?'var(--cyan)':'var(--g1)'};font-size:${bal>0&&bal>=1000?'18px':'22px'}">${(()=>{const balDisplay=bal<=0?'—':bal<100?bal.toFixed(2)+'€':bal<10000?Math.round(bal)+'€':(bal/1000).toFixed(1)+'k€';return balDisplay;})()}</div>
      <div class="v8-stat-lbl">Solde 💳</div>
    </div>
    <div class="v8-stat-card v8-anim-2">
      <div class="v8-stat-val v8-gradient-text" style="font-size:18px">${lvl.name}</div>
      <div class="v8-stat-lbl">Niv. ${lvl.lvl}</div>
    </div>
  </div>`;

  // Habit cards
  const habCards=habs.length?habs.map(h=>{
    const done=!!(day[h.id]);
    return `<div class="v8-hab-card${done?' done':''}" onclick="toggleHabitHome('${d}','${h.id}',this)">
      <span class="hc-icon">${h.emoji||'📌'}</span>
      <div class="hc-name">${h.label||''}</div>
    </div>`;
  }).join(''):`<p style="color:var(--g1);font-size:13px;grid-column:1/-1">Aucune habitude — <a href="#" onclick="nav('config')" style="color:var(--cyan)">Configurer</a></p>`;

  // A2 — Evening bilan section
  let eveningBilan='';
  if(isEvening){
    const habDone=habs.filter(h=>!!day[h.id]).length;
    const tasksDoneToday=(S.tasks||[]).filter(t=>t.status==='done'&&t.completedAt===d).length;
    const daySpend=(S.finance||[]).filter(t=>t.date===d&&t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0);
    eveningBilan=`<div class="v8-card v8-anim-3" style="padding:12px 16px;margin-bottom:16px;border-color:rgba(168,85,247,.3)">
      <div class="v8-sec" style="margin:0 0 10px;color:var(--purp)">🌙 Bilan du soir</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:13px">
        <span style="color:var(--w)">Habitudes: <strong style="color:var(--cyan)">${habDone}/${habs.length}</strong></span>
        <span style="color:var(--w)">Tâches: <strong style="color:var(--green)">${tasksDoneToday}</strong></span>
        <span style="color:var(--w)">Dépenses: <strong style="color:var(--red)">${daySpend.toFixed(0)}€</strong></span>
      </div>
    </div>`;
  }

  // A2 — Morning priorities section
  let morningPriorities='';
  if(isMorning){
    const topTasks=(S.tasks||[]).filter(t=>t.status!=='done'&&(t.priority==='urgente'||t.priority==='haute')).sort((a,b)=>{const pri={urgente:0,haute:1};return (pri[a.priority]||1)-(pri[b.priority]||1);}).slice(0,3);
    if(topTasks.length){
      morningPriorities=`<div class="v8-card v8-anim-3" style="padding:12px 16px;margin-bottom:16px;border-color:rgba(255,184,0,.3)">
        <div class="v8-sec" style="margin:0 0 10px;color:var(--amber)">🌅 Priorités du matin</div>
        ${topTasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:var(--w)">
          <span style="color:${t.priority==='urgente'?'var(--red)':'var(--amber)'}">●</span>
          <span>${t.text}</span>
        </div>`).join('')}
      </div>`;
    }
  }

  // Week bar chart (7 jours — canvas)
  const days7=[];
  for(let i=6;i>=0;i--){const dd=new Date();dd.setDate(dd.getDate()-i);days7.push(dd.toISOString().slice(0,10));}
  const dayLabels=['D','L','M','M','J','V','S'];
  const weekScores=days7.map(dd=>Math.round(scoreDay(S.habits[dd]||{})/mx*100));
  const weekLabels=days7.map(dd=>dayLabels[new Date(dd+'T12:00:00').getDay()]);

  // Tasks
  const tasks=(S.tasks||[]).filter(t=>t.status!=='done').sort((a,b)=>{const pri={urgente:0,haute:1,moyenne:2,basse:3};return (pri[a.priority]||2)-(pri[b.priority]||2);}).slice(0,6);
  const priorities=['urgent','moyen','bas'];
  const taskRows=tasks.length?tasks.map((t,i)=>{
    const pri=t.priority||priorities[i%3];
    return `<div class="v8-task-item">
      <div class="v8-task-cb" onclick="toggleTaskV8('${t.id}')"></div>
      <span class="v8-task-text">${t.text||''}</span>
      <span class="v8-priority-badge v8-priority-${pri==='urgente'||pri==='urgent'?'urgent':pri==='haute'||pri==='moyen'?'moyen':'bas'}">${pri==='urgente'||pri==='urgent'?'URGENT':pri==='haute'?'HAUTE':pri==='moyenne'||pri==='moyen'?'MOYEN':'BAS'}</span>
      <span class="v8-xp-badge">+5XP</span>
    </div>`;
  }).join(''):`<div style="color:var(--g1);font-size:13px;padding:12px 0;text-align:center">Aucune tâche — ajoute-en une ci-dessous</div>`;

  // A4 — Quote du jour
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(1000*60*60*24));
  const quote=QUOTES[doy%QUOTES.length];

  // M10 — CTA contextuel
  const urgentTasks=(S.tasks||[]).filter(t=>t.priority==='urgente'&&t.status!=='done');
  const habitsDone=Object.keys(day).filter(k=>day[k]).length;
  const habitsTodo=habs.length-habitsDone;

  const html=`<div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="page-title" style="margin:0">${greeting}${name} ${perfEmoji}</div>
      <div style="font-size:12px;color:var(--g1)">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'})} · ${timeLabel}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="home-quick-input" type="text" placeholder="Ajouter une tâche... (ex: Appeler dentiste demain #sante urgent)"
        style="flex:1;background:var(--bg1);border:1px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--w);font-size:13px;"
        onkeydown="if(event.key==='Enter')homeQuickAdd()"/>
      <button onclick="homeQuickAdd()" style="background:var(--cyan);color:#000;border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">+</button>
    </div>
    ${urgentTasks.length?`<div onclick="nav('taches')" style="background:rgba(255,58,92,.12);border:1px solid rgba(255,58,92,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--red)">🔴 ${urgentTasks.length===1?urgentTasks[0].text.slice(0,45)+(urgentTasks[0].text.length>45?'…':''):urgentTasks.length+' tâches urgentes'}</span>
      <span style="color:var(--red)">→</span>
    </div>`:habitsTodo>0?`<div onclick="openRattrapage()" style="background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:10px 14px;margin-bottom:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--cyan)">${habitsTodo} habitude${habitsTodo>1?'s':''} à cocher aujourd'hui</span>
      <span style="color:var(--cyan)">→</span>
    </div>`:''}
    ${scoreRing}
    ${statCards}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

// ── waitForChart helper ────────────────────────────────────────────────────────
function waitForChart(fn, attempt) {
  if (typeof Chart !== 'undefined') { fn(); return; }
  if ((attempt||0) > 20) return; // give up after 2s
  setTimeout(function(){ waitForChart(fn, (attempt||0)+1); }, 100);
}

// ── initChartsHome ────────────────────────────────────────────────────────────
window.initChartsHome=function(){
  waitForChart(function(){
    const canvas=document.getElementById('chart-home-week');
    if(!canvas)return;
    if(canvas._chart){canvas._chart.destroy();}
    const scores=window._homeWeekScores||[];
    const labels=window._homeWeekLabels||[];
    const barColors=scores.map(s=>s>=80?'rgba(0,229,160,.8)':s>=50?'rgba(255,184,0,.8)':s>0?'rgba(255,58,92,.7)':'rgba(30,45,61,.8)');
    // Show canvas, hide CSS fallback — wait for reflow first
    canvas.style.display='block';
    const fallback=document.getElementById('chart-home-fallback');
    requestAnimationFrame(function(){
      if(fallback)fallback.style.display='none';
      try {
        canvas._chart=new Chart(canvas,{
          type:'bar',
          data:{labels,datasets:[{data:scores,backgroundColor:barColors,borderRadius:6,borderSkipped:false}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+'%'}}},scales:{x:{grid:{display:false},ticks:{color:'#8B9BAD',font:{size:11}}},y:{display:false,max:110}},animation:{duration:600}}
        });
      } catch(e) {
        // Restore CSS fallback if Chart.js fails
        if(fallback)fallback.style.display='flex';
        canvas.style.display='none';
      }
    });
  });
};

// ── Deduplication ─────────────────────────────────────────────────────────────
window.findDuplicates=function(){
  const txMap={};
  const dups=[];
  (S.finance||[]).forEach(t=>{
    const key=`${t.date}|${t.amt}|${(t.desc||'').slice(0,20)}`;
    if(txMap[key]) dups.push(t.id);
    else txMap[key]=t.id;
  });
  return dups;
};
window.deduplicateTransactions=function(){
  const dups=findDuplicates();
  if(!dups.length){toast('Aucun doublon détecté ✓','var(--green)');return;}
  const msg=`${dups.length} doublon(s) détecté(s). Supprimer ?`;
  if(confirm(msg)){
    S.finance=S.finance.filter(t=>!dups.includes(t.id));
    save();render();toast(`${dups.length} doublon(s) supprimé(s) ✓`,'var(--green)');
  }
};

// ── initKanbanDragDrop ────────────────────────────────────────────────────────
window._dragTaskId=null;
window._dragFromCol=null;

window.initKanbanDragDrop=function(){
  // Set up drag on cards
  document.querySelectorAll('.v8-ktask[data-id]').forEach(card=>{
    card.addEventListener('dragstart',function(e){
      window._dragTaskId=this.dataset.id;
      window._dragFromCol=this.dataset.status;
      this.style.opacity='0.5';
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',function(){
      this.style.opacity='1';
      document.querySelectorAll('.v8-kcol').forEach(col=>col.classList.remove('drag-over'));
    });
  });

  // Set up drop zones on columns
  document.querySelectorAll('.v8-kcol[id]').forEach(col=>{
    col.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.v8-kcol').forEach(c=>c.classList.remove('drag-over'));
      this.classList.add('drag-over');
    });
    col.addEventListener('dragleave',function(){
      this.classList.remove('drag-over');
    });
    col.addEventListener('drop',function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      const newStatus=this.id.replace('kcol-','');
      if(window._dragTaskId&&newStatus!==window._dragFromCol){
        moveTaskStatus(window._dragTaskId,newStatus);
      }
      window._dragTaskId=null;
    });
  });
};

        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:10px;font-weight:700;color:${priColor};background:${priColor}22;padding:1px 6px;border-radius:6px;text-transform:uppercase">${t.priority}</span>
          <span style="font-size:10px;color:${cat.color};background:${cat.color}22;padding:1px 6px;border-radius:6px">${cat.emoji} ${cat.label}</span>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--w);line-height:1.3;margin-bottom:6px">${t.text||''}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          ${t.dueDate?`<span style="font-size:11px;color:${overdue?'var(--red)':'var(--g1)'}">${overdue?'⚠️ ':''} ${t.dueDate}</span>`:'<span></span>'}
          ${sub.length?`<span style="font-size:11px;color:var(--g1)">${subDone}/${sub.length} ✓</span>`:''}
        </div>
        ${sub.length?`<div style="height:3px;background:var(--b);border-radius:2px;margin-top:6px"><div style="height:100%;background:var(--green);border-radius:2px;width:${sub.length?Math.round(subDone/sub.length*100):0}%"></div></div>`:''}
        <div style="display:flex;gap:6px;margin-top:8px">
          ${col.id!=='done'?`<button onclick="event.stopPropagation();moveTaskStatus('${t.id}','done')" style="flex:1;font-size:11px;padding:3px;background:rgba(0,229,160,.15);border:none;border-radius:6px;color:var(--green);cursor:pointer">✓ Fait</button>`:''}
          ${col.id==='todo'?`<button onclick="event.stopPropagation();moveTaskStatus('${t.id}','doing')" style="flex:1;font-size:11px;padding:3px;background:rgba(0,212,255,.15);border:none;border-radius:6px;color:var(--cyan);cursor:pointer">▶ Démarrer</button>`:''}
          <button onclick="event.stopPropagation();deleteTask('${t.id}')" style="font-size:11px;padding:3px 8px;background:rgba(255,58,92,.15);border:none;border-radius:6px;color:var(--red);cursor:pointer">✕</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="v8-kcol" id="kcol-${col.id}">
      <div class="v8-kcol-hdr" style="border-top:3px solid ${col.color}">
        <span style="font-weight:700;font-size:13px;color:${col.color}">${col.label}</span>
        <span style="font-size:11px;color:var(--g1);background:var(--b);padding:2px 8px;border-radius:10px">${tasks.length}</span>
      </div>
      ${cards||'<div></div>'}
    </div>`;
  }).join('');

  return `<div class="page" style="max-width:100%;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="page-title" style="margin:0">✅ Tâches</div>
      <button onclick="openQuickSheet('tache')" style="background:var(--cyan);color:#000;border:none;border-radius:10px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer">+ Ajouter</button>
    </div>
    <div class="v8-task-input-row">
      <input id="v8-quick-task" type="text" placeholder="Nouvelle tâche... (ex: Appeler dentiste demain #sante urgent)" onkeydown="if(event.key==='Enter')quickAddTask()"/>
      <button onclick="quickAddTask()" style="background:var(--cyan);color:#000;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer">+</button>
    </div>
    ${totalTasks>0?`<div style="display:flex;gap:12px;margin-bottom:12px;font-size:12px;color:var(--g1)">
      <span>${totalTasks} tâche${totalTasks>1?'s':''}</span>
      ${urgentCount?`<span style="color:var(--red)">● ${urgentCount} urgente${urgentCount>1?'s':''}</span>`:''}
      ${overdueCount?`<span style="color:var(--amber)">⚠ ${overdueCount} en retard</span>`:''}
    </div>`:''}
    ${allTasks.length===0?`<div style="text-align:center;padding:32px 16px;color:var(--g1)">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <div style="font-size:16px;font-weight:700;color:var(--w);margin-bottom:8px">Tout est clair !</div>
      <div style="font-size:13px;margin-bottom:16px">Ajoute ta première tâche ci-dessus ou tape "Finir le TFE demain #tfe urgent"</div>
    </div>`:''}
    <div class="v8-kanban">${colsHTML}</div>
  </div>`;
};

// ── Task functions ────────────────────────────────────────────────────────────
window.quickAddTask=function(){
  const inp=document.getElementById('v8-quick-task');
  if(!inp||!inp.value.trim())return;
  const t=parseTaskInput(inp.value);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();
  inp.value='';
  render();
  toast('Tâche ajoutée ✓','var(--green)');
};

window.moveTaskStatus=function(id,status){
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  t.status=status;
  if(status==='done'){t.completedAt=iso();addXP(t.xpReward||10,'tâche complétée');}
  save();render();
};

window.openTaskDetail=function(id){
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  const PRI_OPTS=['urgente','haute','moyenne','basse'];
  const html=`<h3 style="margin:0 0 16px;color:var(--w)">${t.text}</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      ${PRI_OPTS.map(p=>`<button onclick="updateTaskField('${id}','priority','${p}')" style="padding:4px 12px;border-radius:8px;border:1.5px solid ${t.priority===p?'var(--cyan)':'var(--b)'};background:${t.priority===p?'rgba(0,212,255,.15)':'transparent'};color:${t.priority===p?'var(--cyan)':'var(--g1)'};cursor:pointer;font-size:12px">${p}</button>`).join('')}
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--g1)">Échéance</label>
      <input type="date" value="${t.dueDate||''}" onchange="updateTaskField('${id}','dueDate',this.value)" style="display:block;width:100%;margin-top:4px;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:8px;color:var(--w);font-size:13px">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--g1)">Notes</label>
      <textarea onchange="updateTaskField('${id}','notes',this.value)" style="display:block;width:100%;margin-top:4px;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:8px;color:var(--w);font-size:13px;resize:vertical;min-height:80px">${t.notes||''}</textarea>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--g1)">Sous-tâches</label>
      ${(t.subtasks||[]).map((s,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtask('${id}',${i})">
        <span style="font-size:13px;color:${s.done?'var(--g1)':'var(--w)'}${s.done?';text-decoration:line-through':''}">${s.text}</span>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="sub-inp-${id}" type="text" placeholder="Ajouter sous-tâche" style="flex:1;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:6px 10px;color:var(--w);font-size:12px">
        <button onclick="addSubtask('${id}')" style="background:rgba(0,212,255,.15);border:1px solid var(--cyan);border-radius:8px;padding:6px 12px;color:var(--cyan);cursor:pointer;font-size:12px">+</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="moveTaskStatus('${id}','done');closeModal();" style="flex:1;background:rgba(0,229,160,.15);border:1px solid var(--green);border-radius:10px;padding:10px;color:var(--green);cursor:pointer;font-weight:700">✓ Marquer fait</button>
      <button onclick="deleteTask('${id}');closeModal();" style="background:rgba(255,58,92,.15);border:1px solid var(--red);border-radius:10px;padding:10px;color:var(--red);cursor:pointer">🗑</button>
    </div>`;
  openModal(html);
};

window.updateTaskField=function(id,field,val){
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  t[field]=val;
  save();
  if(field==='priority')openTaskDetail(id);
};

window.addSubtask=function(id){
  const inp=document.getElementById('sub-inp-'+id);
  if(!inp||!inp.value.trim())return;
  const t=(S.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({id:'s'+Date.now(),text:inp.value.trim(),done:false});
  save();
  openTaskDetail(id);
};

window.toggleSubtask=function(taskId,subIdx){
  const t=(S.tasks||[]).find(x=>x.id===taskId);
  if(!t||!t.subtasks[subIdx])return;
  t.subtasks[subIdx].done=!t.subtasks[subIdx].done;
  if(t.subtasks.length&&t.subtasks.every(s=>s.done)&&t.status!=='done'){
    t.status='done';t.completedAt=iso();addXP(t.xpReward||10,'tâche complétée');
  }
  save();
  openTaskDetail(taskId);
};


// ── A3: homeQuickAdd ──────────────────────────────────────────────────────
window.homeQuickAdd=function(){
  const inp=document.getElementById('home-quick-input');
  if(!inp||!inp.value.trim())return;
  const t=parseTaskInput(inp.value);
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save();inp.value='';render();toast('Tâche ajoutée ✓','var(--green)');
};

// ── D1: addNote / showAllNotes ────────────────────────────────────────────
window.addNote=function(){
  const inp=document.getElementById('note-input');
  if(!inp||!inp.value.trim())return;
  if(!S.notes)S.notes=[];
  const now=new Date();
  S.notes.push({id:'n'+Date.now(),text:inp.value.trim(),date:iso(),time:now.toTimeString().slice(0,5),tags:[]});
  save();inp.value='';render();toast('Note ajoutée ✓','var(--green)');
};
window.showAllNotes=function(){
  const notes=(S.notes||[]).sort((a,b)=>b.date.localeCompare(a.date));
  const html=`<h3 style="margin:0 0 16px;color:var(--w)">📔 Journal (${notes.length})</h3>
    <div style="max-height:400px;overflow-y:auto">
      ${notes.map(n=>`<div style="padding:10px 0;border-bottom:1px solid var(--b)">
        <div style="font-size:11px;color:var(--g1)">${n.date} ${n.time||''}</div>
        <div style="font-size:13px;color:var(--w);margin-top:3px;line-height:1.5">${n.text}</div>
      </div>`).join('')}
    </div>`;
  openModal(html);
};

// ── D2: applyTheme / _applyThemeOnLoad ────────────────────────────────────
window.applyTheme=function(id){
  S.config.theme=id;save();
  const themes={
    midnight:{},
    ocean:{'--cyan':'#4A90E2','--purp':'#2C3E50','--amber':'#F39C12'},
    forest:{'--cyan':'#2ECC71','--purp':'#27AE60','--amber':'#F1C40F'},
    sunset:{'--cyan':'#FF6B35','--purp':'#C0392B','--amber':'#E67E22'},
  };
  const vars=themes[id]||{};
  document.documentElement.style.removeProperty('--cyan');
  document.documentElement.style.removeProperty('--purp');
  document.documentElement.style.removeProperty('--amber');
  Object.entries(vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  render();toast('Thème '+id+' appliqué ✓','var(--green)');
};
window._applyThemeOnLoad=function(){
  if(S.config.theme&&S.config.theme!=='midnight')applyTheme(S.config.theme);
};

// ── D3: exportBackup ──────────────────────────────────────────────────────
window.exportBackup=function(){
  const data=JSON.stringify(S,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='cockpit-backup-'+iso()+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup téléchargé ✓','var(--green)');
};

})(); // end V8 IIFE

load();
loadV7();
Object.assign(window,{PAGES:['home','taches','argent','stats','plus']});
render();
injectManifest();
checkNotifOnLoad();
checkOnboarding();
checkAnnualArchive();
// Load integrations
fetchWeather();
if(S.config.openaiKey)fetchAICoach();
if(S.config.gcalKey&&S.config.gcalId)fetchCalendar();
if(S.config.telegramToken&&S.config.telegramChatId)scheduleCheckinReminderTg();
</script>
