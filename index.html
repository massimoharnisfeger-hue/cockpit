<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090D;--bg1:#0C1118;--bg2:#111820;--bg3:#18222E;
  --b:#1E2D3D;--b2:#253545;--cyan:#00D4FF;--green:#00E5A0;
  --red:#FF3A5C;--amber:#FFB800;--purp:#A855F7;--w:#F0F4F8;
  --g1:#8B9BAD;--g2:#4A5A6A;
  --font-display:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--font-body:'Inter',sans-serif;
  --r:12px;--r2:8px;--t:0.18s;
}
html.light{
  --bg:#F0F4F8;--bg1:#FFFFFF;--bg2:#E8EEF4;--bg3:#D8E2EC;
  --b:#C8D4E0;--b2:#B8C8D8;--w:#0C1118;--g1:#4A5A6A;--g2:#8B9BAD;
}
html,body{height:100%;background:var(--bg);color:var(--w);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow:hidden}
#app{display:flex;height:100vh;height:100dvh}
#sidebar{display:none;flex-direction:column;align-items:center;width:68px;background:var(--bg1);border-right:1px solid var(--b);padding:16px 0;gap:4px;flex-shrink:0;z-index:10}
#right-panel{display:none;width:230px;background:var(--bg1);border-left:1px solid var(--b);flex-shrink:0;overflow-y:auto;z-index:10}
#root{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
@media(min-width:768px){
  #sidebar{display:flex}
  #right-panel{display:block}
  #bnav{display:none!important}
  body{overflow:hidden}
}
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:2px;border:none;background:none;color:var(--g1);font-size:9px;font-family:var(--font-body);cursor:pointer;transition:color var(--t)}
.bn.active,.bn:hover{color:var(--cyan)}
.bn svg{width:22px;height:22px}
.sn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);border:none;background:none;color:var(--g1);cursor:pointer;transition:all var(--t);font-size:20px;flex-direction:column;gap:1px}
.sn.active,.sn:hover{background:var(--bg3);color:var(--cyan)}
.sn .sk-hint{font-size:8px;font-family:var(--font-mono);color:var(--g2);line-height:1}
.logo{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--cyan);padding:8px 0 12px;letter-spacing:-0.5px}
.page{padding:16px;max-width:680px;margin:0 auto;padding-bottom:80px}
@media(min-width:768px){.page{padding:24px;padding-bottom:24px}}
.page-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--w);margin-bottom:16px}
.card{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-sm{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:12px}
.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--g1);margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid transparent}
.chip-cyan{background:rgba(0,212,255,0.12);color:var(--cyan);border-color:rgba(0,212,255,0.25)}
.chip-green{background:rgba(0,229,160,0.12);color:var(--green);border-color:rgba(0,229,160,0.25)}
.chip-red{background:rgba(255,58,92,0.12);color:var(--red);border-color:rgba(255,58,92,0.25)}
.chip-amber{background:rgba(255,184,0,0.12);color:var(--amber);border-color:rgba(255,184,0,0.25)}
.chip-purp{background:rgba(168,85,247,0.12);color:var(--purp);border-color:rgba(168,85,247,0.25)}
.chip-gray{background:var(--bg3);color:var(--g1);border-color:var(--b)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--r2);border:none;cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:600;transition:all var(--t)}
.btn-primary{background:var(--cyan);color:#06090D}
.btn-primary:hover{background:#00bde8}
.btn-ghost{background:transparent;color:var(--g1);border:1px solid var(--b)}
.btn-ghost:hover{background:var(--bg3);color:var(--w)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
input,select,textarea{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);color:var(--w);font-family:var(--font-body);font-size:14px;padding:8px 12px;width:100%;outline:none;transition:border-color var(--t)}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
select option{background:var(--bg2)}
label{font-size:13px;color:var(--g1);display:block;margin-bottom:4px}
.form-group{margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.habit-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b)}
.habit-row:last-child{border-bottom:none}
.habit-toggle{width:44px;height:26px;border-radius:13px;border:2px solid var(--b2);background:var(--bg3);cursor:pointer;transition:all var(--t);position:relative;flex-shrink:0}
.habit-toggle.on{background:var(--cyan);border-color:var(--cyan)}
.habit-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform var(--t)}
.habit-toggle.on::after{transform:translateX(18px)}
.stat-num{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--w);line-height:1}
.stat-label{font-size:12px;color:var(--g1);margin-top:2px}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r2);padding:4px;margin-bottom:16px}
.tab{flex:1;padding:7px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--g1);transition:all var(--t)}
.tab.active{background:var(--bg3);color:var(--w)}
.tx-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b)}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-amt{font-family:var(--font-mono);font-weight:700;font-size:15px}
.tag-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;background:var(--bg3);color:var(--g1);border:1px solid var(--b);margin:1px}
.right-section{padding:16px;border-bottom:1px solid var(--b)}
.right-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--g1);margin-bottom:10px}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
.toast-msg{background:var(--bg3);border:1px solid var(--b2);color:var(--w);padding:10px 20px;border-radius:var(--r2);font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:toastIn 0.2s ease;margin-bottom:8px}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#modal{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:24px;width:min(480px,calc(100vw - 32px));max-height:80vh;overflow-y:auto;position:relative}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:800;margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--g1);cursor:pointer;font-size:20px;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.cal-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-mono);cursor:pointer;transition:all var(--t)}
.cal-cell:hover{border:1px solid var(--cyan)}
.cal-header{font-size:10px;font-weight:600;text-align:center;color:var(--g1);padding:4px 0}
.insights-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;margin:4px}
.streak-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.streak-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.4s}
.week-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:12px;margin-bottom:8px}
.budget-row{margin-bottom:10px}
.budget-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.ann-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media(min-width:500px){.ann-grid{grid-template-columns:repeat(3,1fr)}}
.ann-stat{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:10px;text-align:center}
.ann-num{font-family:var(--font-mono);font-size:16px;font-weight:700}
.ann-lbl{font-size:11px;color:var(--g1);margin-top:2px}
.rattrapage-banner{background:rgba(255,184,0,0.1);border:1px solid rgba(255,184,0,0.3);color:var(--amber);padding:8px 14px;border-radius:var(--r2);margin-bottom:12px;font-size:13px;font-weight:600;text-align:center}
.rec-btn{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:8px 12px;cursor:pointer;font-size:13px;color:var(--w);transition:all var(--t);text-align:left}
.rec-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.note-row{padding:8px 0;border-bottom:1px solid var(--b)}
.note-row:last-child{border-bottom:none}
.corr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}
.corr-row:last-child{border-bottom:none}
input[type=range]{padding:0;border:none;background:none;accent-color:var(--cyan)}
input[type=checkbox]{width:auto;accent-color:var(--cyan)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g2);font-size:14px;pointer-events:none}
.csv-preview{max-height:200px;overflow-y:auto;border:1px solid var(--b);border-radius:var(--r2);margin-top:8px}
.csv-row{display:grid;grid-template-columns:90px 1fr 80px 80px;gap:8px;padding:6px 10px;font-size:11px;font-family:var(--mono);border-bottom:1px solid var(--b)}
.csv-row:last-child{border-bottom:none}
.trend-up{color:var(--green);font-size:12px;font-weight:700}
.trend-dn{color:var(--red);font-size:12px;font-weight:700}
.theme-toggle{background:none;border:1px solid var(--b);border-radius:var(--r2);padding:5px 10px;cursor:pointer;font-size:16px;color:var(--w);transition:all var(--t)}
.theme-toggle:hover{border-color:var(--cyan)}
</style>
</head>

/* ── UTILS ─────────────────────────────────────────────────────────────── */
function iso(d){const dt=d||new Date();return dt.toISOString().slice(0,10);}
function isoPlus(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return iso(d);}
function fmtDate(s){const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;}
function fmtAmt(n){return (n>=0?'+':'')+n.toFixed(2)+'€';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function H(){return S.hcfg&&S.hcfg.length?S.hcfg:DEF_HABITS;}
function mKey(d){return iso(d||new Date()).slice(0,7);}
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  const el=document.createElement('div');el.className='toast-msg';el.textContent=msg;
  t.appendChild(el);setTimeout(()=>el.remove(),dur);
}
function scoreDay(day){if(!day)return 0;return H().reduce((a,hb)=>a+(day[hb.id]===true?1:0),0);}
function weightedScore(day){
  if(!day)return 0;
  return H().reduce((a,hb)=>a+(day[hb.id]===true?(S.config.weights[hb.id]||1):0),0);
}
function maxWeighted(){return H().reduce((a,hb)=>a+(S.config.weights[hb.id]||1),0);}
function pct(v,mx){return mx>0?Math.min(100,Math.round(v/mx*100)):0;}
function scoreColor(sc,mx){const p=pct(sc,mx);return p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)';}

/* ── STREAK ────────────────────────────────────────────────────────────── */
function currentStreak(){
  let streak=0,d=iso();
  const today=d;
  // Don't require today if not yet checked in
  while(true){
    const day=S.habits[d];
    if(!day||scoreDay(day)===0){
      if(d===today){d=isoPlus(d,-1);continue;}
      break;
    }
    streak++;d=isoPlus(d,-1);
  }
  return streak;
}
function bestStreak(){
  const dates=Object.keys(S.habits).filter(d=>scoreDay(S.habits[d])>0).sort();
  if(!dates.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<dates.length;i++){
    const prev=new Date(dates[i-1]),next=new Date(dates[i]);
    const diff=(next-prev)/(1000*60*60*24);
    if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;
  }
  return best;
}

/* ── FINANCE HELPERS ───────────────────────────────────────────────────── */
function txByMonth(mk){return S.finance.filter(t=>t.date.startsWith(mk));}
function monthRevenu(mk){return txByMonth(mk).filter(t=>t.type==='Revenu').reduce((a,t)=>a+t.amt,0);}
function monthDepense(mk){return txByMonth(mk).filter(t=>t.type==='Dépense').reduce((a,t)=>a+Math.abs(t.amt),0);}
function monthEpargne(mk){return txByMonth(mk).filter(t=>t.type==='Épargne').reduce((a,t)=>a+Math.abs(t.amt),0);}
function monthNet(mk){return txByMonth(mk).reduce((a,t)=>a+t.amt,0);}
function projectedBalance(mk){
  const now=new Date();
  const curMk=mKey();
  if(mk!==curMk)return null;
  const d=now.getDate();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const txs=txByMonth(mk);
  const net=txs.reduce((a,t)=>a+t.amt,0);
  if(d===0)return net;
  const dailyAvg=net/d;
  return Math.round(dailyAvg*daysInMonth*100)/100;
}

/* ── WEEKLY REPORT ─────────────────────────────────────────────────────── */
function weeklyReport(){
  const days=[];
  for(let i=6;i>=0;i--){const d=isoPlus(iso(),- i);days.push(d);}
  const checkins=days.filter(d=>S.habits[d]);
  if(checkins.length===0)return null;
  const rates=checkins.map(d=>{const s=scoreDay(S.habits[d]);return s/H().length;});
  const avgRate=rates.reduce((a,v)=>a+v,0)/rates.length;
  let bestDay=checkins[0],worstDay=checkins[0];
  checkins.forEach(d=>{
    if(scoreDay(S.habits[d])>scoreDay(S.habits[bestDay]))bestDay=d;
    if(scoreDay(S.habits[d])<scoreDay(S.habits[worstDay]))worstDay=d;
  });
  const mk=mKey();
  const wTx=S.finance.filter(t=>days.includes(t.date));
  const wNet=wTx.reduce((a,t)=>a+t.amt,0);
  return{checkins:checkins.length,avgRate:Math.round(avgRate*100),bestDay,worstDay,wNet};
}

/* ── CORRELATION ───────────────────────────────────────────────────────── */
function correlationData(){
  // Group by week, compute habit rate + financial net
  const dates=Object.keys(S.habits).sort();
  if(dates.length<7)return null;
  const weeks=[];
  let i=0;
  while(i<dates.length){
    const weekDates=dates.slice(i,i+7);
    const habitRates=weekDates.map(d=>scoreDay(S.habits[d])/H().length);
    const avgRate=habitRates.reduce((a,v)=>a+v,0)/habitRates.length;
    const wNet=S.finance.filter(t=>weekDates.includes(t.date)).reduce((a,t)=>a+t.amt,0);
    weeks.push({avgRate,wNet,start:weekDates[0]});
    i+=7;
  }
  const groups={high:{rates:[],nets:[]},med:{rates:[],nets:[]},low:{rates:[],nets:[]}};
  weeks.forEach(w=>{
    const g=w.avgRate>=0.7?'high':w.avgRate>=0.4?'med':'low';
    groups[g].rates.push(w.avgRate);groups[g].nets.push(w.wNet);
  });
  const avg=arr=>arr.length?arr.reduce((a,v)=>a+v,0)/arr.length:null;
  return{
    high:{n:groups.high.rates.length,avgRate:avg(groups.high.rates),avgNet:avg(groups.high.nets)},
    med:{n:groups.med.rates.length,avgRate:avg(groups.med.rates),avgNet:avg(groups.med.nets)},
    low:{n:groups.low.rates.length,avgRate:avg(groups.low.rates),avgNet:avg(groups.low.nets)}
  };
}

/* ── HABIT TRENDS ──────────────────────────────────────────────────────── */
function habitTrend(hid){
  const now=new Date();
  const cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const pm=new Date(now.getFullYear(),now.getMonth()-1,1);
  const pmk=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}`;
  const cur=Object.keys(S.habits).filter(d=>d.startsWith(cm));
  const prev=Object.keys(S.habits).filter(d=>d.startsWith(pmk));
  if(!cur.length||!prev.length)return 0;
  const curRate=cur.filter(d=>S.habits[d][hid]===true).length/cur.length;
  const prevRate=prev.filter(d=>S.habits[d][hid]===true).length/prev.length;
  return curRate-prevRate;
}

/* ── ANNUAL BILAN ──────────────────────────────────────────────────────── */
function annualBilan(){
  const months=new Set(S.finance.map(t=>t.date.slice(0,7)));
  if(months.size<3)return null;
  const totalRev=S.finance.filter(t=>t.type==='Revenu').reduce((a,t)=>a+t.amt,0);
  const totalDep=S.finance.filter(t=>t.type==='Dépense').reduce((a,t)=>a+Math.abs(t.amt),0);
  const totalSav=S.finance.filter(t=>t.type==='Épargne').reduce((a,t)=>a+Math.abs(t.amt),0);
  const savRate=totalRev>0?Math.round(totalSav/totalRev*100):0;
  const mks=[...months].sort();
  let bestMk=mks[0],worstMk=mks[0];
  mks.forEach(mk=>{
    if(monthNet(mk)>monthNet(bestMk))bestMk=mk;
    if(monthNet(mk)<monthNet(worstMk))worstMk=mk;
  });
  return{totalRev,totalDep,totalSav,savRate,bestMk,worstMk,months:months.size};
}

/* ── SVG CHARTS ────────────────────────────────────────────────────────── */
function barChart(data,labels,color,h=80){
  const W=320,H=h,max=Math.max(...data,1);
  const bw=Math.floor(W/data.length)-4;
  let bars='';
  data.forEach((v,i)=>{
    const bh=Math.max(2,Math.round(v/max*(H-20)));
    const x=i*(W/data.length)+2;
    const y=H-20-bh;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${color}" opacity="0.85"/>`;
    if(labels&&labels[i])bars+=`<text x="${x+bw/2}" y="${H-4}" text-anchor="middle" fill="#8B9BAD" font-size="9" font-family="Inter">${labels[i]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">${bars}</svg>`;
}

function lineChart(data,color,h=80,showDots=true){
  if(data.length<2)return '';
  const W=320,H=h;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=i/(data.length-1)*(W-10)+5;
    const y=H-10-((v-min)/range*(H-20));
    return `${x},${y}`;
  });
  const gid='lg'+(_gid++);
  let dots='';
  if(showDots)pts.forEach(p=>{const[x,y]=p.split(',');dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

function savingsCurve(mks){
  let cum=0;
  const vals=mks.map(mk=>{cum+=monthEpargne(mk);return cum;});
  const labels=mks.map(mk=>MN[parseInt(mk.split('-')[1])-1]);
  const W=320,H=100,max=Math.max(...vals,1);
  const pts=vals.map((v,i)=>{
    const x=i/(vals.length-1||1)*(W-20)+10;
    const y=H-10-Math.round(v/max*(H-20));
    return `${x},${y}`;
  });
  const gid='sc'+(_gid++);
  let lbels=labels.map((l,i)=>{
    const x=i/(vals.length-1||1)*(W-20)+10;
    return `<text x="${x}" y="${H}" text-anchor="middle" fill="#8B9BAD" font-size="9" font-family="Inter">${l}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H+10}" style="width:100%;height:${H+10}px">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A855F7" stop-opacity="0.4"/><stop offset="100%" stop-color="#A855F7" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${pts.join(' ')} ${320-10},${H-10} 10,${H-10}" fill="url(#${gid})"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="#A855F7" stroke-width="2" stroke-linejoin="round"/>
    ${lbels}
  </svg>`;
}

      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="stat-label">Streak actuel</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <div class="stat-num" style="color:var(--amber)">${streak}</div>
            <div style="font-size:13px;color:var(--g1)">jours</div>

function getScoreEmoji(score,mx){
  const p=pct(score,mx);
  if(p===100)return '🔥';if(p>=80)return '💪';if(p>=60)return '👍';if(p>=40)return '😐';return '😴';
}

function toggleHabitToday(hid){
  const d=iso();
  if(!S.habits[d])S.habits[d]={};
  S.habits[d][hid]=!S.habits[d][hid];
  save();render();
}

  if(!S.habits[_ciDate])S.habits[_ciDate]={};

/* ── FINANCES PAGE ─────────────────────────────────────────────────────── */
function renderFinances(){
  const tabs=['Historique','Ajouter'];
  return `<div class="page">
    <div class="page-title">Finances</div>
    <div class="tabs">${tabs.map((t,i)=>`<button class="tab${_ftab===i?' active':''}" onclick="_ftab=${i};render()">${t}</button>`).join('')}</div>
    ${_ftab===0?renderFinHistory():renderFinAdd()}
  </div>`;
}

function renderFinHistory(){
  const mk=mKey();
  const proj=projectedBalance(mk);
  const budgets=S.config.budgets||{};
  let allTx=[...S.finance].sort((a,b)=>b.date.localeCompare(a.date));
  if(_fSearch){
    const q=_fSearch.toLowerCase();
    allTx=allTx.filter(t=>t.desc.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q)||(t.tags||[]).some(tg=>tg.toLowerCase().includes(q)));
  }
  if(_fTagFilter){
    allTx=allTx.filter(t=>(t.tags||[]).includes(_fTagFilter));
  }

  // Budget bars for current month
  const monthTx=txByMonth(mk);
  const catSpend={};
  monthTx.filter(t=>t.type==='Dépense').forEach(t=>{catSpend[t.cat]=(catSpend[t.cat]||0)+Math.abs(t.amt);});
  const budgetCats=Object.keys(budgets).filter(c=>budgets[c]>0);
  let budgetHtml='';
  if(budgetCats.length){
    budgetHtml=`<div class="card" style="margin-bottom:12px">
      <div class="section-label">Budgets ${MN[parseInt(mk.split('-')[1])-1]}</div>
      ${budgetCats.map(c=>{
        const spent=catSpend[c]||0;
        const budget=budgets[c];
        const p=pct(spent,budget);
        const over=spent>budget;
        return `<div class="budget-row">
          <div class="budget-label">
            <span>${c} ${over?'⚠️':''}</span>
            <span style="color:${over?'var(--red)':'var(--g1)'};font-family:var(--font-mono)">${spent.toFixed(0)}/${budget}€</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,p)}%;background:${over?'var(--red)':p>70?'var(--amber)':'var(--green)'}"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  let projHtml='';
  if(proj!==null){
    const pColor=proj>=0?'var(--green)':'var(--red)';
    projHtml=`<div class="card-sm" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;color:var(--g1)">Prévision fin de mois</div>
      <div style="font-family:var(--font-mono);font-weight:700;color:${pColor}">${fmtAmt(proj)}</div>
    </div>`;
  }

  return `${budgetHtml}${projHtml}
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Rechercher..." value="${esc(_fSearch)}" oninput="_fSearch=this.value;render()">
    </div>
    ${_fTagFilter?`<div style="margin-bottom:8px;font-size:12px">Filtre tag: <span class="tag-badge">${esc(_fTagFilter)}</span> <button class="btn btn-ghost btn-sm" onclick="_fTagFilter='';render()">×</button></div>`:''}
    <div class="card">
      ${allTx.length===0?'<div style="text-align:center;color:var(--g1);padding:20px">Aucune transaction</div>':
        allTx.map(t=>renderTxRow(t)).join('')}
    </div>`;
}

function renderTxRow(t){
  const c=TCH[t.type]||'var(--g1)';
  const tags=(t.tags||[]).map(tg=>`<span class="tag-badge" onclick="event.stopPropagation();_fTagFilter='${esc(tg)}';render()" style="cursor:pointer">${esc(tg)}</span>`).join('');
  return `<div class="tx-row">
    <div class="tx-icon" style="background:${c}22">${catEmoji(t.cat)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.desc)}</div>
      <div style="font-size:11px;color:var(--g1)">${esc(t.cat)} · ${fmtDate(t.date)}</div>
      ${tags?`<div style="margin-top:2px">${tags}</div>`:''}
    </div>
    <div>
      <div class="tx-amt" style="color:${c}">${fmtAmt(t.amt)}</div>
      <button onclick="deleteTx('${t.id}')" style="background:none;border:none;color:var(--g2);cursor:pointer;font-size:12px;float:right;margin-top:2px">✕</button>
    </div>
  </div>`;
}

function addTx(){
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const cat=document.getElementById('f-cat').value;
  const desc=document.getElementById('f-desc').value.trim();
  const amt=parseFloat(document.getElementById('f-amt').value);
  const tagsRaw=document.getElementById('f-tags').value;
  const isRec=document.getElementById('f-recurring').checked;
  if(!desc||isNaN(amt)||amt<=0){toast('Remplis tous les champs');return;}
  const tags=tagsRaw.split(',').map(t=>t.trim()).filter(Boolean).slice(0,3);
  const finalAmt=(type==='Revenu'?1:-1)*Math.abs(amt);
  const tx={id:uid(),date,type,cat,desc,amt:finalAmt,tags};
  S.finance.push(tx);
  if(isRec){
    S.config.recurring.push({id:uid(),desc,type,cat,amt:finalAmt});
  }
  save();toast('Transaction ajoutée ✓');_ftab=0;render();
}

function addRecurring(rid){
  const r=S.config.recurring.find(x=>x.id===rid);
  if(!r)return;
  const tx={id:uid(),date:iso(),type:r.type,cat:r.cat,desc:r.desc,amt:r.amt,tags:[]};
  S.finance.push(tx);save();toast('Transaction ajoutée ✓');_ftab=0;render();
}

function deleteTx(id){
  S.finance=S.finance.filter(t=>t.id!==id);

}

function renderAnalHabits(){
  const mk=mKey();
  const allDates=Object.keys(S.habits).sort();
  const monthDates=allDates.filter(d=>d.startsWith(mk));
  const maxW=maxWeighted();

  // Per-habit stats
  const habitStats=H().map(hb=>{
    const total=allDates.filter(d=>S.habits[d][hb.id]===true).length;
    const rate=allDates.length>0?Math.round(total/allDates.length*100):0;
    const trend=habitTrend(hb.id);
    return{...hb,total,rate,trend};
  });

  // Monthly scores for bar chart
  const months=[...new Set(allDates.map(d=>d.slice(0,7)))].sort().slice(-6);
  const monthScores=months.map(m=>{
    const ds=allDates.filter(d=>d.startsWith(m));
    return ds.length?Math.round(ds.reduce((a,d)=>a+pct(scoreDay(S.habits[d]),H().length),0)/ds.length):0;
  });

  // Notes
  const noteDays=allDates.filter(d=>S.habits[d]&&S.habits[d]._note).reverse().slice(0,10);

  // Calendar view for current month
  const calHtml=renderCalendar(mk);

  // View toggle
  const viewToggle=`<div style="display:flex;gap:6px;margin-bottom:12px">
    <button class="btn btn-ghost btn-sm${_calView==='heatmap'?' btn-primary':''}" onclick="_calView='heatmap';render()">Heatmap</button>
    <button class="btn btn-ghost btn-sm${_calView==='calendar'?' btn-primary':''}" onclick="_calView='calendar';render()">Calendrier</button>
  </div>`;

  return `
    ${viewToggle}
    ${_calView==='calendar'?calHtml:renderHeatmap(allDates.slice(-90))}
    <div class="card" style="margin-top:12px">
      <div class="section-label">Score mensuel moyen %</div>
      ${barChart(monthScores,months.map(m=>MN[parseInt(m.split('-')[1])-1]),'var(--cyan)')}
    </div>
    <div class="card">
      <div class="section-label">Par habitude</div>
      ${habitStats.map(hb=>{
        const trendHtml=hb.trend>0.05?`<span class="trend-up">↑${Math.round(hb.trend*100)}%</span>`:
          hb.trend<-0.05?`<span class="trend-dn">↓${Math.round(Math.abs(hb.trend)*100)}%</span>`:
          `<span style="color:var(--g2);font-size:12px">→</span>`;
        const monthDone=monthDates.filter(d=>S.habits[d]&&S.habits[d][hb.id]===true).length;
        const monthRate=monthDates.length?Math.round(monthDone/monthDates.length*100):0;
        return `<div style="padding:8px 0;border-bottom:1px solid var(--b)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:18px">${hb.emoji}</span>
            <span style="font-size:13px;font-weight:600;flex:1">${hb.label}</span>
            ${trendHtml}
            <span style="font-family:var(--font-mono);font-size:12px;color:var(--g1)">${hb.rate}% global</span>
          </div>
          <div style="font-size:11px;color:var(--g2);margin-bottom:4px">Ce mois: ${monthRate}% · Pondéré: ${weightedScoreMonth(hb.id,mk)}/${maxW}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${monthRate}%;background:${scoreColor(monthDone,monthDates.length||1)}"></div></div>
        </div>`;
      }).join('')}
    </div>
    ${noteDays.length>0?`<div class="card">
      <div class="section-label">Notes journalières</div>
      ${noteDays.map(d=>`<div class="note-row">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:12px;font-weight:600">${fmtDate(d)}</span>
          <span style="font-size:11px;color:var(--g1)">${scoreDay(S.habits[d])}/${H().length}</span>
        </div>
        <div style="font-size:13px;color:var(--g1)">${esc(S.habits[d]._note)}</div>
      </div>`).join('')}
    </div>`:''}`;
}

function weightedScoreMonth(hid,mk){
  const days=Object.keys(S.habits).filter(d=>d.startsWith(mk));
  if(!days.length)return 0;
  return Math.round(days.filter(d=>S.habits[d][hid]===true).length/(days.length)*(S.config.weights[hid]||1)*100)/100;
}

function renderHeatmap(dates){
  if(!dates.length)return '';
  const cells=dates.map(d=>{
    const day=S.habits[d];
    const sc=day?scoreDay(day):0;const mx=H().length;
    const p=pct(sc,mx);
    const bg=!day?'var(--bg3)':p>=80?'var(--green)':p>=50?'var(--amber)':p>0?'var(--red)':'var(--bg3)';
    return `<div title="${d}: ${sc}/${mx}" style="width:10px;height:10px;border-radius:2px;background:${bg};cursor:pointer" onclick="showDayDetail('${d}')"></div>`;
  }).join('');
  return `<div class="card">
    <div class="section-label">Derniers 90 jours</div>
    <div style="display:flex;flex-wrap:wrap;gap:3px">${cells}</div>
    <div style="display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--g1)">
      <span>🟥 <40%</span><span>🟡 40-80%</span><span style="color:var(--green)">■ 80%+</span><span style="background:var(--bg3);padding:0 4px">vide</span>
    </div>
  </div>`;
}

function renderCalendar(mk){
  const [y,m]=mk.split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const offset=(firstDay+6)%7; // Mon=0
  let cells='';
  const dayHeaders=['L','M','M','J','V','S','D'];
  const headers=dayHeaders.map(d=>`<div class="cal-header">${d}</div>`).join('');
  // Empty cells
  for(let i=0;i<offset;i++)cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${mk}-${String(d).padStart(2,'0')}`;
    const day=S.habits[dateStr];
    const sc=day?scoreDay(day):null;
    const mx=H().length;
    const p=sc!==null?pct(sc,mx):null;
    const bg=sc===null?'var(--bg3)':p>=80?'rgba(0,229,160,0.3)':p>=50?'rgba(255,184,0,0.3)':p>0?'rgba(255,58,92,0.3)':'var(--bg3)';
    cells+=`<div class="cal-cell" style="background:${bg};font-size:10px;color:var(--w)" onclick="showDayDetail('${dateStr}')" title="${dateStr}">
      <span>${d}</span>
    </div>`;
  }
  return `<div class="card">
    <div class="section-label">Calendrier ${MN[m-1]} ${y}</div>
    <div class="cal-grid">${headers}${cells}</div>
  </div>`;
}

function showDayDetail(d){
  const day=S.habits[d]||{};
  const score=scoreDay(day);
  const mx=H().length;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">${fmtDate(d)}</div>
    <div style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:${scoreColor(score,mx)};margin-bottom:12px">${score}/${mx}</div>
    ${H().map(hb=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--b)">
      <span>${hb.emoji}</span><span style="flex:1">${hb.label}</span>
      <span style="color:${day[hb.id]?'var(--green)':'var(--red)'}">${day[hb.id]?'✓':'✗'}</span>
    </div>`).join('')}
    ${day._note?`<div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:var(--r2);font-size:13px;color:var(--g1)">${esc(day._note)}</div>`:''}
  `);
}

function renderAnalInsights(){
  const corr=correlationData();
  if(!corr)return `<div style="color:var(--g1);text-align:center;padding:30px">Pas assez de données</div>`;
  const groups=[
    {key:'high',label:'Habitudes élevées (≥70%)',color:'var(--green)',data:corr.high},
    {key:'med',label:'Habitudes moyennes (40-70%)',color:'var(--amber)',data:corr.med},
    {key:'low',label:'Habitudes faibles (<40%)',color:'var(--red)',data:corr.low}
  ];
  return `<div class="card">
    <div class="section-label">Corrélation habitudes × finances</div>
    <div style="font-size:12px;color:var(--g1);margin-bottom:12px">Analyse des semaines selon le taux d'habitudes complétées et le bilan financier moyen</div>
    ${groups.map(g=>`<div class="corr-row">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:${g.color}">${g.label}</div>
        <div style="font-size:11px;color:var(--g2)">${g.data.n} semaine(s)</div>
      </div>
      ${g.data.avgNet!==null?`<div>
        <div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:${g.data.avgNet>=0?'var(--green)':'var(--red)'}">${fmtAmt(Math.round(g.data.avgNet*100)/100)}</div>
        <div style="font-size:10px;color:var(--g2)">net moyen/sem.</div>
      </div>`:
      `<div style="font-size:12px;color:var(--g2)">Pas de données</div>`}
    </div>`).join('')}
  </div>
  <div class="card" style="margin-top:12px">
    <div class="section-label">Interprétation</div>
    ${generateInsightText(corr)}
  </div>`;
}

function generateInsightText(corr){
  const rows=[];
  if(corr.high.n>0&&corr.low.n>0&&corr.high.avgNet!==null&&corr.low.avgNet!==null){
    const diff=corr.high.avgNet-corr.low.avgNet;
    if(Math.abs(diff)>10){
      rows.push(`<div style="padding:8px;background:var(--bg2);border-radius:var(--r2);font-size:13px;margin-bottom:8px">
        Lors de tes semaines à haute discipline, ton bilan est en moyenne <strong style="color:${diff>0?'var(--green)':'var(--red)'}">${diff>0?'+':''}${Math.round(diff)}€</strong> ${diff>0?'meilleur':'moins bon'} que lors de tes semaines faibles.
      </div>`);
    }
  }
  rows.push(`<div style="font-size:12px;color:var(--g1)">Données basées sur ${Object.keys(S.habits).length} jours enregistrés.</div>`);
  return rows.join('');
}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.habits&&!data.finance)throw new Error('Structure invalide');
      openModal(`
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-title">Importer JSON</div>
        <div style="color:var(--g1);font-size:14px;margin-bottom:16px">
          ${data.finance?data.finance.length:0} transactions · ${Object.keys(data.habits||{}).length} jours de données<br>
          <strong style="color:var(--amber)">Cette action remplacera toutes tes données actuelles.</strong>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-danger" onclick="confirmImportJSON()">Confirmer l'import</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>`);
      window._pendingImport=data;
    }catch(err){toast('Fichier JSON invalide');}
  };
  reader.readAsText(file);
  input.value='';
}
function confirmImportJSON(){
  if(!window._pendingImport)return;
  S=window._pendingImport;
  if(!S.config)S.config={streakGoal:30,savingsGoal:200,theme:'dark',weights:{},budgets:{},recurring:[]};
  save();closeModal();render();toast('Import réussi ✓');
  window._pendingImport=null;
}
/* Auto-catégorisation par mots-clés */

  'Alimentation':['lidl','colruyt','delhaize','aldi','carrefour','spar','okay','proxy','albert','cora','match','intermarche','repas','restaurant','boulangerie','friterie','sushi','pizza','mcdo','burger','kebab','lunch','takeaway','deliveroo','uber eat','takeout','courses','supermarche','epicerie','boucherie','fromagerie'],
  'Transport':['shell','q8','total','dats','texaco','esso','lukoil','essence','carburant','parking','sncb','stib','de lijn','tec','nmbs','train','tram','metro','bus','taxi','uber','bolt','cambio','avis','hertz','eurocar','autoroute','vignette'],
  'Abonnements':['spotify','netflix','disney','amazon prime','hbo','apple','google','microsoft','adobe','youtube','twitch','deezer','tidal','prime video','canal','rtl'],
  'Sport':['basic fit','fitness','gym','myprotein','decathlon','go sport','running','veloland','cycling','swimming','sportworld','proteine','creatine','supplement'],
  'Santé':['pharmacie','medic','docteur','dentiste','kiné','hopital','clinique','mutuelle','assurance santé','optique','lunette','ophtalmo'],
  'Shopping':['zara','h&m','primark','pull','uniqlo','bershka','shein','amazon','zalando','bol.com','fnac','coolblue','mediamarkt','ikea','action','hema'],
  'Loisirs':['cinema','theatre','concert','musee','escape','bowling','karting','laser','sport aventure','billeterie','ticketmaster','fnac spectacle'],
  'Logement':['loyer','hypotheque','charges','eau','gaz','electricite','swde','ores','eneco','luminus','sibelga','proximus','telenet','voo','immobiliere'],
  'Factures':['proximus','telenet','voo','orange','base','edpnet','scarlet','droit','notaire','comptable','avocat'],
  'Épargne':['livret','epargne','argenta','belfius','kbc','ing epargne','triodos','nagelmackers'],
  'Salaire':['salaire','traitement','remuneration','virement employeur','flexi','interim','adecco','manpower','randstad']
};
function autoCat(desc){
  const d=desc.toLowerCase();
  for(const[cat,kws]of Object.entries(AUTO_CATS)){
    if(kws.some(k=>d.includes(k)))return cat;
  }
  return'Divers';
}
/* Détection format ING Belgique */
function parseINGLine(parts){
  // ING BE format: Num compte;Nom compte;Num contrepartie;Nom contrepartie;Rue;CP;Date tx;Date valeur;Montant;Devise;BIC;Communication;Détails
  if(parts.length>=9){
    const dateRaw=parts[6]?.trim()||parts[0]?.trim();
    const contrepartie=(parts[3]||'').trim();
    const communication=(parts[11]||'').trim();
    const desc=contrepartie||(communication)||'Transaction';
    const amtStr=(parts[8]||'').trim().replace(',','.').replace(/\s/g,'');
    const amtRaw=parseFloat(amtStr);
    let dateISO='';
    if(/\d{2}\/\d{2}\/\d{4}/.test(dateRaw)){const[d,m,y]=dateRaw.split('/');dateISO=`${y}-${m}-${d}`;}
    else if(/\d{4}-\d{2}-\d{2}/.test(dateRaw)){dateISO=dateRaw;}
    if(!dateISO||isNaN(amtRaw))return null;
    const cat=autoCat(desc+' '+(communication||''));
    const type=amtRaw>=0?'Revenu':cat==='Épargne'?'Épargne':'Dépense';
    return{date:dateISO,desc,amt:amtRaw,type,cat,tags:[]};
  }
  return null;
}
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const raw=e.target.result;
    const lines=raw.split('\n').filter(l=>l.trim());
    _csvParsed=[];
    /* Détecter le séparateur */
    const sep=lines[0]?.includes(';')?';':',';
    /* Détecter si format ING (≥9 colonnes, 1ère col = numéro de compte BE) */
    const isING=lines[0]&&(lines[0].includes('Num') || /BE\d{14}/.test(lines[1]||'') || lines[0].split(';').length>=9);
    lines.forEach((line,i)=>{
      if(i===0)return; // skip header always
      const parts=line.split(sep);
      let tx=null;
      if(isING){tx=parseINGLine(parts);}
      else{
        /* Format générique: date;desc;montant */
        if(parts.length<3)return;
        const dateRaw=parts[0].trim();
        const desc=(parts[1]||'').trim();
        const amtRaw=parseFloat((parts[2]||'').replace(',','.').trim());
        if(!desc||isNaN(amtRaw))return;
        let dateISO='';
        if(/\d{2}\/\d{2}\/\d{4}/.test(dateRaw)){const[d,m,y]=dateRaw.split('/');dateISO=`${y}-${m}-${d}`;}
        else if(/\d{4}-\d{2}-\d{2}/.test(dateRaw)){dateISO=dateRaw;}
        if(!dateISO)return;
        const cat=autoCat(desc);
        const type=amtRaw>=0?'Revenu':cat==='Épargne'?'Épargne':'Dépense';
        tx={date:dateISO,desc,amt:amtRaw,type,cat,tags:[]};
      }
      if(tx)_csvParsed.push(tx);
    });
    if(!_csvParsed.length){toast('Aucune transaction valide trouvée — vérifie le format','#FF3A5C');return;}
    const fmtBadge=isING?'<span style="background:#00D4FF22;border:1px solid #00D4FF44;color:#00D4FF;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:8px">Format ING détecté ✓</span>':'';
    const previewRows=_csvParsed.slice(0,12).map(r=>`<div class="csv-row">
      <span style="color:var(--g2)">${r.date}</span>
      <span title="${esc(r.desc)}">${esc(r.desc.length>28?r.desc.slice(0,28)+'…':r.desc)}</span>
      <span style="color:var(--g2);font-size:10px">${r.cat}</span>
      <span style="color:${r.amt>=0?'var(--green)':'var(--red)'}; font-weight:700">${r.amt>=0?'+':''}${r.amt.toFixed(2)}\u00a0€</span>
    </div>`).join('');
    openModal(`<div style="display:flex;align-items:center;margin-bottom:4px"><div class="eyebrow">Aperçu import CSV</div>${fmtBadge}</div>
      <div style="font-size:12px;color:var(--g1);margin-bottom:10px">${_csvParsed.length} transaction${_csvParsed.length>1?'s':''} détectée${_csvParsed.length>1?'s':''}</div>
      <div class="csv-preview">
        <div class="csv-row" style="font-weight:700;font-size:10px;letter-spacing:1px;color:var(--g2);background:var(--bg3)"><span>DATE</span><span>DESCRIPTION</span><span>CAT.</span><span>MONTANT</span></div>
        ${previewRows}
      </div>
      ${_csvParsed.length>12?`<div style="font-size:11px;color:var(--g2);margin-top:4px;text-align:center">... et ${_csvParsed.length-12} transactions de plus</div>`:''}
      <div style="background:var(--bg2);border-radius:8px;padding:10px;margin:12px 0;font-size:11px;color:var(--g2);line-height:1.6">
        💡 Les catégories ont été assignées automatiquement. Tu pourras les modifier après l'import.
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-p" style="background:var(--amber);color:var(--bg);flex:1" onclick="confirmImportCSV()">Importer ${_csvParsed.length} transactions →</button>
        <button class="btn-p" style="background:var(--bg2);color:var(--g1)" onclick="closeModal()">Annuler</button>
      </div>`);
  };
  reader.readAsText(file,'ISO-8859-1'); // ING exports in Latin-1
  input.value='';
}
function confirmImportCSV(){
  _csvParsed.forEach(r=>{S.finance.push({id:uid(),...r,tags:[]});});
  save();closeModal();render();toast(`${_csvParsed.length} transactions importées ✓`);_csvParsed=[];
}
function resetData(){
  if(!confirm('Réinitialiser toutes les données ? Cette action est irréversible.'))return;
  localStorage.removeItem(SK);load();render();toast('Données réinitialisées');
}

/* ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────── */
function handleKey(e){
  if(window.innerWidth<768)return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const map={'1':'home','2':'checkin','3':'finances','4':'analytics','5':'config'};
  if(map[e.key]){nav(map[e.key]);}
  else if(e.key==='Escape'){closeModal();}
}
document.addEventListener('keydown',handleKey);

/* ── MAIN RENDER ───────────────────────────────────────────────────────── */
function render(){
  renderSidebar();
  renderBnav();
  renderRightPanel();
  const root=document.getElementById('root');
  switch(_page){
    case 'home':root.innerHTML=renderHome();break;
    case 'checkin':root.innerHTML=renderCheckin();break;
    case 'finances':root.innerHTML=renderFinances();break;
    case 'analytics':root.innerHTML=renderAnalytics();break;
    case 'config':root.innerHTML=renderConfig();break;
  }
  // Show mobile theme button
  const mb=document.getElementById('mobile-theme-btn');
  if(mb&&window.innerWidth<768)mb.style.display='flex';
}

/* ── INIT ──────────────────────────────────────────────────────────────── */
load();
render();
</script>
