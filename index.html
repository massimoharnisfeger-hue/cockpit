window.updateTaskField = function(id, field, val){
  var t=(S.tasks||[]).find(function(x){return x.id===id;});
  if(!t) return;
  t[field]=val;
  save();
  if(field==='priority') openTaskDetail(id);
};
window.addSubtask = function(id){
  var inp = document.getElementById('sub-inp-'+id);
  var text = inp?inp.value.trim():'';
  if(!text) return;
  var t=(S.tasks||[]).find(function(x){return x.id===id;});
  if(!t) return;
  if(!t.subtasks) t.subtasks=[];
  t.subtasks.push({text:text,done:false});
  save(); openTaskDetail(id);
};
window.toggleSubtask = function(taskId, subIdx){
  var t=(S.tasks||[]).find(function(x){return x.id===taskId;});
  if(!t||!t.subtasks[subIdx]) return;
  t.subtasks[subIdx].done=!t.subtasks[subIdx].done;
  if(t.subtasks.length&&t.subtasks.every(function(s){return s.done;})&&t.status!=='done'){
    t.status='done'; t.completedAt=iso(); addXP(t.xpReward||10,'subtasks all done');
  }
  save(); openTaskDetail(taskId);
};

// ── initKanbanDragDrop ────────────────────────────────────────────────────────
window._dragTaskId=null;
window._dragFromCol=null;
window.initKanbanDragDrop=function(){
  document.querySelectorAll('.v8-ktask[data-id]').forEach(function(card){
    card.addEventListener('dragstart',function(e){
      window._dragTaskId=this.dataset.id;
      window._dragFromCol=this.dataset.status;
      this.style.opacity='0.5';
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',function(){
      this.style.opacity='1';
      document.querySelectorAll('.v8-kcol').forEach(function(col){col.classList.remove('drag-over');});
    });
  });
  document.querySelectorAll('.v8-kcol[id]').forEach(function(col){
    col.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.v8-kcol').forEach(function(c){c.classList.remove('drag-over');});
      this.classList.add('drag-over');
    });
    col.addEventListener('dragleave',function(){this.classList.remove('drag-over');});
    col.addEventListener('drop',function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      var newStatus=this.id.replace('kcol-','');
      if(window._dragTaskId&&newStatus!==window._dragFromCol){
        moveTaskStatus(window._dragTaskId,newStatus);
      }
      window._dragTaskId=null;
    });
  });
};
window.initTachesV3=function(){
  if(window._tacheView==='kanban') window.initKanbanDragDrop();
  scheduleAllReminders();
  requestNotifPerm();
};
window.initTachesV4=function(){
  window._tv4WeekDay=window._tv4WeekDay||iso();
  window._tv4PlanView=window._tv4PlanView||'mois';
  window._tv4PlanOpen=false;
  scheduleAllReminders();
  requestNotifPerm();
  document.querySelectorAll('.tv4-task-row[data-id]').forEach(function(el){
    var startX=0,startY=0,id=el.dataset.id;
    el.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
    el.addEventListener('touchmove',function(e){
      var dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(Math.abs(dy)>Math.abs(dx)*0.5||Math.abs(dx)<10) return;
      var rEl=el.querySelector('.tv4-swipe-right'),lEl=el.querySelector('.tv4-swipe-left');
      if(dx>0){if(rEl)rEl.style.opacity=Math.min(1,dx/80);if(lEl)lEl.style.opacity=0;}
      else{if(lEl)lEl.style.opacity=Math.min(1,Math.abs(dx)/80);if(rEl)rEl.style.opacity=0;}
    },{passive:true});
    el.addEventListener('touchend',function(e){
      var dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;
      var rEl=el.querySelector('.tv4-swipe-right'),lEl=el.querySelector('.tv4-swipe-left');
      if(rEl)rEl.style.opacity=0;if(lEl)lEl.style.opacity=0;
      if(Math.abs(dy)>Math.abs(dx)*0.5||Math.abs(dx)<40) return;
      if(dx>40) tv4SwipeDone(id);
      else if(dx<-40) tv4SwipeReport(id);
    });
  });
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function tv3FilterTasks(tasks){
  var f=window._tv3||{};
  var q=(f.q||'').toLowerCase();
  return tasks.filter(function(t){
    if(f.pri!=='all'&&t.priority!==f.pri) return false;
    if(f.cat!=='all'&&t.category!==f.cat) return false;
    if(q&&(t.text||'').toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
}
function tv3SortTasks(tasks){
  var s=(window._tv3||{}).sort||'priority';
  var priO={urgente:0,haute:1,moyenne:2,basse:3};
  return tasks.slice().sort(function(a,b){
    if(s==='priority') return (priO[a.priority]||2)-(priO[b.priority]||2);
    if(s==='date'){if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);}
    if(s==='duration') return (parseInt(a.duration)||999)-(parseInt(b.duration)||999);
    if(s==='alpha') return(a.text||'').localeCompare(b.text||'');
    return 0;
  });
}
function tv3TaskRow(t, opts){
  opts=opts||{};
  var today=iso();
  var st=t.status||'todo';
  var overdue=t.dueDate&&t.dueDate<today&&st!=='done';
  var stIcon={todo:'',doing:'▶',done:'✓',blocked:'!',inbox:'?'};
  var stCls={todo:'todo',doing:'doing',done:'done',blocked:'blocked',inbox:'inbox'};
  var durLabel=t.duration?'<span class="tv3-dur">⏱ '+t.duration+'min</span>':'';
  var recLabel=t.recurring?'<span class="tv3-recurring-badge">🔁 '+({daily:'Quotidien',weekly:'Hebdo',monthly:'Mensuel',weekdays:'Ouvrés'}[t.recurring]||t.recurring)+'</span>':'';
  var tagsHtml=(t.tags||[]).map(function(tag){return '<span class="tv3-tag">'+tag+'</span>';}).join('');
  var dateLabel='';
  if(t.dueDate){
    var dc=overdue?'overdue':t.dueDate===today?'today':(t.dueDate<=isoPlus(today,3)?'soon':'');
    dateLabel='<span class="tv3-date '+dc+'">'+(overdue?'⚠ ':t.dueDate===today?'📅 ':'')+fmtDate(t.dueDate)+'</span>';
  }
  var sub=t.subtasks||[];
  var subDone=sub.filter(function(s){return s.done;}).length;
  var subLabel=sub.length?'<span style="font-size:10px;color:var(--g1)">'+subDone+'/'+sub.length+' ✓</span>':'';
  var pct=parseInt(t.progress)||0;
  var cat=(TASK_CATEGORIES.find(function(c){return c.id===t.category;})||{emoji:'📌',label:t.category||'Perso'});
  var sel=(window._tv3.sel||[]).indexOf(t.id)!==-1;
  var snoozeMenu=(window._snoozeOpen===t.id)?
    '<div class="tv3-snooze-menu">'
    +'<button class="tv3-snooze-opt" onclick="snoozeTask(\''+t.id+'\',1)">Demain</button>'
    +'<button class="tv3-snooze-opt" onclick="snoozeTask(\''+t.id+'\',2)">Dans 2 jours</button>'
    +'<button class="tv3-snooze-opt" onclick="snoozeTask(\''+t.id+'\',7)">Semaine prochaine</button>'
    +'<button class="tv3-snooze-opt" onclick="snoozeTask(\''+t.id+'\',14)">Dans 2 semaines</button>'
    +'<button class="tv3-snooze-opt" onclick="snoozeTask(\''+t.id+'\',30)">Dans un mois</button>'
    +'</div>':'';
  return '<div class="tv3-task'+(sel?' tv3-sel':'')+(overdue?' tv3-overdue':'')+(st==='done'?' tv3-done-task':'')+'" onclick="openTaskDetail(\''+t.id+'\') " >'
    +'<div class="tv3-check '+stCls[st]+'" onclick="event.stopPropagation();'+(st==='done'?'restoreTask(\''+t.id+'\')':'moveTaskStatus(\''+t.id+'\',\'done\')')+'">'+(stIcon[st]||'')+'</div>'
    +'<div class="tv3-body">'
    +'<div class="tv3-title'+(st==='done'?' done':'')+'">'+cat.emoji+' '+(t.text||'')+'</div>'
    +'<div class="tv3-meta">'
    +'<span class="tv3-pri '+( t.priority||'moyenne')+'">'+({urgente:'🔴 Urgent',haute:'🟠 Haute',moyenne:'🟣 Moyen',basse:'⚪ Bas'}[t.priority]||t.priority)+'</span>'
    +dateLabel+durLabel+recLabel+subLabel+tagsHtml
    +'</div>'
    +(pct>0&&pct<100?'<div class="tv3-prog"><div class="tv3-prog-fill" style="width:'+pct+'%"></div></div>':'')
    +'</div>'
    +'<div class="tv3-actions" onclick="event.stopPropagation()">'
    +(st!=='done'?'<button class="tv3-btn tv3-btn-done" onclick="moveTaskStatus(\''+t.id+'\',\'done\')">✓</button>':'')
    +'<div class="tv3-snooze-wrap"><button class="tv3-btn tv3-btn-snz" onclick="toggleSnooze(\''+t.id+'\',event)">😴</button>'+snoozeMenu+'</div>'
    +(st!=='done'?'<button class="tv3-btn tv3-btn-pomo" onclick="startPomodoro(\''+t.id+'\');render()">🍅</button>':'')
    +'<button class="tv3-btn" style="padding:3px 5px;color:var(--g1);font-size:9px" onclick="toggleTaskSelect(\''+t.id+'\',event)">'+(sel?'☑':'☐')+'</button>'
    +'</div>'
    +'</div>';
}

// ── VIEW: Aujourd'hui ─────────────────────────────────────────────────────────
function renderTodayView(tasks){
  var today=iso();
  var urgent=tasks.filter(function(t){return t.priority==='urgente'&&t.status!=='done';});
  var dueToday=tasks.filter(function(t){return t.dueDate===today&&t.status!=='done'&&t.priority!=='urgente';});
  var doing=tasks.filter(function(t){return t.status==='doing'&&t.priority!=='urgente'&&t.dueDate!==today;});
  var overdue=tasks.filter(function(t){return t.dueDate&&t.dueDate<today&&t.status!=='done'&&t.priority!=='urgente';});
  var recap=getDailyRecap();
  var streak=getTaskStreak();
  var recapHtml='<div class="tv3-recap-card"><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px">'
    +'<span>✅ Fait aujourd\'hui: <strong style="color:var(--green)">'+recap.done+'</strong></span>'
    +'<span>📋 En attente: <strong style="color:var(--amber)">'+recap.pending+'</strong></span>'
    +'<span>⭐ XP: <strong style="color:var(--cyan)">+'+recap.xpEarned+'</strong></span>'
    +(streak>1?'<span>🔥 Streak: <strong style="color:var(--amber)">'+streak+' jours</strong></span>':'')
    +'</div></div>';
  var out=recapHtml;
  function section(title, color, items){
    if(!items.length) return '';
    return '<div class="tv3-section">'
      +'<div class="tv3-section-hdr"><span class="tv3-section-title" style="color:'+color+'">'+title+' ('+items.length+')</span></div>'
      +items.map(function(t){return tv3TaskRow(t);}).join('')+'</div>';
  }
  out+=section('🔴 Urgentes',   'var(--red)',   urgent);
  out+=section('⚠️ En retard',  'var(--red)',   overdue);
  out+=section('📅 Aujourd\'hui','var(--cyan)',  dueToday);
  out+=section('▶ En cours',    'var(--amber)', doing);
  if(!urgent.length&&!dueToday.length&&!doing.length&&!overdue.length){
    out+='<div class="tv3-empty"><div style="font-size:32px;margin-bottom:8px">✨</div><div style="color:var(--w);font-weight:700">Journée libre !</div><div style="margin-top:4px">Ajoute une tâche ou profite de ta journée.</div></div>';
  }
  return out;
}

// ── VIEW: Semaine ─────────────────────────────────────────────────────────────
function renderWeekView(tasks){
  var today=iso();
  var days=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()+i);days.push(d);}
  var jours=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var cols=days.map(function(d){
    var key=d.toISOString().slice(0,10);
    var isToday=key===today;
    var dayTasks=tasks.filter(function(t){return t.dueDate===key&&t.status!=='done';});
    var items=dayTasks.slice(0,4).map(function(t){
      return '<div class="tv3-witem '+( t.priority||'moyenne')+'" onclick="openTaskDetail(\''+t.id+'\')">'+t.text.slice(0,20)+(t.text.length>20?'…':'')+'</div>';
    }).join('');
    var more=dayTasks.length>4?'<div style="font-size:10px;color:var(--g1);padding-top:2px">+'+( dayTasks.length-4)+' autres</div>':'';
    return '<div class="tv3-week-col'+(isToday?' today':'')+'">'
      +'<div class="tv3-wday">'+jours[d.getDay()]+'</div>'
      +'<div class="tv3-wdate" style="color:'+(isToday?'var(--cyan)':'var(--w)')+'">'+d.getDate()+'</div>'
      +(items||'<div style="font-size:10px;color:var(--b);padding:4px 0">—</div>')
      +more+'</div>';
  }).join('');
  var undated=tasks.filter(function(t){return !t.dueDate&&t.status!=='done';});
  return '<div class="tv3-week-row">'+cols+'</div>'
    +(undated.length?'<div class="tv3-section-hdr" style="margin-top:8px"><span class="tv3-section-title">Sans date ('+undated.length+')</span></div>'+undated.slice(0,5).map(function(t){return tv3TaskRow(t);}).join(''):'');
}

      var cat=cats[t.category]||{color:'#666',emoji:'📌',label:t.category};

      var subDone=sub.filter(function(s){return s.done;}).length;
      return '<div class="v8-ktask" draggable="true" data-id="'+t.id+'" data-status="'+col.id+'" onclick="openTaskDetail(\''+t.id+'\')">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
        +'<span style="font-size:10px;font-weight:700;color:'+priColor+';background:'+priColor+'22;padding:1px 6px;border-radius:6px;text-transform:uppercase">'+t.priority+'</span>'
        +'<span style="font-size:10px;color:'+cat.color+';background:'+cat.color+'22;padding:1px 6px;border-radius:6px">'+cat.emoji+' '+cat.label+'</span>'
        +(t.recurring?'<span class="tv3-recurring-badge">🔁</span>':'')
        +'</div>'
        +'<div style="font-size:13px;font-weight:600;color:var(--w);line-height:1.3;margin-bottom:6px">'+t.text+'</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;gap:6px">'
        +(t.dueDate?'<span style="font-size:11px;color:'+(overdue?'var(--red)':'var(--g1)')+'">'+t.dueDate+'</span>':'<span></span>')
        +(sub.length?'<span style="font-size:11px;color:var(--g1)">'+subDone+'/'+sub.length+' ✓</span>':'')
        +'</div>'
        +(sub.length?'<div style="height:3px;background:var(--b);border-radius:2px;margin-top:6px"><div style="height:100%;background:var(--green);border-radius:2px;width:'+Math.round(subDone/sub.length*100)+'%"></div></div>':'')
        +'<div style="display:flex;gap:6px;margin-top:8px">'
        +(col.id!=='done'?'<button onclick="event.stopPropagation();moveTaskStatus(\''+t.id+'\',\'done\')" style="flex:1;font-size:11px;padding:3px;background:rgba(0,229,160,.15);border:none;border-radius:6px;color:var(--green);cursor:pointer">✓ Fait</button>':'')
        +(col.id==='todo'?'<button onclick="event.stopPropagation();moveTaskStatus(\''+t.id+'\',\'doing\')" style="flex:1;font-size:11px;padding:3px;background:rgba(0,212,255,.15);border:none;border-radius:6px;color:var(--cyan);cursor:pointer">▶ Démarrer</button>':'')
        +'<button onclick="event.stopPropagation();deleteTask(\''+t.id+'\')" style="font-size:11px;padding:3px 8px;background:rgba(255,58,92,.15);border:none;border-radius:6px;color:var(--red);cursor:pointer">✕</button>'
        +'</div></div>';
    }).join('');
    return '<div class="v8-kcol" id="kcol-'+col.id+'">'
      +'<div class="v8-kcol-hdr" style="border-top:3px solid '+col.color+'">'
      +'<span style="font-weight:700;font-size:13px;color:'+col.color+'">'+col.label+'</span>'
      +'<span style="font-size:11px;color:var(--g1);background:var(--b);padding:2px 8px;border-radius:10px">'+colTasks.length+'</span>'
      +'</div>'+(cards||'<div></div>')+'</div>';
  }).join('');
  return '<div class="v8-kanban">'+colsHTML+'</div>';
}

// ── VIEW: Stats ───────────────────────────────────────────────────────────────
function renderStatsView(tasks){
  var today=iso();
  var done=tasks.filter(function(t){return t.status==='done';});
  var active=tasks.filter(function(t){return t.status!=='done';});
  var streak=getTaskStreak();
  var thisWeek=[];for(var i=6;i>=0;i--){var dd=new Date();dd.setDate(dd.getDate()-i);thisWeek.push(dd.toISOString().slice(0,10));}
  var weekDone=done.filter(function(t){return thisWeek.indexOf(t.completedAt)!==-1;}).length;
  var completionRate=tasks.length?Math.round(done.length/tasks.length*100):0;
  var totalEstim=active.reduce(function(s,t){return s+(parseInt(t.duration)||0);},0);
  var byCat={};
  done.forEach(function(t){byCat[t.category]=(byCat[t.category]||0)+1;});
  var topCat=Object.entries(byCat).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  var catBarsHtml=topCat.map(function(pair){
    var c=TASK_CATEGORIES.find(function(x){return x.id===pair[0];})||{emoji:'📌',label:pair[0]};
    var pct=done.length?Math.round(pair[1]/done.length*100):0;
    return '<div style="margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'
      +'<span>'+c.emoji+' '+c.label+'</span><span style="color:var(--g1)">'+pair[1]+' ('+pct+'%)</span></div>'
      +'<div class="tv3-prog"><div class="tv3-prog-fill" style="width:'+pct+'%;background:'+(c.color||'var(--cyan)')+'"></div></div>'
      +'</div>';
  }).join('');

  // Goals progress
  var goalsHtml='';
  if((S.goals||[]).length){
    goalsHtml='<div class="v8-sec" style="margin-top:16px">🎯 Objectifs</div>'
      +(S.goals||[]).map(function(g){
        var total=(g.taskIds||[]).length;
        var completed=(g.taskIds||[]).filter(function(id){return (S.tasks||[]).some(function(t){return t.id===id&&t.status==='done';});}).length;
        var pct=total?Math.round(completed/total*100):0;
        return '<div class="tv3-goal-row">'
          +'<div class="tv3-goal-hdr"><span class="tv3-goal-title">'+g.emoji+' '+g.title+'</span><span class="tv3-goal-pct">'+pct+'%</span></div>'
          +'<div class="tv3-goal-bar"><div class="tv3-goal-fill" style="width:'+pct+'%"></div></div>'
          +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g1);margin-top:4px"><span>'+completed+'/'+total+' tâches</span>'
          +'<button onclick="deleteGoal(\''+g.id+'\')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:10px">Supprimer</button></div>'
          +'</div>';
      }).join('');
  }

  // Templates section
  var tplHtml='';
  if((S.taskTemplates||[]).length){
    tplHtml='<div class="v8-sec" style="margin-top:16px">📋 Templates</div>'
      +(S.taskTemplates||[]).map(function(tpl){
        return '<div class="tv3-template-row">'
          +'<span style="flex:1;font-size:13px;color:var(--w)">'+tpl.name+'</span>'
          +'<span style="font-size:11px;color:var(--g1)">'+tpl.tasks.length+' tâche(s)</span>'
          +'<button onclick="applyTemplate(\''+tpl.id+'\')" style="padding:4px 10px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:6px;color:var(--cyan);cursor:pointer;font-size:11px">Appliquer</button>'
          +'<button onclick="deleteTemplate(\''+tpl.id+'\')" style="padding:4px 8px;background:rgba(255,58,92,.1);border:1px solid rgba(255,58,92,.2);border-radius:6px;color:var(--red);cursor:pointer;font-size:11px">✕</button>'
          +'</div>';
      }).join('');
  }

  return '<div class="tv3-stat-grid">'
    +'<div class="tv3-stat-card"><div class="tv3-stat-val" style="color:var(--green)">'+done.length+'</div><div class="tv3-stat-lbl">Complétées</div></div>'
    +'<div class="tv3-stat-card"><div class="tv3-stat-val" style="color:var(--cyan)">'+completionRate+'%</div><div class="tv3-stat-lbl">Taux complétion</div></div>'
    +'<div class="tv3-stat-card"><div class="tv3-stat-val" style="color:var(--amber)">'+streak+'</div><div class="tv3-stat-lbl">Streak jours</div></div>'
    +'<div class="tv3-stat-card"><div class="tv3-stat-val" style="color:var(--purp)">'+weekDone+'</div><div class="tv3-stat-lbl">Cette semaine</div></div>'
    +'</div>'
    +(totalEstim?'<div style="font-size:12px;color:var(--g1);margin-bottom:12px">⏱ Temps estimé restant : <strong style="color:var(--w)">'+Math.floor(totalEstim/60)+'h'+('0'+(totalEstim%60)).slice(-2)+'</strong></div>':'')
    +(topCat.length?'<div class="v8-sec">Top catégories</div>'+catBarsHtml:'')
    +goalsHtml
    +'<div class="v8-sec" style="margin-top:16px">➕ Ajouter un objectif</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:16px"><input id="tv3-goal-input" type="text" placeholder="Mon objectif..." class="tv3-search" style="margin:0;flex:1"><button onclick="addGoal()" style="padding:8px 14px;background:var(--cyan);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer">+</button></div>'
    +tplHtml
    +(window._tv3.sel&&window._tv3.sel.length>0?'<div class="v8-sec" style="margin-top:16px">💾 Sauvegarder comme template</div><div style="display:flex;gap:6px"><input id="tv3-tpl-name" type="text" placeholder="Nom du template..." class="tv3-search" style="margin:0;flex:1"><button onclick="saveAsTemplate()" style="padding:8px 14px;background:var(--purp);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">Sauver</button></div>':'')
    +'<div class="v8-sec" style="margin-top:16px">📥 Import multi-lignes</div>'
    +'<textarea class="tv3-import-area" id="tv3-import-ta" placeholder="Une tâche par ligne...&#10;Appeler dentiste demain #sante urgent&#10;Finir rapport #tfe"></textarea>'
    +'<button onclick="importTasksText()" style="width:100%;padding:10px;background:var(--bg1);border:1px solid var(--b);border-radius:10px;color:var(--w);cursor:pointer;font-size:13px;font-weight:600">Importer</button>';
}

function tv4TaskRow(t){
  var isUrgent=t.priority==='urgente';
  var isDoing=t.status==='doing';
  var cls='tv4-task-row'+(isUrgent?' urgent':isDoing?' doing':'');
  var meta='';
  var today=iso();
  if(isUrgent) meta='URGENT'+(t.dueDate?' · '+(t.dueDate===today?'Aujourd’hui':t.dueDate):'');
  else if(t.dueDate) meta=t.dueDate===today?'Aujourd’hui':t.dueDate;
  if(t.category) meta+=(meta?' · ':'')+t.category;
  return '<div class="'+cls+'" data-id="'+t.id+'" onclick="openTaskDetail(\''+t.id+'\')">'
    +'<div class="tv4-swipe-right">✓ Fait</div>'
    +'<div class="tv4-swipe-left">😴 Reporter</div>'
    +'<div class="tv4-check'+(isUrgent?' urgent':isDoing?' doing':'')+'"></div>'
    +'<div class="tv4-task-body">'
    +'<div class="tv4-task-text">'+t.text.slice(0,60)+(t.text.length>60?'…':'')+'</div>'
    +(meta?'<div class="tv4-task-meta'+(isUrgent?' urgent':'')+'">'+meta+'</div>':'')
    +'</div>'
    +'<div class="tv4-task-arrow">›</div>'
    +'</div>';
}

function renderZoneMaintenant(tasks){
  var today=iso();
  var h=new Date().getHours();
  var urgent=tasks.filter(function(t){return t.priority==='urgente'&&t.status!=='done';});
  var overdue=tasks.filter(function(t){return t.dueDate&&t.dueDate<today&&t.status!=='done'&&t.priority!=='urgente';});
  var dueToday=tasks.filter(function(t){return t.dueDate===today&&t.status!=='done'&&t.priority!=='urgente';});
  var doing=tasks.filter(function(t){return t.status==='doing'&&t.priority!=='urgente'&&t.dueDate!==today&&!(t.dueDate&&t.dueDate<today);});
  var noDate=tasks.filter(function(t){return !t.dueDate&&t.status!=='done'&&t.priority!=='urgente'&&t.status!=='doing';});
  var sections=[];
  if(h>=5&&h<12){
    if(urgent.length) sections.push({label:'URGENT',cls:'urgent',items:urgent});
    if(overdue.length) sections.push({label:'EN RETARD',cls:'urgent',items:overdue});
    if(dueToday.length) sections.push({label:'AUJOURD’HUI',cls:'',items:dueToday});
    if(doing.length) sections.push({label:'EN COURS',cls:'',items:doing});
  } else if(h>=12&&h<19){
    if(doing.length) sections.push({label:'EN COURS',cls:'',items:doing});
    if(urgent.length) sections.push({label:'URGENT',cls:'urgent',items:urgent});
    if(overdue.length) sections.push({label:'EN RETARD',cls:'urgent',items:overdue});
    if(dueToday.length) sections.push({label:'AUJOURD’HUI',cls:'',items:dueToday});
  } else {
    var unfinished=tasks.filter(function(t){return (t.dueDate===today||t.status==='doing')&&t.status!=='done';});
    if(unfinished.length) sections.push({label:'NON FINIES',cls:'',items:unfinished});
    else if(urgent.length) sections.push({label:'URGENT',cls:'urgent',items:urgent});
    if(overdue.length) sections.push({label:'EN RETARD',cls:'urgent',items:overdue});
  }
  var total=sections.reduce(function(s,sec){return s+sec.items.length;},0)+noDate.length;
  var html='<div class="tv4-zone-now">'
    +'<div class="tv4-zone-hdr">'
    +'<span class="tv4-zone-label" style="color:var(--cyan)">⚡ MAINTENANT</span>'
    +'<span class="tv4-zone-count">'+total+' tâche'+(total>1?'s':'')+'</span>'
    +'</div>';
  if(!sections.length&&!noDate.length){
    html+='<div class="tv4-empty">🎉 Rien d&#39;urgent — belle journée !</div>';
  } else {
    sections.forEach(function(sec){
      html+='<div class="tv4-sep'+(sec.cls?' '+sec.cls:'')+'">'+sec.label+' · '+sec.items.length+'</div>';
      html+=sec.items.map(function(t){return tv4TaskRow(t);}).join('');
    });
    if(noDate.length){
      html+='<div class="tv4-sep" style="margin-top:10px">À TRIER</div>';
      html+=noDate.slice(0,3).map(function(t){return tv4TaskRow(t);}).join('');
      if(noDate.length>3) html+='<div class="tv4-empty" style="cursor:pointer" onclick="openPlanifier(\'mois\')">+ '+(noDate.length-3)+' autres non planifiées</div>';
    }
  }
  html+='</div>';
  return html;
}

function renderZoneSemaine(tasks){
  var today=iso();
  var selDay=window._tv4WeekDay||today;
  var d=new Date(today);
  var dow=d.getDay();var diff=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diff);
  var days=[];
  for(var i=0;i<7;i++){var dd=new Date(d);dd.setDate(d.getDate()+i);days.push(dd.toISOString().slice(0,10));}
  var dl=['L','M','M','J','V','S','D'];
  var strip=days.map(function(day,i){
    var hasUrgent=tasks.some(function(t){return t.dueDate===day&&t.priority==='urgente'&&t.status!=='done';});
    var hasTasks=!hasUrgent&&tasks.some(function(t){return t.dueDate===day&&t.status!=='done';});
    var cls='tv4-day-num'+(day===today?' today':'')+(day===selDay&&day!==today?' selected':'')+(hasUrgent?' has-urgent':hasTasks?' has-tasks':'');
    return '<div class="tv4-day-cell" onclick="tv4SelectDay(\''+day+'\')">'
      +'<div class="tv4-day-letter">'+dl[i]+'</div>'
      +'<div class="'+cls+'" data-date="'+day+'">'+parseInt(day.slice(8))+'</div>'
      +'</div>';
  }).join('');
  var selDate=new Date(selDay);
  var selLbl=selDate.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  return '<div class="tv4-zone-week">'
    +'<div class="tv4-zone-hdr">'
    +'<span class="tv4-zone-label" style="color:var(--g1)">📅 CETTE SEMAINE</span>'
    +'<span class="tv4-see-all" onclick="openPlanifier(\'semaine\')">Voir tout →</span>'
    +'</div>'
    +'<div class="tv4-week-strip">'+strip+'</div>'
    +'<div class="tv4-week-day-lbl">'+selLbl.charAt(0).toUpperCase()+selLbl.slice(1)+'</div>'
    +'<div class="tv4-week-tasks">'+renderWeekDayTasks(tasks,selDay)+'</div>'
    +'</div>';
}

function renderWeekDayTasks(tasks,day){
  var dayTasks=tasks.filter(function(t){return t.dueDate===day&&t.status!=='done';});
  var html='';
  if(!dayTasks.length) html='<div class="tv4-empty">Rien ce jour — tap + pour planifier</div>';
  else html=dayTasks.map(function(t){
    return '<div class="tv4-week-task'+(t.priority==='urgente'?' urgent':'')+'" onclick="openTaskDetail(\''+t.id+'\')">'+t.text.slice(0,50)+'</div>';
  }).join('');
  html+='<div class="tv4-week-add" onclick="openQuickCaptureDate(\''+day+'\')">+ Ajouter ce jour</div>';
  return html;
}

function renderZonePlanifier(tasks){
  var today=iso();
  var now=new Date();
  var year=now.getFullYear(),month=now.getMonth();
  var todayD=new Date(today);
  var weekStart=new Date(todayD);
  var wd=weekStart.getDay();weekStart.setDate(weekStart.getDate()-(wd===0?6:wd-1));
  var maxDate=new Date(weekStart);maxDate.setDate(weekStart.getDate()+27);
  var cur=new Date(weekStart);
  var cells=[];
  while(cur<=maxDate){cells.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  var hdrs=['L','M','M','J','V','S','D'].map(function(h){return '<div class="tv4-mini-day" style="font-weight:700;color:var(--g1)">'+h+'</div>';}).join('');
  var daysHtml=cells.map(function(d){
    var iso2=d.toISOString().slice(0,10);
    var isToday=iso2===today;
    var inMonth=d.getMonth()===month;
    var hasUrgent=tasks.some(function(t){return t.dueDate===iso2&&t.priority==='urgente'&&t.status!=='done';});
    var hasTasks=!hasUrgent&&tasks.some(function(t){return t.dueDate===iso2&&t.status!=='done';});
    var cls='tv4-mini-day'+(isToday?' today':hasUrgent?' has-urgent':hasTasks?' has-tasks':!inMonth?' other-month':'');
    return '<div class="'+cls+'" onclick="openPlanifier(\'mois\')">'+d.getDate()+'</div>';
  }).join('');
  return '<div class="tv4-zone-plan">'
    +'<div class="tv4-zone-hdr">'
    +'<span class="tv4-zone-label" style="color:var(--g1);opacity:.7">🗃 PLANIFIER</span>'
    +'<span class="tv4-plan-links" onclick="openPlanifier(\'mois\')">Mois · Kanban · Stats →</span>'
    +'</div>'
    +'<div class="tv4-mini-month">'+hdrs+daysHtml+'</div>'
    +'</div>';
}

function renderPlannerContent(tasks){
  var views=['mois','semaine','kanban','stats'];
  var labels={mois:'Mois',semaine:'Semaine',kanban:'Kanban',stats:'Stats'};
  var cur=window._tv4PlanView||'mois';
  var tabsHtml='<div class="tv4-planner-tabs">'+views.map(function(v){
    return '<div class="tv4-planner-tab'+(cur===v?' active':'')+'" data-view="'+v+'" onclick="tv4SetPlanView(\''+v+'\')">'+labels[v]+'</div>';
  }).join('')+'</div>';
  return '<div class="tv4-planner-hdr">'
    +'<div class="tv4-planner-title">📅 Planifier</div>'
    +'<div class="tv4-planner-close" onclick="closePlanifier()">✕ Fermer</div>'
    +'</div>'

}

function renderPlanBody(tasks,view){
  if(view==='mois') return renderPlanMois(tasks);
  if(view==='semaine') return renderPlanSemaine(tasks);
  if(view==='kanban') return renderKanbanView(tasks);
  if(view==='stats') return renderStatsView(tasks);
  return '';
}

function renderPlanMois(tasks){
  var now=new Date();
  var calMonth=(window._tv4CalMonth!==null&&window._tv4CalMonth!==undefined)?window._tv4CalMonth:now.getMonth();
  var calYear=window._tv4CalYear||now.getFullYear();
  var monthNames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var today=iso();
  var selDay=window._tv4PlanSelDay||today;
  var firstDay=new Date(calYear,calMonth,1);
  var lastDay=new Date(calYear,calMonth+1,0);
  var start=new Date(firstDay);
  var sd=start.getDay();start.setDate(start.getDate()-(sd===0?6:sd-1));
  var hdrs=['L','M','M','J','V','S','D'].map(function(h){return '<div class="tv4-cal-hdr">'+h+'</div>';}).join('');
  var cells='';
  var cur=new Date(start);
  var safety=0;
  while(safety<42){
    if(cur>lastDay&&cur.getDay()===1) break;
    var iso2=cur.toISOString().slice(0,10);
    var inMonth=cur.getMonth()===calMonth;
    var isToday=iso2===today;
    var isSel=iso2===selDay;
    var hasUrgent=tasks.some(function(t){return t.dueDate===iso2&&t.priority==='urgente'&&t.status!=='done';});
    var hasTasks=!hasUrgent&&tasks.some(function(t){return t.dueDate===iso2&&t.status!=='done';});
    var cls='tv4-cal-cell'+(isToday?' today':isSel&&!isToday?' selected':hasUrgent?' has-urgent':hasTasks?' has-tasks':!inMonth?' other-month':'');
    cells+='<div class="'+cls+'" onclick="tv4PlanSelectDay(\''+iso2+'\')">'+cur.getDate()+'</div>';
    cur.setDate(cur.getDate()+1);safety++;
  }
  var dayTasks=tasks.filter(function(t){return t.dueDate===selDay&&t.status!=='done';});
  var selDate=new Date(selDay);
  var selLbl=selDate.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  var dayHtml=dayTasks.length?dayTasks.map(function(t){
    return '<div class="tv4-cal-task'+(t.priority==='urgente'?' urgent':'')+'" onclick="openTaskDetail(\''+t.id+'\')">'+t.text.slice(0,60)+'</div>';
  }).join(''):'<div class="tv4-cal-task" style="color:var(--g1);font-style:italic">Aucune tâche</div>';
  return '<div class="tv4-cal-nav">'
    +'<button class="tv4-cal-arrow" onclick="tv4CalPrevMonth()">‹</button>'
    +'<div class="tv4-cal-month">'+monthNames[calMonth]+' '+calYear+'</div>'
    +'<button class="tv4-cal-arrow" onclick="tv4CalNextMonth()">›</button>'
    +'</div>'
    +'<div class="tv4-cal-grid">'+hdrs+cells+'</div>'
    +'<div class="tv4-cal-day-hdr">'+selLbl.charAt(0).toUpperCase()+selLbl.slice(1)+'</div>'
    +dayHtml
    +'<div class="tv4-cal-add" onclick="openQuickCaptureDate(\''+selDay+'\')">+ Ajouter ce jour</div>';
}

function renderPlanSemaine(tasks){
  var today=iso();
  var ws=window._tv4PlanWeekStart;
  if(!ws){var d=new Date(today);var dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1));ws=d.toISOString().slice(0,10);}
  var days=[];var d=new Date(ws);
  for(var i=0;i<7;i++){var dd=new Date(d);dd.setDate(d.getDate()+i);days.push(dd.toISOString().slice(0,10));}
  var dn=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var cols=days.map(function(day,i){
    var isToday=day===today;
    var dt=tasks.filter(function(t){return t.dueDate===day&&t.status!=='done';});
    return '<div class="tv4-week-plan-col'+(isToday?' today':'')+'">'
      +'<div class="tv4-week-plan-col-hdr"><div class="tv4-week-plan-day">'+dn[i]+'</div><div class="tv4-week-plan-num">'+parseInt(day.slice(8))+'</div></div>'
      +dt.map(function(t){return '<div class="tv4-week-plan-task'+(t.priority==='urgente'?' urgent':'')+'" onclick="openTaskDetail(\''+t.id+'\')">'+t.text.slice(0,30)+'</div>';}).join('')
      +'<div class="tv4-week-plan-add" onclick="openQuickCaptureDate(\''+day+'\')">+</div>'
      +'</div>';
  }).join('');
  var prev=new Date(ws);prev.setDate(prev.getDate()-7);
  var next=new Date(ws);next.setDate(next.getDate()+7);
  return '<div style="display:flex;gap:8px;margin-bottom:12px">'
    +'<button class="tv4-cal-arrow" onclick="tv4NavWeek(\''+prev.toISOString().slice(0,10)+'\')">‹ Préc.</button>'
    +'<button class="tv4-cal-arrow" onclick="tv4NavWeek(\''+next.toISOString().slice(0,10)+'\')">Suiv. ›</button>'
    +'</div>'
    +'<div class="tv4-week-plan"><div class="tv4-week-plan-grid">'+cols+'</div></div>';
}

// ── Insight engine ────────────────────────────────────────────────────────────
window.getInsight = function(){
  var today = iso();
  var streak = currentStreak();
  var best = Math.max(S.config.bestStreak||0, streak);
  var tasks = S.tasks||[];
  var habs = H();
  var mx = Math.max(habs.length,1);
  var day = S.habits[today]||{};
  var score = Math.round(scoreDay(day)/mx*100);
  var habsDone = habs.filter(function(h){return !!day[h.id];}).length;
  var missing = habs.length - habsDone;

  // Priority: near record streak
  if(streak>3 && best>5 && streak>=best-2 && streak<best){
    return {icon:'🏆',color:'var(--amber)',text:'Plus que '+(best-streak)+' jour'+(best-streak>1?'s':'')+' pour battre ton record de '+best+' jours. Ne lâche pas !'};
  }
  // Long streak going strong
  if(streak>=7){
    return {icon:'🔥',text:streak+' jours consécutifs — tu es en train de construire quelque chose de solide.',color:'var(--amber)'};
  }
  // Urgent tasks piling up
  var urgentOld = tasks.filter(function(t){return t.priority==='urgente'&&t.status!=='done'&&t.dueDate&&t.dueDate<today;});
  if(urgentOld.length>=2){
    return {icon:'⚠️',text:urgentOld.length+' t\xe2ches urgentes en retard. C&#39;est le moment de les attaquer ou de les replanifier.',color:'var(--red)'};
  }
  // Perfect day in reach
  if(missing===1&&score<100){
    return {icon:'💪',text:'Il te manque 1 habitude pour une journée parfaite. Tu y es presque !',color:'var(--green)'};
  }
  // Perfect day achieved
  if(score===100&&habs.length>0){
    return {icon:'✨',text:'Toutes tes habitudes cochées ! Journée parfaite. Profites-en.',color:'var(--green)'};
  }
  // Task completion this week
  var weekStart = new Date(); weekStart.setDate(weekStart.getDate()-6);
  var weekKey = weekStart.toISOString().slice(0,10);
  var doneThisWeek = tasks.filter(function(t){return t.status==='done'&&t.completedAt&&t.completedAt>=weekKey;}).length;
  if(doneThisWeek>=5){
    return {icon:'📈',text:doneThisWeek+' tâches complétées cette semaine. Belle semaine productive.',color:'var(--cyan)'};
  }
  // Spending check
  var mk = mKey();
  var monthSpend = (S.finance||[]).filter(function(t){return t.date&&t.date.startsWith(mk)&&t.amt<0;}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
  var prevMk = (function(){var d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);})();
  var prevSpend = (S.finance||[]).filter(function(t){return t.date&&t.date.startsWith(prevMk)&&t.amt<0;}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
  if(prevSpend>0 && monthSpend>prevSpend*1.3){
    return {icon:'💸',text:'Tu d\xe9penses '+(Math.round((monthSpend/prevSpend-1)*100))+'% de plus que le mois dernier. Un regard sur tes finances s&#39;impose.',color:'var(--red)'};
  }
  // Inbox items
  var inbox = tasks.filter(function(t){return t.status==='inbox';}).length;
  if(inbox>=3){
    return {icon:'📥',text:inbox+' éléments dans ton Inbox. Prends 2 minutes pour les organiser.',color:'var(--purp)'};
  }
  // Default — good score
  if(score>=70){
    return {icon:'✅',text:'Score de '+score+'% aujourd&#39;hui. Tu avances dans la bonne direction.',color:'var(--green)'};
  }
  // Default motivational
  return {icon:'🎯',text:'Commence par une habitude. Puis une tâche. La journée se construit brique par brique.',color:'var(--g1)'};
};

window.checkMorningBrief = function(){
  var hour = new Date().getHours();
  if(hour<5||hour>=11) return; // only 5h-11h
  var key = 'v3_brief_'+iso();
  if(localStorage.getItem(key)) return; // already shown today
  if(document.getElementById('v3-brief-overlay')) return;
  showMorningBrief();
};

window.showMorningBrief = function(){
  var tasks = S.tasks||[];
  var habs = H();
  var top = tasks.filter(function(t){return t.status!=='done'&&(t.priority==='urgente'||t.priority==='haute');})
    .sort(function(a,b){var p={urgente:0,haute:1};return(p[a.priority]||1)-(p[b.priority]||1);})
    .slice(0,5);
  var all = tasks.filter(function(t){return t.status!=='done';}).slice(0,8);
  var displayTasks = top.length>=3?top:all.slice(0,5);
  var insight = getInsight();
  var priColors={urgente:'rgba(255,58,92,.15)',haute:'rgba(255,184,0,.15)',moyenne:'rgba(168,85,247,.12)',basse:'var(--b)'};
  var priText={urgente:'var(--red)',haute:'var(--amber)',moyenne:'var(--purp)',basse:'var(--g1)'};
  var greeting = (new Date().getHours()<9?'Bonjour':'Hello');
  var name = (S.config.profile&&S.config.profile.name)?S.config.profile.name:'';

  var tasksHtml = displayTasks.map(function(t){
    return '<div class="v3-intent-row" id="v3-intent-'+t.id+'" onclick="toggleBriefIntent(\''+t.id+'\')">'
      +'<div class="v3-intent-check" id="v3-ic-'+t.id+'"></div>'
      +'<span class="v3-intent-text">'+t.text.slice(0,50)+(t.text.length>50?'…':'')+'</span>'
      +'<span class="v3-intent-pri" style="background:'+priColors[t.priority||'moyenne']+';color:'+priText[t.priority||'moyenne']+'">'+({urgente:'URGENT',haute:'Haute',moyenne:'Moyen',basse:'Bas'}[t.priority||'moyenne'])+'</span>'
      +'</div>';
  }).join('');

  var habsHtml = habs.map(function(h){
    return '<div class="v3-hab-chip" id="v3-hc-'+h.id+'" onclick="toggleBriefHabit(\''+h.id+'\')">'+(h.emoji||'•')+' '+h.label+'</div>';
  }).join('');

  var noTasks = !displayTasks.length?'<p style="color:var(--g1);font-size:13px;padding:8px 0">Aucune tâche — tu pars sur une ardoise vierge 🎉</p>':'';

  var d = new Date();
  var dateStr = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  var overlay = document.createElement('div');
  overlay.id = 'v3-brief-overlay';
  overlay.className = 'v3-overlay';
  overlay.innerHTML = '<div class="v3-sheet">'
    +'<div class="v3-sheet-title">'+greeting+(name?', '+name:'')+' 🌅</div>'
    +'<div class="v3-sheet-sub">'+dateStr.charAt(0).toUpperCase()+dateStr.slice(1)+'</div>'
    +(insight?'<div class="v3-brief-insight">'+insight.icon+' '+insight.text+'</div>':'')
    +(displayTasks.length?'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g1);margin-bottom:10px">Tes priorités du jour</div>'+tasksHtml:'')
    +noTasks
    +(habs.length?'<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g1);margin:14px 0 8px">Habitudes que tu t&#39;engages \xe0 faire</div>'+'<div class="v3-hab-grid">'+habsHtml+'</div>':'')
    +'<button class="v3-cta-btn" onclick="dismissMorningBrief()">C&#39;est parti \u2192</button>'
    +'</div>';
  document.body.appendChild(overlay);
  window._briefIntents = {};
  window._briefHabits = {};
};

window.toggleBriefIntent = function(id){
  window._briefIntents = window._briefIntents||{};
  window._briefIntents[id] = !window._briefIntents[id];
  var row = document.getElementById('v3-intent-'+id);
  var chk = document.getElementById('v3-ic-'+id);
  if(row) row.classList.toggle('picked', !!window._briefIntents[id]);
  if(chk){ chk.classList.toggle('picked', !!window._briefIntents[id]); chk.textContent=window._briefIntents[id]?'✓':''; }
};
window.toggleBriefHabit = function(id){
  window._briefHabits = window._briefHabits||{};
  window._briefHabits[id] = !window._briefHabits[id];
  var el = document.getElementById('v3-hc-'+id);
  if(el) el.classList.toggle('picked', !!window._briefHabits[id]);
};
window.dismissMorningBrief = function(){
  // Mark top selected tasks as focus
  var sel = Object.keys(window._briefIntents||{}).filter(function(id){return window._briefIntents[id];}).slice(0,3);

  });

  localStorage.setItem('v3_brief_'+iso(),'1');
  var el = document.getElementById('v3-brief-overlay');
  if(el) el.remove();
};

    +'<div class="v3-capture-type">'
    +'<button class="v3-type-btn on" id="v3-ct-task" onclick="setCaptureType(\'task\')">✅ T\xe2che</button>'
    +'<button class="v3-type-btn" id="v3-ct-expense" onclick="setCaptureType(\'expense\')">💸 D\xe9pense</button>'
    +'<button class="v3-type-btn" id="v3-ct-inbox" onclick="setCaptureType(\'inbox\')">📥 Inbox</button>'
    +'</div>'
    +'<input id="v3-capture-inp" class="v3-capture-input" type="text" placeholder="Ex: Appeler dentiste demain urgent\u2026" autofocus oninput="updateCaptureHint()" onkeydown="if(event.key===\'Enter\')submitCapture()">'
    +'<div id="v3-capture-hint" class="v3-capture-hint"></div>'
    +'<div class="v3-capture-row">'
    +'<button class="v3-capture-btn v3-capture-cancel" onclick="closeQuickCapture()">Annuler</button>'
    +'<button class="v3-capture-btn v3-capture-add" onclick="submitCapture()">Ajouter →</button>'
    +'</div>'
    +'</div>';
  document.body.appendChild(overlay);
  window._captureType='task';
  setTimeout(function(){var inp=document.getElementById('v3-capture-inp');if(inp)inp.focus();},100);
};
window.closeQuickCapture = function(){
  var el=document.getElementById('v3-capture-overlay');if(el)el.remove();
};
window.setCaptureType = function(type){
  window._captureType=type;
  ['task','expense','inbox'].forEach(function(t){
    var btn=document.getElementById('v3-ct-'+t);
    if(btn)btn.classList.toggle('on',t===type);
  });
  var inp=document.getElementById('v3-capture-inp');
  if(inp){inp.placeholder=type==='expense'?'Ex: 12.50 caf\xe9 ou -45 restaurant\u2026':type==='inbox'?'Une id\xe9e, n&#39;importe quoi\u2026':'Ex: Appeler dentiste demain urgent\u2026';}
  updateCaptureHint();
};
window.updateCaptureHint = function(){
  var inp=document.getElementById('v3-capture-inp');
  var hint=document.getElementById('v3-capture-hint');
  if(!inp||!hint) return;
  var val=inp.value.trim();
  if(!val){hint.textContent='';return;}
  if(window._captureType==='expense'){
    var m=val.match(/[d.,]+/);
    if(m) hint.textContent='💸 Dépense de '+parseFloat(m[0].replace(',','.'))+' €';
    else hint.textContent='Montant non détecté';
  } else {
    var parsed=parseTaskInput(val);
    var priLabel={urgente:'🔴 Urgente',haute:'🟠 Haute',moyenne:'🟣 Moyenne',basse:'⚪ Basse'}[parsed.priority||'moyenne'];
    var cat=TASK_CATEGORIES.find(function(c){return c.id===parsed.category;})||{emoji:'📌'};
    hint.textContent='✅ '+priLabel+' · '+cat.emoji+' '+(parsed.dueDate?'📅 '+parsed.dueDate:'');
  }
};
window.submitCapture = function(){
  var inp=document.getElementById('v3-capture-inp');
  if(!inp||!inp.value.trim()) return;
  var val=inp.value.trim();
  var type=window._captureType||'task';
  if(type==='expense'){
    var m=val.match(/[d.,]+/);
    var amt=m?parseFloat(m[0].replace(',','.')):0;
    var desc=val.replace(/[d.,]+€?/,'').trim()||'Dépense';
    if(amt>0){
      if(!S.finance)S.finance=[];
      S.finance.push({id:'f'+Date.now(),date:iso(),desc:desc,cat:'autre',amt:-amt,type:'Dépense'});
      save(); closeQuickCapture(); render();
      toast('💸 -'+amt+'€ ajouté','var(--red)');
      return;
    }
  }
  var t=parseTaskInput(val);
  if(type==='inbox') t.status='inbox';
  if(!S.tasks)S.tasks=[];
  S.tasks.push(t);
  save(); closeQuickCapture(); render();
  toast(type==='inbox'?'📥 Captur\xe9 dans l&#39;Inbox':'✅ T\xe2che ajout\xe9e','var(--green)');
};

// ── Undo on delete ────────────────────────────────────────────────────────────
window._undoStack = [];
window._undoTimer = null;
window.deleteTaskWithUndo = function(id){
  var t=(S.tasks||[]).find(function(x){return x.id===id;});
  if(!t) return;
  S.tasks=S.tasks.filter(function(x){return x.id!==id;});
  save(); render();
  window._undoStack.push({type:'task',item:t});
  showUndoToast('"'+t.text.slice(0,30)+'"'+' supprimée');
};
window.deleteFinanceWithUndo = function(id){
  var t=(S.finance||[]).find(function(x){return x.id===id;});
  if(!t) return;
  S.finance=S.finance.filter(function(x){return x.id!==id;});
  save(); render();
  window._undoStack.push({type:'finance',item:t});
  showUndoToast('Transaction supprimée');
};
window.showUndoToast = function(msg){
  var ex=document.getElementById('v3-undo-toast');if(ex)ex.remove();
  if(window._undoTimer)clearTimeout(window._undoTimer);
  var div=document.createElement('div');
  div.id='v3-undo-toast';
  div.className='v3-undo';
  div.innerHTML='<span class="v3-undo-msg">'+msg+'</span><button class="v3-undo-btn" onclick="undoLast()">Annuler</button>';
  document.body.appendChild(div);
  window._undoTimer=setTimeout(function(){var el=document.getElementById('v3-undo-toast');if(el)el.remove();window._undoStack=[];},5000);
};
window.undoLast = function(){
  if(!window._undoStack.length) return;
  var entry=window._undoStack.pop();
  if(entry.type==='task'){if(!S.tasks)S.tasks=[];S.tasks.push(entry.item);save();render();}
  if(entry.type==='finance'){if(!S.finance)S.finance=[];S.finance.push(entry.item);save();render();}
  if(window._undoTimer)clearTimeout(window._undoTimer);
  var el=document.getElementById('v3-undo-toast');if(el)el.remove();
  toast('Action annulée ✓','var(--green)');
};

// ── Swipe gestures on task items ──────────────────────────────────────────────
window.initSwipeGestures = function(){
  document.querySelectorAll('.tv3-task').forEach(function(el){
    if(el.dataset.swipeInit) return;
    el.dataset.swipeInit='1';
    var startX=0,curX=0,swiping=false;
    var id=el.querySelector('[data-id]')?el.querySelector('[data-id]').dataset.id:null;
    if(!id){var m=el.innerHTML.match(/openTaskDetail('([^']+)')/);if(m)id=m[1];}
    if(!id) return;

    el.addEventListener('touchstart',function(e){
      startX=e.touches[0].clientX;curX=startX;swiping=true;
    },{passive:true});
    el.addEventListener('touchmove',function(e){
      if(!swiping) return;
      curX=e.touches[0].clientX;
      var dx=curX-startX;
      if(Math.abs(dx)>10){
        var inner=el.querySelector('.tv3-task-inner');
        if(!inner){el.style.transform='translateX('+dx+'px)';}
        var bgR=el.querySelector('.tv3-swipe-bg.right');
        var bgL=el.querySelector('.tv3-swipe-bg.left');
        if(bgR)bgR.style.opacity=dx>0?Math.min(1,dx/60):'0';
        if(bgL)bgL.style.opacity=dx<0?Math.min(1,-dx/60):'0';
      }
    },{passive:true});
    el.addEventListener('touchend',function(){
      if(!swiping){return;}
      swiping=false;
      var dx=curX-startX;
      el.style.transform='';
      var bgR=el.querySelector('.tv3-swipe-bg.right');
      var bgL=el.querySelector('.tv3-swipe-bg.left');
      if(bgR)bgR.style.opacity='0';
      if(bgL)bgL.style.opacity='0';
      if(dx>60){moveTaskStatus(id,'done');toast('✓ Tâche complétée','var(--green)');}
      else if(dx<-60){snoozeTask(id,1);}
    });
  });
};

// ── D1: addNote / showAllNotes ────────────────────────────────────────────
window.addNote=function(){
  const inp=document.getElementById('note-input');
  if(!inp||!inp.value.trim())return;
  if(!S.notes)S.notes=[];
  const now=new Date();
  S.notes.push({id:'n'+Date.now(),text:inp.value.trim(),date:iso(),time:now.toTimeString().slice(0,5),tags:[]});
  save();inp.value='';render();toast('Note ajoutée ✓','var(--green)');
};
window.showAllNotes=function(){
  const notes=(S.notes||[]).sort((a,b)=>b.date.localeCompare(a.date));
  const html=`<h3 style="margin:0 0 16px;color:var(--w)">📔 Journal (${notes.length})</h3>
    <div style="max-height:400px;overflow-y:auto">
      ${notes.map(n=>`<div style="padding:10px 0;border-bottom:1px solid var(--b)">
        <div style="font-size:11px;color:var(--g1)">${n.date} ${n.time||''}</div>
        <div style="font-size:13px;color:var(--w);margin-top:3px;line-height:1.5">${n.text}</div>
      </div>`).join('')}
    </div>`;
  openModal(html);
};

// ── D2: applyTheme / _applyThemeOnLoad ────────────────────────────────────
window.applyTheme=function(id){
  S.config.theme=id;save();
  const themes={
    midnight:{},
    ocean:{'--cyan':'#4A90E2','--purp':'#2C3E50','--amber':'#F39C12'},
    forest:{'--cyan':'#2ECC71','--purp':'#27AE60','--amber':'#F1C40F'},
    sunset:{'--cyan':'#FF6B35','--purp':'#C0392B','--amber':'#E67E22'},
  };
  const vars=themes[id]||{};
  document.documentElement.style.removeProperty('--cyan');
  document.documentElement.style.removeProperty('--purp');
  document.documentElement.style.removeProperty('--amber');
  Object.entries(vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  render();toast('Thème '+id+' appliqué ✓','var(--green)');
};
window._applyThemeOnLoad=function(){
  if(S.config.theme&&S.config.theme!=='midnight')applyTheme(S.config.theme);
};

// ── D3: exportBackup ──────────────────────────────────────────────────────
window.exportBackup=function(){
  const data=JSON.stringify(S,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='cockpit-backup-'+iso()+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup téléchargé ✓','var(--green)');
};
